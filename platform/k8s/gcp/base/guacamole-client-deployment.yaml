apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole-client
  namespace: shifter-platform
  labels:
    app.kubernetes.io/part-of: shifter
    app.kubernetes.io/component: guacamole-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: shifter
      app.kubernetes.io/component: guacamole-client
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: shifter
        app.kubernetes.io/component: guacamole-client
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: workers
      terminationGracePeriodSeconds: 180
      containers:
        - name: guacamole-client
          image: placeholder-guacamole-client:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
          env:
            - name: GUACD_HOSTNAME
              value: guacd
            - name: GUACD_PORT
              value: "4822"
            - name: POSTGRESQL_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: platform-runtime
                  key: GUACAMOLE_POSTGRESQL_HOSTNAME
            - name: POSTGRESQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-runtime
                  key: GUACAMOLE_POSTGRESQL_PORT
            - name: POSTGRESQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: platform-runtime
                  key: GUACAMOLE_POSTGRESQL_DATABASE
            - name: POSTGRESQL_AUTO_CREATE_ACCOUNTS
              value: "true"
            - name: JSON_ENABLED
              value: "true"
            - name: OPENID_ENABLED
              value: "false"
          envFrom:
            - secretRef:
                name: guacamole-runtime
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /guacamole/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /guacamole/
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 60"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
