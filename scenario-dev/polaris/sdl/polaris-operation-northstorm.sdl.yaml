      - web-exploit
      - password-spray
      - kerberoast
      - dcsync
      - smb-enum
      - sql-injection
      - lfi
      - git-history-scan
      - sudo-privesc
      - modbus-probe
      - binary-handshake
      - flag-submit
    starting_accounts: [kali]
    initial_knowledge:
      hosts: [a14-kali]
      subnets: [shared-net, corporate-net]
      services: [boreas-http, ssh]

# ---------------------------------------------------------------------------
# Objectives — declarative mission-level tasks
# ---------------------------------------------------------------------------

objectives:
  establish-target-picture:
    agent: polaris-participant
    actions: [osint]
    targets: [a0-boreas-web, dns-boreas]
    success:
      metrics: [flag-01, flag-02, flag-03, flag-04, flag-05, flag-06]
  compromise-front-office:
    agent: polaris-participant
    actions: [password-spray, sql-injection, smb-enum, kerberoast, dcsync]
    targets: [a1-mail, a3-intranet, a4-fileshare, a2-dc01]
    success:
      evaluations: [mission-2-inside-boreas]
  extract-leviathan:
    agent: polaris-participant
    actions: [git-history-scan, lfi, sql-injection]
    targets: [a6-eng-ws01, a7-git, a8-research-db]
    success:
      evaluations: [mission-3-the-lab]
  lights-out:
    agent: polaris-participant
    actions: [sudo-privesc, modbus-probe]
    targets: [a15-ops-eng01, a5-scada-gw]
    success:
      metrics: [flag-37, flag-18, flag-19]
  seize-autonomous-platform:
    agent: polaris-participant
    actions: [modbus-probe, binary-handshake]
    targets: [a10-tail-ctrl, a11-leg-ctrl, a12-arms-ctrl, a13-brain-main]
    success:
      evaluations: [mission-5-bunker]

# ---------------------------------------------------------------------------
# Workflows — mission ordering and gates
# ---------------------------------------------------------------------------

workflows:
  operation-northstorm:
    description: Main campaign — Mission 1 → 2 → (3, 4) → 5
    start: m1
    timeout: 6 hour
    steps:
      m1:
        type: objective
        objective: establish-target-picture
        on-success: m2
      m2:
        type: objective
        objective: compromise-front-office
        on-success: m3-m4
      m3-m4:
        type: parallel
        branches: [branch-m3, branch-m4]
        join: missions-joined
      branch-m3:
        type: objective
        objective: extract-leviathan
        on-success: missions-joined
      branch-m4:
        type: objective
        objective: lights-out
        on-success: missions-joined
      missions-joined:
        type: join
        next: m5-gate
      m5-gate:
        type: decision
        when:
          metrics: [flag-19]
        then: m5
        else: stop
      m5:
        type: objective
        objective: seize-autonomous-platform
        on-success: stop
      stop:
        type: end

# ---------------------------------------------------------------------------
# Injects / Events / Scripts / Stories — minimal because Polaris has no
# scheduled injections; keep the surfaces populated so orchestrators
# exercise the contract.
# ---------------------------------------------------------------------------

injects:
  briefing-arrives:
    name: Operation brief delivered
    from_entity: white-cell
    to_entities: [participant]
    description: Mission brief sent when the range boots

events:
  briefing-event:
    conditions: [kali-ssh-reachable]
    injects: [briefing-arrives]

scripts:
  boot-script:
    start_time: 0s
    end_time: 5 min
    speed: 1.0
    events: {briefing-event: 10s}

stories:
  northstorm-story:
    speed: 1.0
    scripts: [boot-script]

# ---------------------------------------------------------------------------
# Topology mutations — dynamic splice (flag-triggered)
# ---------------------------------------------------------------------------

topology_mutations:
  open-splice-after-meltdown:
    description: Attach A14 Kali to splice-link once flag 19 succeeds
    action: attach_network
    node: a14-kali
    network: splice-link
    trigger:
      metrics: [flag-19]
    idempotent: true
    properties:
      ipv4: ${kali_splice_ipv4}
