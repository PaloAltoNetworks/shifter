<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
<h2>Event Reminder</h2>
<p>Hi {{ participant.name }},</p>
<p><strong>{{ event.name }}</strong> starts in {{ hours_before }} hours!</p>
<p><strong>Start Time:</strong> {{ event_start_local|date:"F j, Y g:i A" }} ({{ event_timezone }})</p>
<p>
  <a href="{{ access_url }}" style="display: inline-block; padding: 10px 20px; background-color: #0d6efd; color: #ffffff; text-decoration: none; border-radius: 4px;">Access Event</a>
</p>
<p style="font-size: 12px; color: #666;">Or copy this link: {{ access_url }}</p>
<p>Make sure you're ready. Good luck!</p>
</body>
</html>
