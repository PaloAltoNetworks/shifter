[defaults]
# Disable host key checking for dynamic NGFW instances
host_key_checking = False

# Use JSON stdout callback for machine-readable output
stdout_callback = json

# Disable retry files
retry_files_enabled = False

# Timeout for SSH connections
timeout = 30

# Increase SSH connection timeout for slow NGFW boot
[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
