---
# NGFW Deprovision Playbook
#
# Cleans up before NGFW destruction:
# - Deactivates VM-Series license (releases back to pool)
#
# Required variables:
#   - management_ip: NGFW management IP address
#   - ansible_ssh_private_key_file: Path to SSH private key
#
# License deactivation is critical to avoid license leakage.

- name: Deprovision NGFW
  hosts: ngfw
  gather_facts: false
  vars:
    ansible_user: admin
    ansible_connection: ssh
    ansible_shell_type: sh

  tasks:
    - name: Deactivate VM-Series license
      ansible.builtin.raw: "request license deactivate VM-Capacity mode auto"
      register: deactivate_result
      # License deactivation can fail if already deactivated or not licensed
      failed_when: false

    - name: Log deactivation result
      ansible.builtin.debug:
        var: deactivate_result.stdout_lines
        verbosity: 0

    - name: Wait for license deactivation to process
      ansible.builtin.pause:
        seconds: 10

    - name: Verify NGFW is still reachable (optional)
      ansible.builtin.raw: "show system info"
      register: verify_result
      failed_when: false
      ignore_errors: true

    - name: Log verification status
      ansible.builtin.debug:
        msg: "NGFW {{ 'reachable' if verify_result.rc | default(1) == 0 else 'not reachable (may be terminating)' }}"

    - name: Deprovision complete
      ansible.builtin.debug:
        msg: "NGFW deprovision completed"
