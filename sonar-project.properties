sonar.projectKey=Brad-Edwards_shifter
sonar.organization=brad-edwards
sonar.projectName=Shifter
sonar.projectVersion=0.9.1

# Source paths (Python)
sonar.sources=portal,shifter-engine
sonar.tests=portal/tests,shifter-engine/tests

# Exclusions (including test files - don't need bug/smell analysis on tests)
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/__pycache__/**,**/migrations/**,**/.venv/**,**/staticfiles/**,**/tests/**,**/test_*.py,**/conftest.py

# Security hotspot exclusions (test files contain mock credentials)
sonar.security.exclusions=**/tests/**,**/test_*.py,**/conftest.py

# Coverage exclusions (test fixtures, dev-only code)
sonar.coverage.exclusions=**/tests/**,**/conftest.py,**/dev_auth.py

# Coverage report paths
sonar.python.coverage.reportPaths=portal/coverage.xml,shifter-engine/coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
