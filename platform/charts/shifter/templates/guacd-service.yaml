apiVersion: v1
kind: Service
metadata:
  name: guacd
  namespace: {{ .Values.namespaces.platform }}
  labels:
    {{- include "shifter.partOfLabels" . | nindent 4 }}
    app.kubernetes.io/component: guacd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: shifter
    app.kubernetes.io/component: guacd
  ports:
    - name: guacd
      port: 4822
      targetPort: guacd
