name: Platform

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      is_dev:
        required: true
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_ROLE_ARN_DEV:
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: self-hosted
    defaults:
      run:
        working-directory: platform/terraform/environments/${{ inputs.environment }}/portal
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"
      - run: terraform fmt -check -recursive
        working-directory: platform/terraform
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color -out=tfplan && terraform show -no-color tfplan > plan.txt
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('platform/terraform/environments/${{ inputs.environment }}/portal/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan - Platform (${{ inputs.environment }})\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`
            });

  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: self-hosted
    needs: plan
    if: |
      always() &&
      (needs.plan.result == 'success' || needs.plan.result == 'skipped') &&
      (github.event_name != 'pull_request' || inputs.environment == 'dev')
    defaults:
      run:
        working-directory: platform/terraform/environments/${{ inputs.environment }}/portal
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"
      - run: terraform init
      - run: terraform apply -auto-approve

  build:
    name: Build (${{ inputs.environment }})
    runs-on: self-hosted
    needs: apply
    if: github.event_name != 'pull_request' || inputs.environment == 'dev'
    outputs:
      image_tag: ${{ steps.sha.outputs.short }}
    env:
      ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-portal' || 'shifter-portal' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./shifter/shifter_platform
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.sha.outputs.short }}
          cache-from: type=local,src=/tmp/.buildx-cache-portal
          cache-to: type=local,dest=/tmp/.buildx-cache-portal-new,mode=max
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-portal
          mv /tmp/.buildx-cache-portal-new /tmp/.buildx-cache-portal || true

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: self-hosted
    needs: build
    if: github.event_name != 'pull_request' || inputs.environment == 'dev'
    env:
      AWS_REGION: us-east-2
      ENV: ${{ inputs.environment }}
      ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-portal' || 'shifter-portal' }}
      INSTANCE_TAG: ${{ inputs.is_dev && 'dev-portal-ec2' || 'prod-portal-ec2' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get deployment config
        id: config
        run: |
          TFVARS_FILE="platform/terraform/environments/${ENV}/portal/terraform.tfvars"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          PORTAL_DOMAIN=$(grep '^domain_name' "$TFVARS_FILE" | sed 's/.*= *"\([^"]*\)".*/\1/')
          echo "domain=${PORTAL_DOMAIN}" >> $GITHUB_OUTPUT
          S3_BUCKET=$(grep '^user_storage_bucket' "$TFVARS_FILE" | sed 's/.*= *"\([^"]*\)".*/\1/')
          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT
          # Pulumi provisioner ECS configuration
          PULUMI_ECS_CLUSTER=$(aws ecs list-clusters --query "clusterArns[?contains(@, '${ENV}-portal-pulumi')]" --output text)
          echo "pulumi_ecs_cluster_arn=${PULUMI_ECS_CLUSTER}" >> $GITHUB_OUTPUT
          PULUMI_TASK_DEF=$(aws ecs list-task-definitions --family-prefix "${ENV}-portal-pulumi-provisioner" --sort DESC --query "taskDefinitionArns[0]" --output text)
          echo "pulumi_task_definition_arn=${PULUMI_TASK_DEF}" >> $GITHUB_OUTPUT
          PULUMI_SG=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=${ENV}-portal-pulumi-ecs-sg" --query "SecurityGroups[0].GroupId" --output text)
          echo "pulumi_ecs_security_group_id=${PULUMI_SG}" >> $GITHUB_OUTPUT
          PULUMI_SUBNETS=$(aws ec2 describe-subnets --filters "Name=tag:Name,Values=${ENV}-portal-private-*" --query "Subnets[*].SubnetId" --output text | tr '\t' ',')
          echo "pulumi_private_subnet_ids=${PULUMI_SUBNETS}" >> $GITHUB_OUTPUT
          # Check if autoscaling is enabled
          ENABLE_AUTOSCALING=$(grep '^enable_autoscaling' "$TFVARS_FILE" | sed 's/.*= *\([^ ]*\).*/\1/' | tr -d ' ')
          echo "enable_autoscaling=${ENABLE_AUTOSCALING}" >> $GITHUB_OUTPUT
          # Get Redis endpoint if autoscaling enabled
          if [ "$ENABLE_AUTOSCALING" = "true" ]; then
            REDIS_ENDPOINT=$(aws elasticache describe-cache-clusters \
              --cache-cluster-id "${ENV}-portal-redis" \
              --show-cache-node-info \
              --query "CacheClusters[0].CacheNodes[0].Endpoint.Address" \
              --output text 2>/dev/null || echo "")
            echo "redis_endpoint=${REDIS_ENDPOINT}" >> $GITHUB_OUTPUT
          fi
          # Get SQS queue URLs for workers
          SQS_CMS_URL=$(aws sqs get-queue-url --queue-name "${ENV}-portal-cms-tasks" --query "QueueUrl" --output text 2>/dev/null || echo "")
          SQS_ENGINE_URL=$(aws sqs get-queue-url --queue-name "${ENV}-portal-engine-tasks" --query "QueueUrl" --output text 2>/dev/null || echo "")
          SQS_MC_URL=$(aws sqs get-queue-url --queue-name "${ENV}-portal-mc-tasks" --query "QueueUrl" --output text 2>/dev/null || echo "")
          echo "sqs_cms_url=${SQS_CMS_URL}" >> $GITHUB_OUTPUT
          echo "sqs_engine_url=${SQS_ENGINE_URL}" >> $GITHUB_OUTPUT
          echo "sqs_mc_url=${SQS_MC_URL}" >> $GITHUB_OUTPUT

      - name: Get Instance ID (single instance mode)
        id: instance
        if: steps.config.outputs.enable_autoscaling != 'true'
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running Platform EC2 instance with tag: $INSTANCE_TAG"; exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Get ASG Name (ASG mode)
        id: asg
        if: steps.config.outputs.enable_autoscaling == 'true'
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?contains(AutoScalingGroupName, '${ENV}-portal-asg')].AutoScalingGroupName | [0]" \
            --output text)
          if [ "$ASG_NAME" == "None" ] || [ -z "$ASG_NAME" ]; then
            echo "Error: Could not find ASG with name containing: ${ENV}-portal-asg"; exit 1
          fi
          echo "asg_name=$ASG_NAME" >> $GITHUB_OUTPUT

      - name: Wait for cloud-init (single instance mode)
        if: steps.config.outputs.enable_autoscaling != 'true'
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          for i in $(seq 1 30); do
            RESULT=$(aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["cloud-init status --wait || cloud-init status"]' \
              --query "Command.CommandId" --output text 2>/dev/null) || true
            if [ -n "$RESULT" ]; then
              sleep 10
              STATUS=$(aws ssm get-command-invocation --command-id "$RESULT" --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text 2>/dev/null) || true
              if echo "$STATUS" | grep -q "done"; then echo "Cloud-init complete"; exit 0; fi
            fi
            echo "Attempt $i: Waiting..."; sleep 10
          done
          echo "Warning: cloud-init wait timed out"

      - name: Deploy via SSM (single instance mode)
        if: steps.config.outputs.enable_autoscaling != 'true'
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
          ECR_REGISTRY: ${{ steps.config.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          PORTAL_DOMAIN: ${{ steps.config.outputs.domain }}
          S3_BUCKET: ${{ steps.config.outputs.s3_bucket }}
          PULUMI_ECS_CLUSTER_ARN: ${{ steps.config.outputs.pulumi_ecs_cluster_arn }}
          PULUMI_TASK_DEFINITION_ARN: ${{ steps.config.outputs.pulumi_task_definition_arn }}
          PULUMI_ECS_SECURITY_GROUP_ID: ${{ steps.config.outputs.pulumi_ecs_security_group_id }}
          PULUMI_PRIVATE_SUBNET_IDS: ${{ steps.config.outputs.pulumi_private_subnet_ids }}
          ACCOUNT_ID: ${{ steps.config.outputs.account_id }}
          SQS_CMS_URL: ${{ steps.config.outputs.sqs_cms_url }}
          SQS_ENGINE_URL: ${{ steps.config.outputs.sqs_engine_url }}
          SQS_MC_URL: ${{ steps.config.outputs.sqs_mc_url }}
        run: |
          DB_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-db-credentials"
          APP_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-app"
          COGNITO_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-cognito"

          # Common environment variables for all containers
          COMMON_ENV="-e AWS_REGION=${AWS_REGION} \
            -e AWS_S3_BUCKET_NAME=${S3_BUCKET} \
            -e DB_SECRET_ARN=${DB_SECRET_ARN} \
            -e APP_SECRET_ARN=${APP_SECRET_ARN} \
            -e COGNITO_SECRET_ARN=${COGNITO_SECRET_ARN} \
            -e DJANGO_ALLOWED_HOSTS=${PORTAL_DOMAIN} \
            -e DJANGO_CSRF_TRUSTED_ORIGINS=https://${PORTAL_DOMAIN} \
            -e SITE_URL=https://${PORTAL_DOMAIN} \
            -e PULUMI_ECS_CLUSTER_ARN=${PULUMI_ECS_CLUSTER_ARN} \
            -e PULUMI_TASK_DEFINITION_ARN=${PULUMI_TASK_DEFINITION_ARN} \
            -e PULUMI_ECS_SECURITY_GROUP_ID=${PULUMI_ECS_SECURITY_GROUP_ID} \
            -e PULUMI_PRIVATE_SUBNET_IDS=${PULUMI_PRIVATE_SUBNET_IDS} \
            -e SQS_CMS_URL=${SQS_CMS_URL} \
            -e SQS_ENGINE_URL=${SQS_ENGINE_URL} \
            -e SQS_MC_URL=${SQS_MC_URL}"

          COMMAND_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$INSTANCE_ID" \
            --parameters "commands=[
              'set -e',
              'IMAGE=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}',
              'docker pull \$IMAGE',
              'echo \"Stopping existing containers...\"',
              'docker stop portal worker-cms worker-engine worker-mc 2>/dev/null || true',
              'docker rm portal worker-cms worker-engine worker-mc 2>/dev/null || true',
              'echo \"Starting portal...\"',
              'docker run -d --name portal --restart unless-stopped -p 8000:8000 ${COMMON_ENV} \$IMAGE',
              'echo \"Starting workers...\"',
              'docker run -d --name worker-cms --restart unless-stopped ${COMMON_ENV} \$IMAGE python manage.py run_worker --queue cms',
              'docker run -d --name worker-engine --restart unless-stopped ${COMMON_ENV} \$IMAGE python manage.py run_worker --queue engine',
              'docker run -d --name worker-mc --restart unless-stopped ${COMMON_ENV} \$IMAGE python manage.py run_worker --queue mc',
              'echo \"All containers started\"',
              'docker ps'
            ]" --timeout-seconds 300 --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
            exit 1
          fi
          echo "Platform deployment successful!"

      - name: Deploy via SSM to ASG instances
        if: steps.config.outputs.enable_autoscaling == 'true'
        env:
          ASG_NAME: ${{ steps.asg.outputs.asg_name }}
          ECR_REGISTRY: ${{ steps.config.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          PORTAL_DOMAIN: ${{ steps.config.outputs.domain }}
          S3_BUCKET: ${{ steps.config.outputs.s3_bucket }}
          PULUMI_ECS_CLUSTER_ARN: ${{ steps.config.outputs.pulumi_ecs_cluster_arn }}
          PULUMI_TASK_DEFINITION_ARN: ${{ steps.config.outputs.pulumi_task_definition_arn }}
          PULUMI_ECS_SECURITY_GROUP_ID: ${{ steps.config.outputs.pulumi_ecs_security_group_id }}
          PULUMI_PRIVATE_SUBNET_IDS: ${{ steps.config.outputs.pulumi_private_subnet_ids }}
          REDIS_ENDPOINT: ${{ steps.config.outputs.redis_endpoint }}
          ACCOUNT_ID: ${{ steps.config.outputs.account_id }}
          SQS_CMS_URL: ${{ steps.config.outputs.sqs_cms_url }}
          SQS_ENGINE_URL: ${{ steps.config.outputs.sqs_engine_url }}
          SQS_MC_URL: ${{ steps.config.outputs.sqs_mc_url }}
        run: |
          DB_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-db-credentials"
          APP_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-app"
          COGNITO_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-cognito"

          # Common environment variables for all containers
          COMMON_ENV="-e AWS_REGION=${AWS_REGION} \
            -e AWS_S3_BUCKET_NAME=${S3_BUCKET} \
            -e DB_SECRET_ARN=${DB_SECRET_ARN} \
            -e APP_SECRET_ARN=${APP_SECRET_ARN} \
            -e COGNITO_SECRET_ARN=${COGNITO_SECRET_ARN} \
            -e DJANGO_ALLOWED_HOSTS=${PORTAL_DOMAIN} \
            -e DJANGO_CSRF_TRUSTED_ORIGINS=https://${PORTAL_DOMAIN} \
            -e SITE_URL=https://${PORTAL_DOMAIN} \
            -e PULUMI_ECS_CLUSTER_ARN=${PULUMI_ECS_CLUSTER_ARN} \
            -e PULUMI_TASK_DEFINITION_ARN=${PULUMI_TASK_DEFINITION_ARN} \
            -e PULUMI_ECS_SECURITY_GROUP_ID=${PULUMI_ECS_SECURITY_GROUP_ID} \
            -e PULUMI_PRIVATE_SUBNET_IDS=${PULUMI_PRIVATE_SUBNET_IDS} \
            -e REDIS_HOST=${REDIS_ENDPOINT} \
            -e SQS_CMS_URL=${SQS_CMS_URL} \
            -e SQS_ENGINE_URL=${SQS_ENGINE_URL} \
            -e SQS_MC_URL=${SQS_MC_URL}"

          # Get all running instances in the ASG
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "Error: No running instances in ASG"; exit 1
          fi

          echo "Deploying to ASG instances: $INSTANCE_IDS"

          # Deploy to all instances via SSM (targets by tag)
          COMMAND_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
            --targets "Key=tag:aws:autoscaling:groupName,Values=${ASG_NAME}" \
            --parameters "commands=[
              'set -e',
              'IMAGE=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}',
              'docker pull \$IMAGE',
              'echo \"Stopping existing containers...\"',
              'docker stop portal worker-cms worker-engine worker-mc 2>/dev/null || true',
              'docker rm portal worker-cms worker-engine worker-mc 2>/dev/null || true',
              'echo \"Starting portal...\"',
              'docker run -d --name portal --restart unless-stopped -p 8000:8000 ${COMMON_ENV} \$IMAGE',
              'echo \"Starting workers...\"',
              'docker run -d --name worker-cms --restart unless-stopped ${COMMON_ENV} \$IMAGE python manage.py run_worker --queue cms',
              'docker run -d --name worker-engine --restart unless-stopped ${COMMON_ENV} \$IMAGE python manage.py run_worker --queue engine',
              'docker run -d --name worker-mc --restart unless-stopped ${COMMON_ENV} \$IMAGE python manage.py run_worker --queue mc',
              'echo \"All containers started\"',
              'docker ps'
            ]" --timeout-seconds 300 --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete on all instances
          sleep 30
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Checking deployment status for $INSTANCE_ID..."
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo "Pending")
            RETRIES=0
            while [ "$STATUS" = "Pending" ] || [ "$STATUS" = "InProgress" ]; do
              sleep 10
              STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo "Pending")
              RETRIES=$((RETRIES + 1))
              if [ $RETRIES -gt 30 ]; then
                echo "Timeout waiting for $INSTANCE_ID"; exit 1
              fi
            done
            if [ "$STATUS" != "Success" ]; then
              echo "Deployment failed on $INSTANCE_ID"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
              exit 1
            fi
            echo "Deployment successful on $INSTANCE_ID"
          done

          echo "Platform ASG deployment successful!"
