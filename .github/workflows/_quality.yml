name: Quality

on:
  workflow_call:
    inputs:
      skip_tests:
        description: 'Skip test jobs (linting still runs)'
        required: false
        type: boolean
        default: false
    secrets:
      SONAR_TOKEN:
        description: 'SonarCloud analysis token (sonarcloud job)'
        required: true

jobs:
  # ===========================================================================
  # Linting
  # ===========================================================================

  adr-conformance:
    permissions:
      contents: read
    name: Architecture (adr conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The self-hosted runner ships with Python 3.9, but `adr_guard.py`
      # imports the stdlib `tomllib` module added in 3.11. `uv` brings its
      # own Python and is already the Python toolchain every other job in
      # this workflow uses, so it's the portable fix: no OS-package upgrade
      # on the runner VMs, no dependency on `actions/setup-python`'s
      # version manifest (which doesn't cover the runner distro).
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install Helm for ADR guard chart rendering (hermetic, version-pinned, checksum-verified)
        env:
          HELM_VERSION: v3.15.4
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/helm-bin"
          curl -fsSL -o "${RUNNER_TEMP}/helm.tar.gz" \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          # Verify the downloaded tarball against the published SHA256 checksum
          # before extraction or execution. Trust boundary is get.helm.sh; if
          # it is compromised both files compare equal, but this prevents
          # CDN/transport tampering and silent corruption.
          expected=$(curl -fsSL \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz.sha256sum" \
            | awk '{print $1}')
          echo "${expected}  ${RUNNER_TEMP}/helm.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/helm.tar.gz" -C "${RUNNER_TEMP}" linux-amd64/helm
          mv "${RUNNER_TEMP}/linux-amd64/helm" "${RUNNER_TEMP}/helm-bin/helm"
          echo "${RUNNER_TEMP}/helm-bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/helm-bin/helm" version --short

      - name: Run ADR guard
        run: |
          uv run --python 3.11 --with 'pyyaml==6.0.2' \
            python scripts/adr_guard/adr_guard.py --all --level ci

  workflow-lint:
    permissions:
      contents: read
    name: Lint (GitHub Actions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: devops-actions/actionlint@467e2ce19b2310e93c9ffa0b50fe31f86b5a7f23 # v0.1.10

  terraform-lint:
    permissions:
      contents: read
    name: Lint (terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e87008f9dd1fe3e34e66aca6c97b4a69f72a7f4 # v4

      - name: Init TFLint
        run: tflint --init --config "${GITHUB_WORKSPACE}/.tflint.hcl"

      - name: Run TFLint
        working-directory: platform/terraform
        run: tflint --recursive --config "${GITHUB_WORKSPACE}/.tflint.hcl"

      # ADR-004-R10 / issue #52: the kms:Decrypt grant for the portal
      # Secrets Manager CMK on roles that read Secrets Manager. Wired
      # alongside terraform-lint because the inputs are .tf files and
      # this is the natural "terraform architecture" gate; runs in the
      # same job to avoid an extra runner pool slot. Pre-commit also
      # enforces it locally, but CI must enforce it independently so a
      # commit that didn't run pre-commit cannot land the regression.
      # Scope must mirror the pre-commit hook's `files:` regex —
      # every module that defines an IAM role whose attached policies
      # grant secretsmanager:GetSecretValue on a portal-CMK secret.
      - name: Run check-tf-kms-secrets-grant
        run: |
          python3 scripts/check_tf_kms_secrets_grant/check_tf_kms_secrets_grant.py \
            platform/terraform/modules/engine-provisioner/iam.tf \
            platform/terraform/modules/portal/ec2/main.tf \
            platform/terraform/modules/guacamole/iam.tf

      # Pin the behavior of the check_tf_* IAM/security checkers
      # themselves. The live-file invocations above only exercise the
      # happy-path shape; the test suites cover wildcards, list
      # resources, scoped conditions, missing grants, etc. Run them so
      # a parser regression can't slip through merely because the
      # current production .tf files happen to remain in the
      # happy-path shape. Invoked as fully-qualified modules from the
      # repo root because each test uses `from .check_tf_X import …`
      # (relative imports require the package path, which
      # `unittest discover` doesn't preserve).
      - name: Run check_tf_* checker tests
        run: |
          python3 -m unittest scripts.check_tf_iam_ec2_scope.test_check_tf_iam_ec2_scope
          python3 -m unittest scripts.check_tf_sg_cidrs.test_check_tf_sg_cidrs
          python3 -m unittest scripts.check_tf_kms_secrets_grant.test_check_tf_kms_secrets_grant

  shifter-platform-lint:
    permissions:
      contents: read
    name: Lint (shifter_platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Lint Python
        working-directory: shifter/shifter_platform
        run: |
          uv run ruff check .
          uv run ruff format --check .

  shifter-platform-lint-js:
    permissions:
      contents: read
    name: Lint JavaScript/CSS (shifter_platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shifter/shifter_platform/package-lock.json

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: npm ci

      - name: Lint JavaScript
        working-directory: shifter/shifter_platform
        run: npx eslint static/js/

      - name: Lint CSS
        working-directory: shifter/shifter_platform
        run: npx stylelint static/css/

  provisioner-lint:
    permissions:
      contents: read
    name: Lint (provisioner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/engine/provisioner
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  packer-lint:
    permissions:
      contents: read
    name: Lint (packer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/packer
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  bootstrap-lint:
    permissions:
      contents: read
    name: Lint (bootstrap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/bootstrap
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  gcp-scripts-lint:
    permissions:
      contents: read
    name: Lint (gcp scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/gcp
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  check-layer-imports-lint:
    permissions:
      contents: read
    name: Lint (check_layer_imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/check_layer_imports
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  check-rds-pending-modifications-lint:
    permissions:
      contents: read
    name: Lint (check_rds_pending_modifications)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/check_rds_pending_modifications
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  installation-lint:
    permissions:
      contents: read
    name: Lint (installation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/installation
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  k8s-lint:
    permissions:
      contents: read
    name: Lint (k8s manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize (hermetic, version-pinned, checksum-verified)
        env:
          KUSTOMIZE_VERSION: v5.4.3
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/kustomize-bin"
          curl -fsSL -o "${RUNNER_TEMP}/kustomize.tar.gz" \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          # Verify the downloaded tarball against the published SHA256 checksum
          # before extraction or execution. checksums.txt lists every release
          # artifact; pull the row for our tarball.
          expected=$(curl -fsSL \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/checksums.txt" \
            | awk -v fname="kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" '$2 == fname {print $1}')
          echo "${expected}  ${RUNNER_TEMP}/kustomize.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/kustomize.tar.gz" -C "${RUNNER_TEMP}/kustomize-bin" kustomize
          echo "${RUNNER_TEMP}/kustomize-bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/kustomize-bin/kustomize" version

      - name: Install kube-linter
        run: |
          curl -fsSL -o /tmp/kube-linter.tar.gz \
            "https://github.com/stackrox/kube-linter/releases/download/v0.7.2/kube-linter-linux.tar.gz"
          tar -xzf /tmp/kube-linter.tar.gz -C /tmp kube-linter

      # Render every kustomize root before linting. The previous "lint the
      # raw tree" pattern broke as soon as an overlay added a strategic-merge
      # patch for a Deployment: the patch file is a partial Deployment by
      # design (no selector, no resources, no securityContext — those come
      # from the base), but kube-linter saw it as a full Deployment and
      # tripped on every required field. Rendering kustomize first validates
      # what actually gets deployed.
      - name: Render kustomize roots + run kube-linter
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/rendered-k8s"
          while IFS= read -r kfile; do
            root=$(dirname "$kfile")
            slug=$(echo "$root" | tr '/' '_')
            kustomize build "$root" > "${RUNNER_TEMP}/rendered-k8s/${slug}.yaml"
          done < <(find platform/k8s -name kustomization.yaml)
          /tmp/kube-linter lint --config .kube-linter.yaml "${RUNNER_TEMP}/rendered-k8s/"

  k8s-schema:
    permissions:
      contents: read
    name: Lint (k8s schemas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize (hermetic, version-pinned, checksum-verified)
        env:
          KUSTOMIZE_VERSION: v5.4.3
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/kustomize-bin"
          curl -fsSL -o "${RUNNER_TEMP}/kustomize.tar.gz" \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          expected=$(curl -fsSL \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/checksums.txt" \
            | awk -v fname="kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" '$2 == fname {print $1}')
          echo "${expected}  ${RUNNER_TEMP}/kustomize.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/kustomize.tar.gz" -C "${RUNNER_TEMP}/kustomize-bin" kustomize
          echo "${RUNNER_TEMP}/kustomize-bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/kustomize-bin/kustomize" version

      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform

      # Same rationale as k8s-lint: validate the rendered (kustomized) shape
      # so overlay patches don't fail schema validation as standalone partial
      # Deployments.
      - name: Render kustomize roots + validate schemas
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/rendered-k8s"
          while IFS= read -r kfile; do
            root=$(dirname "$kfile")
            slug=$(echo "$root" | tr '/' '_')
            kustomize build "$root" > "${RUNNER_TEMP}/rendered-k8s/${slug}.yaml"
          done < <(find platform/k8s -name kustomization.yaml)
          /tmp/kubeconform -strict -summary -ignore-missing-schemas \
            -kubernetes-version 1.31.0 \
            "${RUNNER_TEMP}/rendered-k8s/"*.yaml

  # ===========================================================================
  # Type Checking (non-blocking quality gate)
  # ===========================================================================

  shifter-platform-typecheck:
    permissions:
      contents: read
    name: Type Check (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking - quality signal only
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Run mypy
        working-directory: shifter/shifter_platform
        run: |
          uv run mypy . --no-error-summary || true
          echo "::notice::Type checking complete - see above for any type errors"

  provisioner-typecheck:
    permissions:
      contents: read
    name: Type Check (provisioner)
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking - quality signal only
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/engine/provisioner
        run: uv sync --group dev

      - name: Run mypy
        working-directory: shifter/engine/provisioner
        run: |
          uv run mypy . --no-error-summary || true
          echo "::notice::Type checking complete - see above for any type errors"

  # ===========================================================================
  # Architecture as Code (hard fail - zero tolerance)
  # ===========================================================================

  check-layer-imports-arch:
    permissions:
      contents: read
    name: Architecture (layer imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/check_layer_imports
        run: uv sync

      - name: Check layer imports
        working-directory: scripts/check_layer_imports
        run: uv run python check_layer_imports.py

  import-linter-arch:
    permissions:
      contents: read
    name: Architecture (import linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Check import contracts
        working-directory: shifter/shifter_platform
        run: uv run lint-imports --config ../../.importlinter

  # ===========================================================================
  # SAST (Bandit)
  #
  # Policy (#1193): every Bandit job in this workflow is BLOCKING. There
  # are no advisory Bandit jobs by default. Owner: @Brad-Edwards. Scope
  # covers every Python package that ships from this repo — runtime
  # (shifter_platform, provisioner), build (packer), bootstrap and
  # install scripts (scripts/bootstrap, shifter/installation), operator
  # scripts (scripts/gcp), and dev-tool linters
  # (scripts/check_layer_imports). Adding a new Bandit job MUST NOT
  # introduce `continue-on-error: true` — fix the finding, narrow the
  # scan, or use a documented `# nosec` with an inline justification.
  # ===========================================================================

  shifter-platform-sast:
    permissions:
      contents: read
    name: SAST (shifter_platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r shifter/shifter_platform/ --skip B101 --exclude shifter/shifter_platform/tests,shifter/shifter_platform/.venv

  provisioner-sast:
    permissions:
      contents: read
    name: SAST (provisioner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        # B404: subprocess import, B603: subprocess call, B607: partial path
        # Provisioner uses subprocess for Pulumi CLI calls with hardcoded commands
        run: |
          uv tool install bandit
          bandit -r shifter/engine/provisioner/ --skip B101,B404,B603,B607 --exclude shifter/engine/provisioner/tests,shifter/engine/provisioner/.venv

  packer-sast:
    permissions:
      contents: read
    name: SAST (packer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r shifter/packer/ --skip B101 --exclude shifter/packer/tests,shifter/packer/.venv

  bootstrap-sast:
    permissions:
      contents: read
    name: SAST (bootstrap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r scripts/bootstrap/ --skip B101 --exclude scripts/bootstrap/tests,scripts/bootstrap/.venv

  gcp-scripts-sast:
    permissions:
      contents: read
    name: SAST (gcp scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r scripts/gcp/ --skip B101,B108 --exclude scripts/gcp/tests,scripts/gcp/.venv

  check-layer-imports-sast:
    permissions:
      contents: read
    name: SAST (check_layer_imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        working-directory: scripts/check_layer_imports
        run: |
          uv tool install 'bandit[toml]'
          bandit -r . -c pyproject.toml

  installation-sast:
    permissions:
      contents: read
    name: SAST (installation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r shifter/installation/ --skip B101 --exclude shifter/installation/tests,shifter/installation/.venv

  # ===========================================================================
  # Python Tests
  # ===========================================================================

  shifter-platform-tests:
    permissions:
      contents: read
    name: Tests (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    needs: [shifter-platform-lint, shifter-platform-lint-js, shifter-platform-sast]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shifter
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/shifter_platform
        env:
          TESTING: "1"
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shifter
          DB_USER: test
          DB_PASSWORD: test
        run: |
          uv run python manage.py collectstatic --noinput
          uv run pytest tests/ --ignore=tests/documentation --cov=config --cov=mission_control --cov=documentation --cov=cms --cov=shared --cov=ctf --cov=engine --cov=risk_register --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shifter-platform
          path: shifter/shifter_platform/coverage.xml
          if-no-files-found: error
          retention-days: 1

  shifter-engine-tests:
    permissions:
      contents: read
    name: Tests (provisioner)
    if: ${{ !inputs.skip_tests }}
    needs: [provisioner-lint, provisioner-sast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/engine/provisioner
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/engine/provisioner
        env:
          TESTING: "1"
        run: uv run --with pytest-cov pytest tests/ --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-provisioner
          path: shifter/engine/provisioner/coverage.xml
          if-no-files-found: error
          retention-days: 1

  packer-tests:
    permissions:
      contents: read
    name: Tests (packer)
    if: ${{ !inputs.skip_tests }}
    needs: [packer-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/packer
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/packer
        run: uv run --with pytest-cov pytest tests/ --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-packer
          path: shifter/packer/coverage.xml
          if-no-files-found: error
          retention-days: 1

  bootstrap-tests:
    permissions:
      contents: read
    name: Tests (bootstrap)
    if: ${{ !inputs.skip_tests }}
    needs: [bootstrap-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/bootstrap
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/bootstrap
        run: uv run --with pytest-cov pytest tests/ --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bootstrap
          path: scripts/bootstrap/coverage.xml
          if-no-files-found: error
          retention-days: 1

  gcp-scripts-tests:
    permissions:
      contents: read
    name: Tests (gcp scripts)
    if: ${{ !inputs.skip_tests }}
    needs: [gcp-scripts-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/gcp
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/gcp
        run: uv run pytest tests/

  check-layer-imports-tests:
    permissions:
      contents: read
    name: Tests (check_layer_imports)
    if: ${{ !inputs.skip_tests }}
    needs: [check-layer-imports-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/check_layer_imports
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/check_layer_imports
        run: uv run --with pytest-cov pytest tests/ --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-check-layer-imports
          path: scripts/check_layer_imports/coverage.xml
          if-no-files-found: error
          retention-days: 1

  check-rds-pending-modifications-tests:
    permissions:
      contents: read
    name: Tests (check_rds_pending_modifications)
    if: ${{ !inputs.skip_tests }}
    needs: [check-rds-pending-modifications-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/check_rds_pending_modifications
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/check_rds_pending_modifications
        run: uv run pytest tests/

  installation-tests:
    permissions:
      contents: read
    name: Tests (installation)
    if: ${{ !inputs.skip_tests }}
    needs: [installation-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/installation
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/installation
        run: uv run --with pytest-cov pytest tests/ --cov=. --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-installation
          path: shifter/installation/coverage.xml
          if-no-files-found: error
          retention-days: 1

  adr-guard-tests:
    permissions:
      contents: read
    name: Tests (adr_guard)
    if: ${{ !inputs.skip_tests }}
    needs: [adr-conformance]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Same rationale as adr-conformance: `adr_guard` imports `tomllib`
      # (stdlib 3.11+); the self-hosted runner ships 3.9. Use `uv` to
      # source Python so the workflow doesn't depend on a system upgrade.
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run tests
        run: |
          uv run --python 3.11 --with 'pyyaml==6.0.2' \
            python -m unittest discover -s scripts/adr_guard/tests -p 'test_*.py' -v

  # ===========================================================================
  # JavaScript Tests
  # ===========================================================================

  shifter-platform-js-tests:
    permissions:
      contents: read
    name: Tests JavaScript (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    needs: [shifter-platform-lint-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shifter/shifter_platform/package-lock.json

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: npm ci

      - name: Run JavaScript tests
        working-directory: shifter/shifter_platform
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shifter-platform-js
          path: shifter/shifter_platform/coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  mcp-lint:
    # Lint always runs, even when [skip tests] is set on the workflow
    # input, because lint is a static check independent of the test
    # gate. Matches the shifter-platform pattern (lint-js / js-tests
    # are separate jobs).
    permissions:
      contents: read
    name: Lint JavaScript (mcp/${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [ngfw, ops, shared]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        working-directory: mcp/${{ matrix.package }}
        run: npm ci

      - name: Lint
        working-directory: mcp/${{ matrix.package }}
        run: npm run lint

  mcp-tests:
    permissions:
      contents: read
    name: Tests JavaScript (mcp/${{ matrix.package }})
    if: ${{ !inputs.skip_tests }}
    needs: [mcp-lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [ngfw, ops]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        working-directory: mcp/${{ matrix.package }}
        run: npm ci

      - name: Test
        working-directory: mcp/${{ matrix.package }}
        run: npm test

  # ===========================================================================
  # Security
  # ===========================================================================

  security-iac:
    permissions:
      contents: read
    name: Security (IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Checkov
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-checkov-${{ hashFiles('.github/workflows/_quality.yml') }}
          restore-keys: |
            ${{ runner.os }}-checkov-

      - name: Checkov IaC Security
        uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61 # v12
        with:
          directory: platform/terraform/
          framework: terraform
          download_external_modules: true
          quiet: true
          compact: true
          soft_fail: true

  security-k8s:
    permissions:
      contents: read
    name: Security (k8s)
    runs-on: ubuntu-latest
    continue-on-error: true  # Soft-fail until manifest remediation complete
    steps:
      - uses: actions/checkout@v4

      - name: Cache Checkov
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-checkov-k8s-${{ hashFiles('.github/workflows/_quality.yml') }}
          restore-keys: |
            ${{ runner.os }}-checkov-k8s-

      - name: Checkov k8s Security
        uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61 # v12
        with:
          directory: platform/k8s/
          framework: kubernetes
          quiet: true
          compact: true
          soft_fail: true

  secrets-gitleaks:
    permissions:
      contents: read
    name: Security (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine scan range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            RANGE="HEAD~1..HEAD"
          fi
          echo "log_opts=$RANGE" >> "$GITHUB_OUTPUT"

      - name: Run gitleaks on new commits
        uses: DariuszPorowski/github-action-gitleaks@a027585cb1f2780aa441f20f4d0aabf8b1a0d90e # v2.1.0
        with:
          config: .gitleaks.toml
          fail: true
          report_format: json
          log_opts: ${{ steps.range.outputs.log_opts }}

  model-fks-arch:
    permissions:
      contents: read
    name: Architecture (model FKs)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shifter
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Check model FKs
        working-directory: shifter/shifter_platform
        env:
          TESTING: "1"
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shifter
          DB_USER: test
          DB_PASSWORD: test
        run: uv run python manage.py check_model_fks

  # ===========================================================================
  # Static analysis — SonarCloud
  # ===========================================================================

  sonarcloud:
    permissions:
      contents: read
    name: SonarCloud
    # Runs after the test jobs so their coverage reports can feed the scan.
    # success() keeps the implicit needs-passed guard that a custom if:
    # would otherwise drop; skipped when tests are skipped.
    if: ${{ success() && !inputs.skip_tests }}
    needs:
      - shifter-platform-tests
      - shifter-platform-js-tests
      - shifter-engine-tests
      - packer-tests
      - bootstrap-tests
      - check-layer-imports-tests
      - installation-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so SonarCloud attributes new code accurately for
          # pull-request (new-code) quality-gate analysis.
          fetch-depth: 0

      # Coverage reports are produced by the test jobs and passed as
      # artifacts; restore each at the repo-relative path that
      # sonar-project.properties references.
      - name: Download shifter_platform coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-shifter-platform
          path: shifter/shifter_platform
      - name: Download shifter_platform JS coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-shifter-platform-js
          path: shifter/shifter_platform/coverage
      - name: Download provisioner coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-provisioner
          path: shifter/engine/provisioner
      - name: Download packer coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-packer
          path: shifter/packer
      - name: Download bootstrap coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-bootstrap
          path: scripts/bootstrap
      - name: Download check_layer_imports coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-check-layer-imports
          path: scripts/check_layer_imports
      - name: Download installation coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-installation
          path: shifter/installation

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Project key, org, sources, exclusions, and coverage report
          # paths come from the repo-root sonar-project.properties. On
          # pull requests, wait for the SonarCloud quality gate so a
          # failing new-code gate fails this job (and, via the Quality
          # caller, the PR Gate check). Branch runs (push to dev) upload
          # analysis without blocking on pre-existing debt.
          args: ${{ github.event_name == 'pull_request' && '-Dsonar.qualitygate.wait=true' || '' }}
