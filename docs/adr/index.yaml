    "decision": "MCP servers in this repo fall into two classes. General-purpose MCP servers (where the client is not a trusted operator agent loop) must default to non-secret, non-mutating observability; privileged operations on those surfaces require a separate approved operator workflow with authenticated actor context, per-tool RBAC, environment allowlisting, and auditability, and otherwise must not be registered as tools. Operator agent surfaces (e.g. `mcp/ops`, where the intended client IS the operator's own agent loop and agents are meant to perform writes, mutations, secret retrieval, and remote execution as routine work) MAY expose privileged capability, but MUST gate it through a structured per-tool policy layer with capability classes, environment policy with explicit prod confirmation, dry-run defaults for destructive and arbitrary classes, secret references instead of raw values in MCP responses, structured per-call audit, session profile gating, and out-of-band confirmation for apex operations. Neither class may advertise auth-bypass procedures in tool descriptions reachable via MCP `list_tools`. Phased rollout for `mcp/ops`: this ADR is accepted at the design level; the runtime enforcement invariant of R5/R6 is delivered incrementally across issue #777 (introduces the policy seam in `mcp/ops/policy.js` + `.shifter.yaml`) and sub-issues #1198 (cheap defenses), #1199 (mid-cost), #1200 (expensive), #1201 (convert all 45 tool registrations), and #1202 (surface invariant tests). The invariant is fully enforced on the live server only when every sub-issue has shipped. Until then, the policy seam exists but `mcp/ops/index.js` still calls `server.tool(...)` directly, and `.shifter.yaml` / `SHIFTER_OPS_PROFILE` have no runtime effect on the registered tool surface.",
