{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Dev Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/xdr-theme.css' %}">
    <style>
        body {
            font-family: Lato, "Assistant", sans-serif;
            background: #1f1f1f;
            color: #eaebeb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #151515;
            padding: 2rem;
            border: 1px solid #484848;
            border-radius: 4px;
            max-width: 400px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .warning {
            background: #FF5252;
            color: #000;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            font-weight: 600;
            border-radius: 4px;
            font-size: 0.875rem;
        }
        p {
            color: #b8b8b8;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 0;
            margin-bottom: 1.5rem;
            background: #1f1f1f;
            border: none;
            border-bottom: 1px solid #575757;
            color: #eaebeb;
            font-family: Lato, "Assistant", sans-serif;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-bottom-color: #eaebeb;
        }
        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0.5rem 1.5rem;
            font-family: Lato, "Assistant", sans-serif;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            border-radius: 20px;
        }
        button:hover {
            background: #f4f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning">⚠ DEV MODE ONLY</div>
        <h1>Development Login</h1>
        <p>This bypasses OIDC for local testing.</p>
        <form method="post">
            {% csrf_token %}
            <input type="email" name="email" value="dev@example.com" placeholder="Email">
            <button type="submit">Login as Dev User</button>
        </form>
    </div>
</body>
</html>
