[global]
workgroup = BOREAS
server string = Boreas File Server
security = user
map to guest = Bad User
log level = 1

[Public]
path = /srv/shares/Public
browseable = yes
read only = yes
guest ok = yes

[HR]
path = /srv/shares/HR
browseable = yes
read only = yes
valid users = @hr @executives

[Procurement]
path = /srv/shares/Procurement
browseable = yes
read only = yes
valid users = @procurement @executives

[IT]
path = /srv/shares/IT
browseable = yes
read only = yes
valid users = @it

[Executive]
path = /srv/shares/Executive
browseable = yes
read only = yes
valid users = @executives
