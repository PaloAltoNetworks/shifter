name: polaris-operation-northstorm
description: >
  Operation NORTHSTORM against the fictional Boreas Systems front company.
  Five-mission red-team CTF: OSINT, front-office compromise, research-lab
  pivot, SCADA blackout, and underground OT platform. Expressed in the
  extended ACES SDL (22 sections) so a docker-plus-adjacent-VM backend
  can realise the entire stack.

variables:
  participant_count:
    type: integer
    default: 1
    description: Number of participant episodes this deployment will serve
  boreas_domain_password:
    type: string
    default: Boreas2025!
    description: Domain administrator password for BOREAS.LOCAL
  default_welcome_password:
    type: string
    default: Welcome1
    description: Corporate default password shared by stale accounts
  svc_backup_password:
    type: string
    default: Password1
    description: Weak Kerberoastable service-account password
  svc_scada_password:
    type: string
    default: Sc@da#2025!
    description: SCADA service-account password cached only on A15
  svc_fileshare_password:
    type: string
    default: F1l3Sh@r3Svc!
    description: File-share service-account password leaked via Kowalski email
  brain_auth_token:
    type: string
    default: a4f8e2c1d7b03965e8f2a1c4d7b03965
    description: Custom authentication token for A13 brain controller
  gpg_passphrase:
    type: string
    default: Pr0m3th3us_Unb0und_2024
    description: Passphrase protecting the GPG private key seeded on A8
  kali_splice_ipv4:
    type: string
    default: 172.20.60.100
    description: IP granted to the participant Kali on the splice-link after flag 19

# ---------------------------------------------------------------------------
# Nodes — compute + network topology (17 Boreas hosts, 1 Windows DC, 5 subnets
# + a sixth splice-link attached dynamically post-flag-19)
# ---------------------------------------------------------------------------

nodes:
  # ---- Switches / networks ----
  shared-net:
    type: Switch
    description: Shared services subnet (OSINT targets, DNS, Gitea)
  corporate-net:
    type: Switch
    description: Boreas corporate / front-office subnet
  lab-net:
    type: Switch
    description: Engineering / research lab subnet
  scada-net:
    type: Switch
    description: SCADA / OT subnet (reachable only via A15 pivot)
  bunker-ot-net:
    type: Switch
    description: Underground autonomous platform network (splice-gated)
  splice-link:
    type: Switch
    description: Post-blackout relay network attached dynamically after flag 19

  # ---- A0: Boreas public website ----
  a0-boreas-web:
    type: VM
    os: linux
    os_version: Alpine 3.19
    source: polaris/boreas-web
    resources: {ram: 512 mib, cpu: 1}
    features:
      nginx-static: web-admin
      boreas-dns-zone: dns-admin
    conditions:
      web-reachable: web-admin
    vulnerabilities: [dns-axfr-enabled, directory-listing-exposed, pdf-metadata-leak]
    roles:
      web-admin: {username: nginx}
      dns-admin: {username: bind}
    services:
      - {port: 80, name: boreas-http, role: participant-entry}
      - {port: 53, protocol: udp, name: boreas-dns, role: internal}
    asset_value: {confidentiality: low, integrity: medium, availability: medium}

  # ---- DNS sidecar ----
  dns-boreas:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/bind-sidecar
    resources: {ram: 256 mib, cpu: 1}
    features:
      bind-sidecar: dns-admin
    conditions:
      dns-healthy: dns-admin
    vulnerabilities: [dns-axfr-enabled]
    roles:
      dns-admin: {username: bind}
    services:
      - {port: 53, protocol: udp, name: internal-dns, role: internal}

  # ---- A1: mail / Roundcube ----
  a1-mail:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-mail
    resources: {ram: 1 gib, cpu: 1}
    features:
      postfix-smtp: mail-admin
      dovecot-imap: mail-admin
      roundcube-webmail: mail-admin
    conditions:
      mail-queue-healthy: mail-admin
    vulnerabilities: [information-disclosure-email]
    roles:
      mail-admin: {username: postfix}
    services:
      - {port: 25, name: smtp, role: internal}
      - {port: 143, name: imap, role: internal}
      - {port: 80, name: webmail, role: internal}
    asset_value: {confidentiality: high, integrity: medium, availability: medium}

  # ---- A2: Windows Server 2022 AD DC — VM, not container ----
  a2-dc01:
    type: VM
    os: windows
    os_version: Server 2022
    source: polaris/windows-ad-dc
    resources: {ram: 4 gib, cpu: 2}
    features:
      boreas-ad: domain-admin
    conditions:
      domain-auth-healthy: domain-admin
    vulnerabilities:
      - ad-kerberoastable-spn
      - ad-dcsync-overprivilege
      - ad-stale-disabled-account
      - ad-domain-admin-misconfig
    roles:
      domain-admin:
        username: Administrator
    services:
      - {port: 53, protocol: udp, name: ad-dns, role: internal}
      - {port: 88, name: kerberos, role: internal}
      - {port: 389, name: ldap, role: internal}
      - {port: 445, name: smb, role: internal}
      - {port: 636, name: ldaps, role: internal}
      - {port: 3268, name: gc-ldap, role: internal}
    asset_value: {confidentiality: critical, integrity: critical, availability: critical}

  # ---- A3: intranet Flask + SQLite ----
  a3-intranet:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-intranet
    resources: {ram: 1 gib, cpu: 1}
    features:
      flask-intranet: app-admin
    conditions:
      intranet-reachable: app-admin
    vulnerabilities:
      - sqli-search
      - lfi-download
      - dotenv-exposed
    roles:
      app-admin: {username: flask}
    services:
      - {port: 80, name: intranet-http, role: internal}
    asset_value: {confidentiality: high, integrity: medium, availability: medium}

  # ---- A4: Samba fileshare ----
  a4-fileshare:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-samba
    resources: {ram: 512 mib, cpu: 1}
    features:
      samba-fileshare: smb-admin
    conditions:
      smb-reachable: smb-admin
    vulnerabilities: [smb-overbroad-acls]
    roles:
      smb-admin: {username: root}
    services:
      - {port: 139, name: smb-netbios, role: internal}
      - {port: 445, name: smb, role: internal}
    asset_value: {confidentiality: high, integrity: medium, availability: low}

  # ---- A5: SCADA HMI + Modbus interlock ----
  a5-scada-gw:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-scada-gw
    resources: {ram: 512 mib, cpu: 1}
    features:
      flask-hmi: scada-admin
      pymodbus-interlock: scada-admin
    conditions:
      scada-hmi-reachable: scada-admin
      interlock-state-visible: scada-admin
    vulnerabilities:
      - modbus-no-auth
      - scada-hmi-cached-password
    roles:
      scada-admin: {username: scada}
    services:
      - {port: 8080, name: hmi-http, role: internal}
      - {port: 502, name: modbus, role: internal}
    asset_value: {confidentiality: high, integrity: critical, availability: critical}

  # ---- A6: engineering workstation ----
  a6-eng-ws01:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-workstation
    resources: {ram: 1 gib, cpu: 1}
    features:
      openssh-server: eng-admin
    conditions:
      ssh-reachable: eng-admin
    vulnerabilities:
      - ssh-password-auth
      - deleted-gpg-blob-recoverable
      - jenkins-credentials-file
    roles:
      eng-admin: {username: root}
    services:
      - {port: 22, name: ssh, role: internal}
    asset_value: {confidentiality: high, integrity: high, availability: medium}

  # ---- A7: Gitea ----
  a7-git:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-gitea
    resources: {ram: 1 gib, cpu: 1}
    features:
      gitea-server: git-admin
    conditions:
      gitea-reachable: git-admin
    vulnerabilities:
      - git-history-leaked-token
      - git-deleted-file-recoverable
      - gitea-repo-visibility-misconfig
    roles:
      git-admin: {username: git}
    services:
      - {port: 3000, name: gitea-http, role: internal}
    asset_value: {confidentiality: high, integrity: medium, availability: medium}

  # ---- A8: research database ----
  a8-research-db:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-postgres
    resources: {ram: 1 gib, cpu: 1}
    features:
      postgres-research-db: db-admin
    conditions:
      db-reachable: db-admin
    vulnerabilities:
      - security-definer-sqli
      - postgres-compartment-role-bypass
    roles:
      db-admin: {username: postgres}
    services:
      - {port: 5432, name: postgres, role: internal}
    asset_value: {confidentiality: critical, integrity: high, availability: medium}

  # ---- A9: splice landing ----
  a9-splice-landing:
    type: VM
    os: linux
    os_version: Alpine 3.19
    source: polaris/splice-landing
    resources: {ram: 256 mib, cpu: 1}
    features:
      openssh-server: splice-admin
    conditions:
      splice-reachable: splice-admin
    vulnerabilities: [ssh-key-only-post-gate]
    roles:
      splice-admin: {username: root}
    services:
      - {port: 22, name: ssh, role: internal}

  # ---- A10-A12: Modbus PLCs ----
  a10-tail-ctrl:
    type: VM
    os: linux
    os_version: Alpine 3.19
    source: polaris/pymodbus-plc
    resources: {ram: 256 mib, cpu: 1}
    features:
      pymodbus-plc: plc-admin
    conditions:
      plc-reachable: plc-admin
    vulnerabilities: [modbus-no-auth, modbus-stateful-unlock-sequence]
    roles:
      plc-admin: {username: root}
    services:
      - {port: 502, name: modbus, role: internal}

  a11-leg-ctrl:
    type: VM
    os: linux
    os_version: Alpine 3.19
    source: polaris/pymodbus-plc
    resources: {ram: 256 mib, cpu: 1}
    features:
      pymodbus-plc: plc-admin
    conditions:
      plc-reachable: plc-admin
    vulnerabilities: [modbus-no-auth, modbus-stateful-unlock-sequence]
    roles:
      plc-admin: {username: root}
    services:
      - {port: 502, name: modbus, role: internal}

  a12-arms-ctrl:
    type: VM
    os: linux
    os_version: Alpine 3.19
    source: polaris/pymodbus-plc
    resources: {ram: 256 mib, cpu: 1}
    features:
      pymodbus-plc: plc-admin
    conditions:
      plc-reachable: plc-admin
    vulnerabilities: [modbus-no-auth, modbus-stateful-unlock-sequence]
    roles:
      plc-admin: {username: root}
    services:
      - {port: 502, name: modbus, role: internal}

  # ---- A13: brain controller ----
  a13-brain-main:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/brain-controller
    resources: {ram: 512 mib, cpu: 1}
    features:
      custom-brain-protocol: brain-admin
    conditions:
      brain-reachable: brain-admin
    vulnerabilities: [brain-xor-handshake-reversible]
    roles:
      brain-admin: {username: root}
    services:
      - {port: 9100, name: brain-protocol, role: internal}

  # ---- A14: participant Kali ----
  a14-kali:
    type: VM
    os: linux
    os_version: Kali Rolling
    source: polaris/boreas-kali
    resources: {ram: 4 gib, cpu: 2}
    features:
      openssh-server: kali-admin
      xrdp-server: kali-admin
      claude-code-cli: kali-admin
    conditions:
      kali-ssh-reachable: kali-admin
      kali-rdp-reachable: kali-admin
    roles:
      kali-admin: {username: kali}
    services:
      - {port: 22, name: ssh, role: participant-entry}
      - {port: 3389, name: rdp, role: participant-entry}
    asset_value: {confidentiality: medium, integrity: medium, availability: high}

  # ---- A15: ops engineer workstation (SCADA pivot) ----
  a15-ops-eng01:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-workstation
    resources: {ram: 1 gib, cpu: 1}
    features:
      openssh-server: ops-admin
      flask-ops-telemetry: ops-admin
    conditions:
      ssh-reachable: ops-admin
    vulnerabilities:
      - sudo-arg-injection
      - default-password-reuse
    roles:
      ops-admin: {username: root}
    services:
      - {port: 22, name: ssh, role: internal}
      - {port: 80, name: ops-telemetry, role: internal}

  # ---- A16: research analyst workstation (Lab pivot) ----
  a16-research-analyst01:
    type: VM
    os: linux
    os_version: Debian 12
    source: polaris/boreas-workstation
    resources: {ram: 1 gib, cpu: 1}
    features:
      openssh-server: analyst-admin
    conditions:
      ssh-reachable: analyst-admin
    vulnerabilities:
      - default-password-reuse
      - ssh-key-only-research-user
    roles:
      analyst-admin: {username: root}
    services:
      - {port: 22, name: ssh, role: internal}

# ---------------------------------------------------------------------------
# Infrastructure — deployment topology, per-network IP plan, ACLs, replication
# ---------------------------------------------------------------------------

infrastructure:
  # Switches / subnets
  shared-net:
    count: 1
    properties: {cidr: 172.20.0.0/24, gateway: 172.20.0.1}
    replication: per_participant
  corporate-net:
    count: 1
    properties: {cidr: 172.20.10.0/24, gateway: 172.20.10.1}
    replication: per_participant
  lab-net:
    count: 1
    properties: {cidr: 172.20.30.0/24, gateway: 172.20.30.1}
    replication: per_participant
    acls:
      - name: deny-kali-to-lab
        direction: in
        from_net: corporate-net
        action: deny
        description: A14 has no route into lab-net; pivot through A16
  scada-net:
    count: 1
    properties: {cidr: 172.20.40.0/24, gateway: 172.20.40.1}
    replication: per_participant
    acls:
      - name: deny-kali-to-scada
        direction: in
        from_net: corporate-net
        action: deny
        description: A14 has no route into scada-net; pivot through A15
  bunker-ot-net:
    count: 1
    properties: {cidr: 172.20.50.0/24, gateway: 172.20.50.1, internal: true}
    replication: per_participant
    acls:
      - name: deny-default-to-bunker
        direction: in
        from_net: corporate-net
        action: deny
        description: Bunker OT is unreachable until the splice-link opens
  splice-link:
    count: 1
    properties: {cidr: 172.20.60.0/24, gateway: 172.20.60.1}
    replication: per_participant

  # Hosts (per-participant unless noted)
  a0-boreas-web:
    count: 1
    links: [shared-net]
    properties:
      - shared-net: 172.20.0.10
    replication: shared
  dns-boreas:
    count: 1
    links: [shared-net, corporate-net, lab-net]
    properties:
      - shared-net: 172.20.0.2
      - corporate-net: 172.20.10.2
      - lab-net: 172.20.30.2
  a1-mail:
    count: 1
    links: [corporate-net]
    properties:
      - corporate-net: 172.20.10.20
  a2-dc01:
    count: 1
    links: [corporate-net]
    properties:
      - corporate-net: 172.20.10.11
    replication: shared
    description: Windows DC — shared across a deployment; range-local DNS keeps forests isolated
  a3-intranet:
    count: 1
    links: [corporate-net]
    properties:
      - corporate-net: 172.20.10.30
  a4-fileshare:
    count: 1
    links: [corporate-net]
    properties:
      - corporate-net: 172.20.10.40
  a5-scada-gw:
    count: 1
    links: [scada-net]
    properties:
      - scada-net: 172.20.40.30
    replication: per_participant
  a6-eng-ws01:
    count: 1
    links: [lab-net]
    properties:
      - lab-net: 172.20.30.50
  a7-git:
    count: 1
    links: [shared-net, lab-net]
    properties:
      - shared-net: 172.20.0.20
      - lab-net: 172.20.30.20
    replication: shared
  a8-research-db:
    count: 1
    links: [lab-net]
    properties:
      - lab-net: 172.20.30.60
  a9-splice-landing:
    count: 1
    links: [bunker-ot-net, splice-link]
    properties:
      - bunker-ot-net: 172.20.50.10
      - splice-link: 172.20.60.10
  a10-tail-ctrl:
    count: 1
    links: [bunker-ot-net]
    properties:
      - bunker-ot-net: 172.20.50.20
  a11-leg-ctrl:
    count: 1
    links: [bunker-ot-net]
    properties:
      - bunker-ot-net: 172.20.50.30
  a12-arms-ctrl:
    count: 1
    links: [bunker-ot-net]
    properties:
      - bunker-ot-net: 172.20.50.40
  a13-brain-main:
    count: 1
    links: [bunker-ot-net]
    properties:
      - bunker-ot-net: 172.20.50.50
  a14-kali:
    count: 1
    links: [shared-net, corporate-net]
    properties:
      - shared-net: 172.20.0.14
      - corporate-net: 172.20.10.14
    replication: per_participant
  a15-ops-eng01:
    count: 1
    links: [corporate-net, scada-net]
    properties:
      - corporate-net: 172.20.10.50
      - scada-net: 172.20.40.20
  a16-research-analyst01:
    count: 1
    links: [corporate-net, lab-net]
    properties:
      - corporate-net: 172.20.10.60
      - lab-net: 172.20.30.5

