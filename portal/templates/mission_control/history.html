{% extends "mission_control/base.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">History</h1>
    <p class="page-subtitle">View your past range sessions</p>
</div>

<div class="card">
    <!-- Empty state -->
    <div class="empty-state" id="history-empty">
        <div class="empty-state-icon">[ ]</div>
        <p>No range history yet</p>
        <p style="font-size: 0.75rem; margin-top: 0.5rem;">
            Your past ranges will appear here
        </p>
    </div>

    <!-- History list (hidden when empty) -->
    <div id="history-list" style="display: none;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 1px solid var(--xsiam-border);">
                    <th style="text-align: left; padding: 0.75rem 0; font-weight: 600; font-size: 0.75rem; color: var(--xsiam-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;">DATE</th>
                    <th style="text-align: left; padding: 0.75rem 0; font-weight: 600; font-size: 0.75rem; color: var(--xsiam-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;">AGENT</th>
                    <th style="text-align: left; padding: 0.75rem 0; font-weight: 600; font-size: 0.75rem; color: var(--xsiam-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;">STATUS</th>
                    <th style="text-align: left; padding: 0.75rem 0; font-weight: 600; font-size: 0.75rem; color: var(--xsiam-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;">DURATION</th>
                    <th style="text-align: right; padding: 0.75rem 0; font-weight: 600; font-size: 0.75rem; color: var(--xsiam-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;">ACTIONS</th>
                </tr>
            </thead>
            <tbody id="history-tbody">
                <!-- Will be populated dynamically -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
