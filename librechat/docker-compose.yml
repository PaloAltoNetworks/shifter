# LibreChat Docker Compose
#
# Works for both local development and EC2 deployment.
# Deploy workflow copies this to EC2 and generates .env from secrets.
#
# Local usage:
#   1. Copy env.example to .env and configure
#   2. Run: docker compose up -d
#   3. Access: http://localhost:3080

services:
  api:
    container_name: librechat
    image: ghcr.io/danny-avila/librechat:latest
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - litellm
    env_file:
      - .env
    volumes:
      - ./images:/app/client/public/images
      - ./logs:/app/logs
      - ./librechat.yaml:/app/librechat.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # LiteLLM proxy for Bedrock inference profiles
  # Translates OpenAI-compatible requests to AWS Bedrock
  litellm:
    container_name: litellm
    image: ghcr.io/berriai/litellm:main-latest
    # Port not exposed to host - accessed via Docker network only
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set in .env}
      - AWS_REGION=${AWS_REGION:?AWS_REGION must be set in .env}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped

  mongodb:
    container_name: librechat-mongodb
    image: mongo:7
    volumes:
      - ./data/mongodb:/data/db
    command: mongod --noauth
    restart: unless-stopped
