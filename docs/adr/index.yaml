    "scope": "platform/k8s",
    "decision": "All Kubernetes namespaces enforce the restricted Pod Security Standard. Workloads must define security contexts, and each namespace must have NetworkPolicies.",
    "rules": [
      {
        "id": "ADR-006-R1",
        "description": "Namespace manifests must carry pod-security.kubernetes.io/enforce labels.",
        "checks": []
      },
      {
        "id": "ADR-006-R2",
        "description": "Containers must define securityContext with non-root and read-only root filesystem.",
        "checks": []
      },
      {
        "id": "ADR-006-R3",
        "description": "Each namespace must have at least one NetworkPolicy (deferred until policies are authored).",
        "checks": []
      }
    ],
    "exceptions": [],
    "enforcement": ["pre-commit", "ci"],
    "evidence": [
      "platform/k8s/gcp/base/namespaces.yaml",
      ".kube-linter.yaml",
