apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-web
  namespace: shifter-platform
spec:
  template:
    spec:
      containers:
        - name: portal
          envFrom:
            - configMapRef:
                name: platform-runtime
            - secretRef:
                name: platform-runtime-secrets
