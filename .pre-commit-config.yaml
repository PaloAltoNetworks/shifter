fail_fast: true

repos:
  # Python - Ruff (linting + formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff
        name: ruff (shifter_platform)
        args: [--fix]
        files: ^shifter/shifter_platform/
      - id: ruff-format
        name: ruff-format (shifter_platform)
        files: ^shifter/shifter_platform/
      - id: ruff
        name: ruff (provisioner)
        args: [--fix]
        files: ^shifter/engine/provisioner/
      - id: ruff-format
        name: ruff-format (provisioner)
        files: ^shifter/engine/provisioner/
      - id: ruff
        name: ruff (packer)
        args: [--fix]
        files: ^shifter/packer/
      - id: ruff-format
        name: ruff-format (packer)
        files: ^shifter/packer/
      - id: ruff
        name: ruff (bootstrap)
        args: [--fix]
        files: ^scripts/bootstrap/
      - id: ruff-format
        name: ruff-format (bootstrap)
        files: ^scripts/bootstrap/
      - id: ruff
        name: ruff (check_layer_imports)
        args: [--fix]
        files: ^scripts/check_layer_imports/
      - id: ruff-format
        name: ruff-format (check_layer_imports)
        files: ^scripts/check_layer_imports/

  # Python - Tests (shifter_platform)
  - repo: local
    hooks:
      - id: pytest-shifter
        name: pytest (shifter_platform)
        entry: bash -c 'cd shifter/shifter_platform && source .venv/bin/activate && TESTING=1 python -m pytest tests/ --ignore=tests/documentation --ignore=tests/risk_register -q --cov=. --cov-report=html:../../coverage/shifter_platform --cov-report=xml:coverage.xml --cov-report=term-missing:skip-covered'
        language: system
        files: ^shifter/shifter_platform/
        pass_filenames: false

  # Python - Security (bandit)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        name: bandit (shifter_platform)
        args: [-r, --skip, B101]
        files: ^shifter/shifter_platform/
        exclude: ^shifter/shifter_platform/(tests|\.venv)/
      - id: bandit
        name: bandit (provisioner)
        args: [-r, --skip, B101]
        files: ^shifter/engine/provisioner/
        exclude: ^shifter/engine/provisioner/(tests|\.venv)/
      - id: bandit
        name: bandit (packer)
        args: [-r, --skip, B101]
        files: ^shifter/packer/
        exclude: ^shifter/packer/(tests|\.venv)/
      - id: bandit
        name: bandit (bootstrap)
        args: [-r, --skip, B101]
        files: ^scripts/bootstrap/
        exclude: ^scripts/bootstrap/(tests|\.venv)/
      - id: bandit
        name: bandit (check_layer_imports)
        args: [-r, --skip, "B101,B112"]
        files: ^scripts/check_layer_imports/
        exclude: ^scripts/check_layer_imports/(tests|\.venv)/

  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^assets/styles/
      - id: check-yaml
        args: [--unsafe] # Allow custom YAML constructors (mkdocs plugins)
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^(shifter/engine/provisioner/tests/|shifter/shifter_platform/tests/engine/ssh/) # Tests check key format strings

  # JavaScript/CSS - shifter_platform linting
  - repo: local
    hooks:
      - id: eslint-shifter-platform
        name: eslint (shifter_platform)
        entry: bash -c 'cd shifter/shifter_platform && npx eslint --fix static/js/'
        language: system
        files: ^shifter/shifter_platform/static/js/.*\.js$
        types: [javascript]

      - id: stylelint-shifter-platform
        name: stylelint (shifter_platform)
        entry: bash -c 'cd shifter/shifter_platform && npx stylelint --fix static/css/'
        language: system
        files: ^shifter/shifter_platform/static/css/.*\.css$
        types: [css]

      - id: jest-shifter-platform
        name: jest (shifter_platform)
        entry: bash -c 'cd shifter/shifter_platform && npm test -- --coverage --coverageReporters=lcov --coverageReporters=text-summary --coverageDirectory=../../coverage/js'
        language: system
        files: ^shifter/shifter_platform/static/js/.*\.js$
        pass_filenames: false

  # Packer tests
  - repo: local
    hooks:
      - id: pytest-packer
        name: pytest (packer)
        entry: bash -c 'cd shifter/packer && uv run pytest tests/ -q --cov=. --cov-report=html:../../coverage/packer --cov-report=xml:coverage.xml --cov-report=term-missing:skip-covered'
        language: system
        files: ^shifter/packer/
        pass_filenames: false

  # Provisioner tests
  - repo: local
    hooks:
      - id: pytest-provisioner
        name: pytest (provisioner)
        entry: bash -c 'cd shifter/engine/provisioner && source .venv/bin/activate && TESTING=1 python -m pytest tests/ -q --cov=. --cov-report=html:../../../coverage/provisioner --cov-report=xml:coverage.xml --cov-report=term-missing:skip-covered'
        language: system
        files: ^shifter/engine/provisioner/
        pass_filenames: false

  # Bootstrap tests
  - repo: local
    hooks:
      - id: pytest-bootstrap
        name: pytest (bootstrap)
        entry: bash -c 'cd scripts/bootstrap && uv run pytest tests/ -q --cov=. --cov-report=html:../../coverage/bootstrap --cov-report=xml:coverage.xml --cov-report=term-missing:skip-covered'
        language: system
        files: ^scripts/bootstrap/
        pass_filenames: false

  # Check layer imports tests
  - repo: local
    hooks:
      - id: pytest-check-layer-imports
        name: pytest (check_layer_imports)
        entry: bash -c 'cd scripts/check_layer_imports && uv run pytest tests/ -q --cov=. --cov-report=html:../../coverage/check_layer_imports --cov-report=xml:coverage.xml --cov-report=term-missing:skip-covered'
        language: system
        files: ^scripts/check_layer_imports/
        pass_filenames: false

  # Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      - id: terraform_fmt
        files: ^platform/terraform/
      - id: terraform_validate
        files: ^platform/terraform/

  # IaC Security (Terraform, Dockerfile)
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.346
    hooks:
      - id: checkov
        files: ^platform/terraform/
        args:
          [--quiet, --compact, --directory, platform/terraform/, --soft-fail]

  # Shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/

  # Architecture checks (informational - non-blocking)
  - repo: local
    hooks:
      - id: check-layer-imports
        name: architecture (layer imports)
        entry: bash -c 'python scripts/check_layer_imports/check_layer_imports.py || true'
        language: system
        files: ^shifter/shifter_platform/
        pass_filenames: false
        verbose: true

      - id: check-model-fks
        name: architecture (model FKs)
        entry: bash -c 'cd shifter/shifter_platform && source .venv/bin/activate && TESTING=1 python manage.py check_model_fks || true'
        language: system
        files: ^shifter/shifter_platform/
        pass_filenames: false
        verbose: true
