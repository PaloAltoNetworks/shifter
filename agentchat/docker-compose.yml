# AgentChat Local Development Stack
#
# Runs OpenWebUI, Bedrock Access Gateway (BAG), and mcp-shifter locally.
#
# Prerequisites:
# - AWS credentials configured (for Bedrock and Secrets Manager access)
# - PostgreSQL database for OpenWebUI (or use the dev environment's RDS)
#
# Usage:
#   cp .env.example .env
#   # Edit .env with your values
#   docker-compose up -d
#
# Note: For production deployment, see the GitHub Actions workflow in
# .github/workflows/agentchat.yml which deploys to EC2 via SSM.

services:
  bedrock-gateway:
    build:
      context: https://github.com/Brad-Edwards/bedrock-access-gateway.git
      dockerfile: src/Dockerfile_ecs
    container_name: bedrock-gateway
    restart: unless-stopped
    networks:
      - agentchat
    ports:
      - "8000:8080"
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-2}
      - API_KEY=${BAG_API_KEY}
      # Pass AWS credentials from host
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN

  mcp-shifter:
    build:
      context: ../mcp/mcp-shifter
      dockerfile: Dockerfile
    container_name: mcp-shifter
    restart: unless-stopped
    networks:
      - agentchat
    ports:
      - "3001:3001"
    volumes:
      - ./mcp-config:/app/config:ro
    environment:
      - PORT=3001
      - CONFIG_PATH=/app/config/config.json
      - AWS_REGION=${AWS_REGION:-us-east-2}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - COGNITO_ISSUER=${COGNITO_ISSUER}
      - RDS_HOSTNAME=${RDS_HOSTNAME}
      - RDS_PORT=${RDS_PORT:-5432}
      - RDS_DATABASE=${RDS_DATABASE}
      - RDS_USERNAME=${RDS_USERNAME:-mcp_user}
      # Pass AWS credentials from host (for RDS IAM auth and Secrets Manager)
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
    depends_on:
      - bedrock-gateway
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.41
    container_name: open-webui
    restart: unless-stopped
    networks:
      - agentchat
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=
      - ENABLE_OLLAMA_API=false
      - OPENAI_API_BASE_URL=http://bedrock-gateway:8080/api/v1
      - OPENAI_API_KEY=${BAG_API_KEY}
      - BYPASS_ADMIN_ACCESS_CONTROL=false
      - DATABASE_URL=${DATABASE_URL}
      # OIDC Configuration (Cognito)
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_PROVIDER_NAME=Cognito
      - OPENID_PROVIDER_URL=${COGNITO_ISSUER}
      - OAUTH_CLIENT_ID=${COGNITO_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${COGNITO_CLIENT_SECRET}
      - OAUTH_SCOPES=openid email profile
      - WEBUI_URL=${WEBUI_URL:-http://localhost:8080}
    depends_on:
      - bedrock-gateway
      - mcp-shifter
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  agentchat:
    driver: bridge
