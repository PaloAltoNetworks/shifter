id: ad_attack_lab
name: AD Attack Lab
description: Active Directory attack lab with domain controller, Kali attacker, and domain-joined Windows victim.
enabled: true
ngfw: false

instances:
  - name: Attacker
    role: attacker
    os_type: kali
    xdr_agent: false

  - name: Domain Controller
    role: dc
    os_type: windows
    domain_controller: true
    xdr_agent: true
    dc_config:
      domain_name: basicadlab.lab
      netbios_name: BASICADLAB

  - name: Workstation
    role: victim
    os_type: from_agent
    xdr_agent: true
    join_domain: true

subnets:
  - name: core
    instances: [Attacker, Domain Controller, Workstation]
