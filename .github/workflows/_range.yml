name: Range

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      github_environment:
        required: true
        type: string
      is_dev:
        required: true
        type: boolean
      apply_changes:
        required: true
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_ROLE_ARN_DEV:
        required: true
      # Whole-file local.auto.tfvars payload per environment. The committed
      # terraform.tfvars is an example baseline; real per-deployment range
      # values are rendered from these secrets before plan/apply. Declared
      # required: false because GitHub evaluates reusable-workflow secrets at
      # dispatch time; the render step fails loud for the active environment.
      TF_VARS_DEV_RANGE:
        required: false
      TF_VARS_PROD_RANGE:
        required: false

jobs:
  plan:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    name: Plan (${{ inputs.environment }})
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: platform/terraform/environments/${{ inputs.environment }}/range
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.3"
      - run: terraform fmt -check -recursive
        working-directory: platform/terraform
      - name: Render local.auto.tfvars from deployment secret
        env:
          IS_DEV: ${{ inputs.is_dev }}
          TF_VARS_DEV_RANGE: ${{ secrets.TF_VARS_DEV_RANGE }}
          TF_VARS_PROD_RANGE: ${{ secrets.TF_VARS_PROD_RANGE }}
        run: |
          # Select strictly on inputs.is_dev. Do not use an
          # `is_dev && DEV_SECRET || PROD_SECRET` expression here: an empty
          # active-environment secret is falsy and can fall through to the
          # other environment's secret instead of failing loud.
          if [ "${IS_DEV}" = "true" ]; then
            RANGE_SECRET_NAME="TF_VARS_DEV_RANGE"
            TF_VARS_RANGE="${TF_VARS_DEV_RANGE}"
          else
            RANGE_SECRET_NAME="TF_VARS_PROD_RANGE"
            TF_VARS_RANGE="${TF_VARS_PROD_RANGE}"
          fi
          if [ -z "${TF_VARS_RANGE}" ]; then
            echo "::error::Required secret ${RANGE_SECRET_NAME} is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          printf '%s\n' "${TF_VARS_RANGE}" > local.auto.tfvars
      - run: terraform init -backend-config=${{ inputs.environment }}.s3.tfbackend
      - run: terraform validate
      - run: terraform plan -no-color -lock-timeout=5m -out=tfplan && terraform show -no-color tfplan > plan.txt
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('platform/terraform/environments/${{ inputs.environment }}/range/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan - Range (${{ inputs.environment }})\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`
            });

  apply:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    name: Apply (${{ inputs.environment }})
    runs-on: self-hosted
    environment: ${{ inputs.github_environment }}
    needs: plan
    if: |
      always() &&
      inputs.apply_changes &&
      (needs.plan.result == 'success' || needs.plan.result == 'skipped') &&
      github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: platform/terraform/environments/${{ inputs.environment }}/range
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.3"
      - name: Render local.auto.tfvars from deployment secret
        env:
          IS_DEV: ${{ inputs.is_dev }}
          TF_VARS_DEV_RANGE: ${{ secrets.TF_VARS_DEV_RANGE }}
          TF_VARS_PROD_RANGE: ${{ secrets.TF_VARS_PROD_RANGE }}
        run: |
          # Keep the apply job's rendering logic identical to plan so the
          # applied values cannot diverge from the reviewed plan inputs.
          if [ "${IS_DEV}" = "true" ]; then
            RANGE_SECRET_NAME="TF_VARS_DEV_RANGE"
            TF_VARS_RANGE="${TF_VARS_DEV_RANGE}"
          else
            RANGE_SECRET_NAME="TF_VARS_PROD_RANGE"
            TF_VARS_RANGE="${TF_VARS_PROD_RANGE}"
          fi
          if [ -z "${TF_VARS_RANGE}" ]; then
            echo "::error::Required secret ${RANGE_SECRET_NAME} is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          printf '%s\n' "${TF_VARS_RANGE}" > local.auto.tfvars
      - run: terraform init -backend-config=${{ inputs.environment }}.s3.tfbackend
      - run: terraform plan -no-color -lock-timeout=5m -out=tfplan && terraform show -no-color tfplan
      - run: terraform apply -lock-timeout=5m tfplan
      - run: terraform output -json
