name: Platform

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      is_dev:
        required: true
        type: boolean
      apply_changes:
        required: true
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_ROLE_ARN_DEV:
        required: true
      PLATFORM_BOOTSTRAP_STAFF_EMAILS:
        required: false
      PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS:
        required: false
      # Whole-file local.auto.tfvars payload per environment. The committed
      # terraform.tfvars is an example.com baseline; the real per-deployment
      # values are rendered from these secrets before plan/apply. Declared
      # required: false — the render step fails loud when the active
      # environment's secret is empty. See docs/dev/deploy-secrets.md.
      TF_VARS_DEV_PORTAL:
        required: false
      TF_VARS_PROD_PORTAL:
        required: false

jobs:
  plan:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    name: Plan (${{ inputs.environment }})
    runs-on: self-hosted
    needs: push-guacamole-images
    if: |
      always() &&
      (needs.push-guacamole-images.result == 'success' ||
       needs.push-guacamole-images.result == 'skipped')
    defaults:
      run:
        working-directory: platform/terraform/environments/${{ inputs.environment }}/portal
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.3"
      - run: terraform fmt -check -recursive
        working-directory: platform/terraform
      - name: Render local.auto.tfvars from deployment secret
        # The committed terraform.tfvars ships an example.com baseline that
        # fails-loud on apply. Each deployment provides its real values via the
        # TF_VARS_<ENV>_PORTAL GitHub secret; this step renders that payload
        # into a gitignored local.auto.tfvars that Terraform auto-loads over
        # the baseline before plan and apply. See docs/dev/deploy-secrets.md.
        env:
          IS_DEV: ${{ inputs.is_dev }}
          TF_VARS_DEV_PORTAL: ${{ secrets.TF_VARS_DEV_PORTAL }}
          TF_VARS_PROD_PORTAL: ${{ secrets.TF_VARS_PROD_PORTAL }}
        run: |
          # Select strictly on inputs.is_dev. A GitHub Actions
          # `is_dev && DEV_SECRET || PROD_SECRET` expression is unsafe: an
          # empty active-environment secret is falsy and falls through to
          # the other environment's secret. Selecting in shell keeps an
          # empty active secret empty so the check below trips fail-loud.
          if [ "${IS_DEV}" = "true" ]; then
            PORTAL_SECRET_NAME="TF_VARS_DEV_PORTAL"
            TF_VARS_PORTAL="${TF_VARS_DEV_PORTAL}"
          else
            PORTAL_SECRET_NAME="TF_VARS_PROD_PORTAL"
            TF_VARS_PORTAL="${TF_VARS_PROD_PORTAL}"
          fi
          if [ -z "${TF_VARS_PORTAL}" ]; then
            echo "::error::Required secret ${PORTAL_SECRET_NAME} is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          printf '%s\n' "${TF_VARS_PORTAL}" > local.auto.tfvars
      - run: terraform init -backend-config=${{ inputs.environment }}.s3.tfbackend
      - run: terraform validate
      - run: terraform plan -no-color -lock-timeout=5m -out=tfplan && terraform show -no-color tfplan > plan.txt
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('platform/terraform/environments/${{ inputs.environment }}/portal/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan - Platform (${{ inputs.environment }})\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`
            });

  push-guacamole-images:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    name: Push Guacamole Images (${{ inputs.environment }})
    runs-on: self-hosted
    if: |
      inputs.apply_changes &&
      github.event_name != 'pull_request'
    env:
      GUACD_REPO: ${{ inputs.is_dev && 'shifter-dev-guacd' || 'shifter-guacd' }}
      GUACAMOLE_CLIENT_REPO: ${{ inputs.is_dev && 'shifter-dev-guacamole-client' || 'shifter-guacamole-client' }}
      GUACAMOLE_VERSION: "1.5.5"
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push guacd image (with RDP file transfer support)
        uses: docker/build-push-action@v5
        with:
          context: ./shifter/engine/guacd
          push: true
          build-args: |
            GUACAMOLE_VERSION=${{ env.GUACAMOLE_VERSION }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.GUACD_REPO }}:${{ env.GUACAMOLE_VERSION }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.GUACD_REPO }}:latest
          no-cache: true
      - name: Build and push guacamole-client image (with OIDC extension)
        uses: docker/build-push-action@v5
        with:
          context: ./shifter/engine/guacamole
          push: true
          build-args: |
            GUACAMOLE_VERSION=${{ env.GUACAMOLE_VERSION }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.GUACAMOLE_CLIENT_REPO }}:${{ env.GUACAMOLE_VERSION }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.GUACAMOLE_CLIENT_REPO }}:latest
          no-cache: true

  apply:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    name: Apply (${{ inputs.environment }})
    runs-on: self-hosted
    needs: [plan, push-guacamole-images]
    if: |
      always() &&
      inputs.apply_changes &&
      (needs.plan.result == 'success' || needs.plan.result == 'skipped') &&
      (needs.push-guacamole-images.result == 'success' || needs.push-guacamole-images.result == 'skipped') &&
      github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: platform/terraform/environments/${{ inputs.environment }}/portal
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.3"
      - name: Render local.auto.tfvars from deployment secret
        # The committed terraform.tfvars ships an example.com baseline that
        # fails-loud on apply. Each deployment provides its real values via the
        # TF_VARS_<ENV>_PORTAL GitHub secret; this step renders that payload
        # into a gitignored local.auto.tfvars that Terraform auto-loads over
        # the baseline before plan and apply. See docs/dev/deploy-secrets.md.
        env:
          IS_DEV: ${{ inputs.is_dev }}
          TF_VARS_DEV_PORTAL: ${{ secrets.TF_VARS_DEV_PORTAL }}
          TF_VARS_PROD_PORTAL: ${{ secrets.TF_VARS_PROD_PORTAL }}
        run: |
          # Select strictly on inputs.is_dev. A GitHub Actions
          # `is_dev && DEV_SECRET || PROD_SECRET` expression is unsafe: an
          # empty active-environment secret is falsy and falls through to
          # the other environment's secret. Selecting in shell keeps an
          # empty active secret empty so the check below trips fail-loud.
          if [ "${IS_DEV}" = "true" ]; then
            PORTAL_SECRET_NAME="TF_VARS_DEV_PORTAL"
            TF_VARS_PORTAL="${TF_VARS_DEV_PORTAL}"
          else
            PORTAL_SECRET_NAME="TF_VARS_PROD_PORTAL"
            TF_VARS_PORTAL="${TF_VARS_PROD_PORTAL}"
          fi
          if [ -z "${TF_VARS_PORTAL}" ]; then
            echo "::error::Required secret ${PORTAL_SECRET_NAME} is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          printf '%s\n' "${TF_VARS_PORTAL}" > local.auto.tfvars
      - run: terraform init -backend-config=${{ inputs.environment }}.s3.tfbackend
      - name: Handle Service Discovery replacement
        env:
          ENV: ${{ inputs.environment }}
        run: |
          # Check if Service Discovery service needs replacement
          echo "Running terraform plan to check for Service Discovery changes..."
          terraform plan -detailed-exitcode -lock-timeout=5m -out=tfplan 2>&1 || PLAN_EXIT=$?

          echo "Plan exit code: ${PLAN_EXIT:-0}"

          # Exit code 2 means there are changes
          if [ "${PLAN_EXIT:-0}" = "2" ]; then
            # Check if service discovery service is being deleted/replaced
            echo "Checking plan for Service Discovery changes..."
            if terraform show -json tfplan | jq -e '.resource_changes[]? | select(.address | contains("service_discovery_service")) | select(.change.actions | index("delete"))' > /dev/null 2>&1; then
              echo "Service Discovery service deletion detected - scaling down ECS services first"

              # Find the Guacamole ECS cluster using AWS CLI directly (pattern: {env}-portal-guacamole)
              CLUSTER_NAME="${ENV}-portal-guacamole"
              echo "Looking for Guacamole cluster: $CLUSTER_NAME"

              # Verify cluster exists
              if aws ecs describe-clusters --clusters "$CLUSTER_NAME" --query "clusters[0].status" --output text 2>/dev/null | grep -q "ACTIVE"; then
                echo "Found active Guacamole cluster: $CLUSTER_NAME"

                # Scale down guacd service to deregister from Service Discovery
                GUACD_SERVICE="${ENV}-portal-guacd"
                echo "Scaling down guacd service: $GUACD_SERVICE"

                if aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$GUACD_SERVICE" --query "services[0].status" --output text 2>/dev/null | grep -q "ACTIVE"; then
                  echo "Scaling guacd service to 0..."
                  aws ecs update-service --cluster "$CLUSTER_NAME" --service "$GUACD_SERVICE" --desired-count 0 --no-cli-pager

                  # Wait for tasks to drain (max 2 minutes)
                  # shellcheck disable=SC2034
                  for i in $(seq 1 24); do
                    RUNNING=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$GUACD_SERVICE" --query "services[0].runningCount" --output text 2>/dev/null || echo "0")
                    if [ "$RUNNING" = "0" ]; then
                      echo "All guacd tasks stopped"
                      break
                    fi
                    echo "Waiting for tasks to stop... ($RUNNING running)"
                    sleep 5
                  done

                  # Give Service Discovery time to deregister
                  echo "Waiting for Service Discovery to deregister instances..."
                  sleep 15
                else
                  echo "guacd service not found or not active"
                fi
              else
                echo "Guacamole cluster not found or not active"
              fi
            else
              echo "No Service Discovery deletion in plan"
            fi
          else
            echo "No changes detected or plan succeeded without changes"
          fi

          rm -f tfplan
      - run: terraform apply -auto-approve
      - name: Verify RDS pending modifications applied (dev only)
        # Dev opts into apply_immediately=true so any post-apply
        # PendingModifiedValues means the deploy is incomplete. Prod
        # deliberately keeps apply_immediately=false so RDS changes flow
        # through the configured maintenance window — running the check
        # there would fail every legitimate prod deploy.
        # See scripts/check_rds_pending_modifications/check_rds_pending_modifications.py
        # and dev/terraform.md "RDS Change Application".
        if: inputs.is_dev
        working-directory: platform/terraform/environments/${{ inputs.environment }}/portal
        run: |
          python3 "${GITHUB_WORKSPACE}/scripts/check_rds_pending_modifications/check_rds_pending_modifications.py" \
            --tf-outputs-from .
      - name: Wait for Guacamole ECS services to stabilize
        env:
          ENV: ${{ inputs.environment }}
        run: |
          CLUSTER_NAME="${ENV}-portal-guacamole"
          GUACD_SERVICE="${ENV}-portal-guacd"
          CLIENT_SERVICE="${ENV}-portal-guacamole-client"

          # Check if cluster exists
          if ! aws ecs describe-clusters --clusters "$CLUSTER_NAME" --query "clusters[0].status" --output text 2>/dev/null | grep -q "ACTIVE"; then
            echo "Guacamole cluster not found, skipping stability check"
            exit 0
          fi

          # If services are stuck in FAILED state (e.g. from a prior failed deploy),
          # force a new deployment so they retry with the now-available images
          for SVC in "$GUACD_SERVICE" "$CLIENT_SERVICE"; do
            STATE=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SVC" \
              --query "services[0].deployments[?status=='PRIMARY'] | [0].rolloutState" \
              --output text 2>/dev/null || echo "UNKNOWN")
            if [ "$STATE" = "FAILED" ]; then
              echo "::warning::$SVC deployment is FAILED — forcing new deployment"
              aws ecs update-service --cluster "$CLUSTER_NAME" --service "$SVC" --force-new-deployment --no-cli-pager
            fi
          done

          echo "Waiting for Guacamole ECS services to stabilize..."

          # Poll with extended timeout (40 × 30s = 20min)
          # Default aws ecs wait (10min) is too short for first deploy
          # where RDS init + schema creation + JVM startup can take a while
          ATTEMPTS=0
          MAX_ATTEMPTS=40
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            GUACD_STATUS=$(aws ecs describe-services --cluster "$CLUSTER_NAME" \
              --services "$GUACD_SERVICE" \
              --query "services[0].deployments[?status=='PRIMARY'] | [0].rolloutState" \
              --output text 2>/dev/null || echo "UNKNOWN")

            CLIENT_STATUS=$(aws ecs describe-services --cluster "$CLUSTER_NAME" \
              --services "$CLIENT_SERVICE" \
              --query "services[0].deployments[?status=='PRIMARY'] | [0].rolloutState" \
              --output text 2>/dev/null || echo "UNKNOWN")

            echo "guacd: $GUACD_STATUS | guacamole-client: $CLIENT_STATUS"

            if [ "$GUACD_STATUS" = "COMPLETED" ] && [ "$CLIENT_STATUS" = "COMPLETED" ]; then
              echo "Guacamole ECS services are stable"
              exit 0
            fi

            # Fail fast if circuit breaker triggered a rollback
            if [ "$GUACD_STATUS" = "FAILED" ] || [ "$CLIENT_STATUS" = "FAILED" ]; then
              echo "::error::Deployment failed — circuit breaker triggered rollback"
              exit 1
            fi

            ATTEMPTS=$((ATTEMPTS + 1))
            sleep 30
          done

          # Timeout is a failed deploy, not a warning: a green run that leaves
          # Guacamole unstable reproduces the event-day inconsistent-RDP symptom
          # with no pipeline evidence. The FAILED circuit-breaker branch above
          # already exits 1; the timeout must too. If first boot legitimately
          # needs longer, raise MAX_ATTEMPTS rather than downgrading the result.
          echo "::error::Guacamole ECS services did not stabilize within 20 minutes (guacd: $GUACD_STATUS | guacamole-client: $CLIENT_STATUS) on cluster $CLUSTER_NAME. Inspect the ECS service events for $GUACD_SERVICE / $CLIENT_SERVICE."
          exit 1

  build:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    name: Build (${{ inputs.environment }})
    runs-on: self-hosted
    needs: apply
    if: inputs.apply_changes && github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.sha.outputs.short }}
    env:
      ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-portal' || 'shifter-portal' }}
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./shifter
          file: ./shifter/shifter_platform/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.sha.outputs.short }}
          no-cache: true

  deploy:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    name: Deploy (${{ inputs.environment }})
    runs-on: self-hosted
    needs: build
    if: inputs.apply_changes && github.event_name != 'pull_request'
    env:
      AWS_REGION: us-east-2
      ENV: ${{ inputs.environment }}
      PS_PREFIX: /shifter/${{ inputs.environment }}/portal
      INSTANCE_TAG: ${{ inputs.is_dev && 'dev-portal-ec2' || 'prod-portal-ec2' }}
      PLATFORM_BOOTSTRAP_STAFF_EMAILS: ${{ secrets.PLATFORM_BOOTSTRAP_STAFF_EMAILS }}
      PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS: ${{ secrets.PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get deployment config
        id: config
        env:
          # `vars` are repository / environment variables managed in
          # GitHub settings; this avoids parsing the committed example
          # tfvars baseline. Default `false` for safety — autoscaling
          # opts in explicitly per environment.
          ENABLE_AUTOSCALING: ${{ vars.AWS_PORTAL_ENABLE_AUTOSCALING || 'false' }}
        run: |
          echo "enable_autoscaling=${ENABLE_AUTOSCALING}" >> "$GITHUB_OUTPUT"

      - name: Update Parameter Store with new image tag
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          echo "Updating Parameter Store with image tag: ${IMAGE_TAG}"
          aws ssm put-parameter \
            --name "${PS_PREFIX}/image-tag" \
            --value "${IMAGE_TAG}" \
            --type String \
            --overwrite
          echo "Parameter Store updated successfully"

      - name: Update bootstrap admin parameters
        run: |
          sync_optional_secure_param() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              aws ssm put-parameter \
                --name "$name" \
                --value "$value" \
                --type SecureString \
                --overwrite
            else
              aws ssm delete-parameter --name "$name" 2>/dev/null || true
            fi
          }

          sync_optional_secure_param "${PS_PREFIX}/platform-bootstrap-staff-emails" "${PLATFORM_BOOTSTRAP_STAFF_EMAILS}"
          sync_optional_secure_param "${PS_PREFIX}/platform-bootstrap-superuser-emails" "${PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS}"

      - name: Get Instance ID (single instance mode)
        id: instance
        if: steps.config.outputs.enable_autoscaling != 'true'
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running Platform EC2 instance with tag: $INSTANCE_TAG"; exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Get ASG Name (ASG mode)
        id: asg
        if: steps.config.outputs.enable_autoscaling == 'true'
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?contains(AutoScalingGroupName, '${ENV}-portal-asg')].AutoScalingGroupName | [0]" \
            --output text)
          if [ "$ASG_NAME" == "None" ] || [ -z "$ASG_NAME" ]; then
            echo "Error: Could not find ASG with name containing: ${ENV}-portal-asg"; exit 1
          fi
          echo "asg_name=$ASG_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM (single instance mode)
        if: steps.config.outputs.enable_autoscaling != 'true'
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          echo "Deploying to single instance: $INSTANCE_ID"

          # Wait for cloud-init to complete
          for i in $(seq 1 30); do
            RESULT=$(aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["cloud-init status --wait || cloud-init status"]' \
              --query "Command.CommandId" --output text 2>/dev/null) || true
            if [ -n "$RESULT" ]; then
              sleep 10
              STATUS=$(aws ssm get-command-invocation --command-id "$RESULT" --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text 2>/dev/null) || true
              if echo "$STATUS" | grep -q "done"; then echo "Cloud-init complete"; break; fi
            fi
            echo "Attempt $i: Waiting for cloud-init..."; sleep 10
          done

          # Deploy script reads config from Parameter Store and restarts containers
          DEPLOY_SCRIPT=$(cat << 'EOFSCRIPT'
          set -euo pipefail
          AWS_REGION="us-east-2"
          PS_PREFIX="__PS_PREFIX__"

          get_param() { aws ssm get-parameter --name "$1" --with-decryption --query 'Parameter.Value' --output text --region "$AWS_REGION"; }
          validate_bootstrap_email_list() {
            local name="$1"
            local value="$2"
            if [[ -n "$value" && ! "$value" =~ ^[A-Za-z0-9._%+@,-]+$ ]]; then
              echo "Invalid $name: expected a comma-separated email list"
              exit 1
            fi
          }

          IMAGE_TAG=$(get_param "$PS_PREFIX/image-tag")
          ECR_REGISTRY=$(get_param "$PS_PREFIX/ecr-registry")
          ECR_REPOSITORY=$(get_param "$PS_PREFIX/ecr-repository")
          DOMAIN_NAME=$(get_param "$PS_PREFIX/domain-name")
          S3_BUCKET=$(get_param "$PS_PREFIX/s3-bucket")
          DB_SECRET_ARN=$(get_param "$PS_PREFIX/db-secret-arn")
          APP_SECRET_ARN=$(get_param "$PS_PREFIX/app-secret-arn")
          COGNITO_SECRET_ARN=$(get_param "$PS_PREFIX/cognito-secret-arn")
          GUACAMOLE_SECRET_ARN=$(get_param "$PS_PREFIX/guacamole-secret-arn" || echo "")
          DC_DOMAIN_PASSWORD_SECRET_ARN=$(get_param "$PS_PREFIX/dc-domain-password-secret-arn" || echo "")
          GUACAMOLE_BASE_URL=$(get_param "$PS_PREFIX/guacamole-base-url" || echo "")
          GUACAMOLE_API_BASE_URL=$(get_param "$PS_PREFIX/guacamole-api-base-url" || echo "")
          ENGINE_ECS_CLUSTER_ARN=$(get_param "$PS_PREFIX/engine-ecs-cluster-arn")
          ENGINE_TASK_DEFINITION_ARN=$(get_param "$PS_PREFIX/engine-task-definition-arn")
          ENGINE_ECS_SECURITY_GROUP_ID=$(get_param "$PS_PREFIX/engine-ecs-security-group-id")
          ENGINE_PRIVATE_SUBNET_IDS=$(get_param "$PS_PREFIX/engine-private-subnet-ids")
          SQS_CMS_URL=$(get_param "$PS_PREFIX/sqs-cms-url")
          SQS_ENGINE_URL=$(get_param "$PS_PREFIX/sqs-engine-url")
          SQS_MC_URL=$(get_param "$PS_PREFIX/sqs-mc-url")
          REDIS_ENDPOINT=$(get_param "$PS_PREFIX/redis-endpoint" || echo "")
          CHANNEL_LAYER_BACKEND=$(get_param "$PS_PREFIX/channel-layer-backend" || echo "")
          EMAIL_BACKEND=$(get_param "$PS_PREFIX/email-backend" || echo "")
          CTF_FROM_EMAIL=$(get_param "$PS_PREFIX/ctf-from-email" || echo "")
          PLATFORM_BOOTSTRAP_STAFF_EMAILS=$(get_param "$PS_PREFIX/platform-bootstrap-staff-emails" || echo "")
          PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS=$(get_param "$PS_PREFIX/platform-bootstrap-superuser-emails" || echo "")
          validate_bootstrap_email_list "PLATFORM_BOOTSTRAP_STAFF_EMAILS" "$PLATFORM_BOOTSTRAP_STAFF_EMAILS"
          validate_bootstrap_email_list "PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS" "$PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS"

          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Deploying image: $IMAGE"

          COMMON_ENV="-e AWS_REGION=$AWS_REGION -e AWS_S3_BUCKET_NAME=$S3_BUCKET -e DB_SECRET_ARN=$DB_SECRET_ARN"
          COMMON_ENV="$COMMON_ENV -e APP_SECRET_ARN=$APP_SECRET_ARN -e COGNITO_SECRET_ARN=$COGNITO_SECRET_ARN"
          [ -n "$GUACAMOLE_SECRET_ARN" ] && COMMON_ENV="$COMMON_ENV -e GUACAMOLE_SECRET_ARN=$GUACAMOLE_SECRET_ARN"
          [ -n "$GUACAMOLE_BASE_URL" ] && COMMON_ENV="$COMMON_ENV -e GUACAMOLE_BASE_URL=$GUACAMOLE_BASE_URL"
          [ -n "$GUACAMOLE_API_BASE_URL" ] && COMMON_ENV="$COMMON_ENV -e GUACAMOLE_API_BASE_URL=$GUACAMOLE_API_BASE_URL"
          [ -n "$DC_DOMAIN_PASSWORD_SECRET_ARN" ] && COMMON_ENV="$COMMON_ENV -e DC_DOMAIN_PASSWORD_SECRET_ARN=$DC_DOMAIN_PASSWORD_SECRET_ARN"
          # Add localhost to ALLOWED_HOSTS for dev (enables SSM tunnel testing)
          # PS_PREFIX comes from Parameter Store, not user input - safe to use
          if [[ "$PS_PREFIX" == *"/dev/"* ]]; then
            COMMON_ENV="$COMMON_ENV -e DJANGO_ALLOWED_HOSTS=$DOMAIN_NAME,localhost,127.0.0.1"
          else
            COMMON_ENV="$COMMON_ENV -e DJANGO_ALLOWED_HOSTS=$DOMAIN_NAME"
          fi
          COMMON_ENV="$COMMON_ENV -e DJANGO_CSRF_TRUSTED_ORIGINS=https://$DOMAIN_NAME"
          COMMON_ENV="$COMMON_ENV -e SITE_URL=https://$DOMAIN_NAME -e ENGINE_ECS_CLUSTER_ARN=$ENGINE_ECS_CLUSTER_ARN"
          COMMON_ENV="$COMMON_ENV -e ENGINE_TASK_DEFINITION_ARN=$ENGINE_TASK_DEFINITION_ARN"
          COMMON_ENV="$COMMON_ENV -e ENGINE_ECS_SECURITY_GROUP_ID=$ENGINE_ECS_SECURITY_GROUP_ID"
          COMMON_ENV="$COMMON_ENV -e ENGINE_PRIVATE_SUBNET_IDS=$ENGINE_PRIVATE_SUBNET_IDS"
          COMMON_ENV="$COMMON_ENV -e SQS_CMS_URL=$SQS_CMS_URL -e SQS_ENGINE_URL=$SQS_ENGINE_URL -e SQS_MC_URL=$SQS_MC_URL"
          [ -n "$REDIS_ENDPOINT" ] && COMMON_ENV="$COMMON_ENV -e REDIS_HOST=$REDIS_ENDPOINT"
          # Channel-layer backend posture (ADR-018, #849), mirrors user_data.sh.
          [ -n "$CHANNEL_LAYER_BACKEND" ] && COMMON_ENV="$COMMON_ENV -e CHANNEL_LAYER_BACKEND=$CHANNEL_LAYER_BACKEND"
          [ -n "$EMAIL_BACKEND" ] && COMMON_ENV="$COMMON_ENV -e EMAIL_BACKEND=$EMAIL_BACKEND"
          [ -n "$CTF_FROM_EMAIL" ] && COMMON_ENV="$COMMON_ENV -e CTF_FROM_EMAIL=$CTF_FROM_EMAIL"
          [ -n "$PLATFORM_BOOTSTRAP_STAFF_EMAILS" ] && COMMON_ENV="$COMMON_ENV -e PLATFORM_BOOTSTRAP_STAFF_EMAILS=$PLATFORM_BOOTSTRAP_STAFF_EMAILS"
          [ -n "$PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS" ] && COMMON_ENV="$COMMON_ENV -e PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS=$PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS"

          docker pull "$IMAGE"
          # The DC domain password secret is Terraform-managed (created and
          # seeded by the engine-provisioner module), so it always carries an
          # AWSCURRENT value — no pre-deploy populate check needed, same as the
          # DB / app / Cognito secret ARNs above.
          docker stop portal worker-cms worker-engine worker-mc ctf-scheduler 2>/dev/null || true
          docker rm portal worker-cms worker-engine worker-mc ctf-scheduler 2>/dev/null || true
          eval docker run -d --name portal --restart unless-stopped -p 8000:8000 $COMMON_ENV "$IMAGE"
          WORKER_HEALTH_BASE="--health-interval 30s --health-timeout 5s --health-start-period 90s --health-retries 2"
          WORKER_CMS_HEALTH="--health-cmd='find /tmp/worker-cms-heartbeat -mmin -2 | grep -q .'"
          WORKER_ENGINE_HEALTH="--health-cmd='find /tmp/worker-engine-heartbeat -mmin -2 | grep -q .'"
          WORKER_MC_HEALTH="--health-cmd='find /tmp/worker-mc-heartbeat -mmin -2 | grep -q .'"
          CTF_SCHEDULER_HEALTH="--health-cmd='find /tmp/ctf-scheduler-heartbeat -mmin -2 | grep -q .'"
          eval docker run -d --name worker-cms --restart unless-stopped $WORKER_HEALTH_BASE "$WORKER_CMS_HEALTH" $COMMON_ENV "$IMAGE" python manage.py run_worker --queue cms
          eval docker run -d --name worker-engine --restart unless-stopped $WORKER_HEALTH_BASE "$WORKER_ENGINE_HEALTH" $COMMON_ENV "$IMAGE" python manage.py run_worker --queue engine
          eval docker run -d --name worker-mc --restart unless-stopped $WORKER_HEALTH_BASE "$WORKER_MC_HEALTH" $COMMON_ENV "$IMAGE" python manage.py run_worker --queue mc
          eval docker run -d --name ctf-scheduler --restart unless-stopped $WORKER_HEALTH_BASE "$CTF_SCHEDULER_HEALTH" $COMMON_ENV "$IMAGE" python manage.py run_ctf_scheduler
          docker ps

          # Worker-container health supervisor (#953) — byte-identical to the
          # user_data.sh fresh-boot install; artifacts are single-sourced under
          # modules/portal/ec2/worker-health/ and injected base64-encoded.
          echo "Installing worker-container health supervisor..."
          echo "__WH_MONITOR_B64__" | base64 -d > /usr/local/bin/shifter-worker-health.sh
          chmod 0755 /usr/local/bin/shifter-worker-health.sh
          echo "__WH_SERVICE_B64__" | base64 -d > /etc/systemd/system/shifter-worker-health.service
          echo "__WH_TIMER_B64__" | base64 -d > /etc/systemd/system/shifter-worker-health.timer
          # Per-environment metric dimension so dev and prod alarms stay independent.
          echo "WH_NAME_PREFIX=__WH_NAME_PREFIX__" > /etc/shifter-worker-health.env
          systemctl daemon-reload
          systemctl enable --now shifter-worker-health.timer

          echo "Deployment complete!"
          EOFSCRIPT
          )

          # Substitute PS_PREFIX
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__PS_PREFIX__/${PS_PREFIX}}"

          # Substitute worker-health artifact payloads (#953). base64 so the
          # single-source files survive jq/SSM transport without quoting issues;
          # both AWS deploy paths then install byte-identical files.
          WH_DIR="platform/terraform/modules/portal/ec2/worker-health"
          WH_MONITOR_B64=$(base64 -w0 "$WH_DIR/shifter-worker-health.sh")
          WH_SERVICE_B64=$(base64 -w0 "$WH_DIR/shifter-worker-health.service")
          WH_TIMER_B64=$(base64 -w0 "$WH_DIR/shifter-worker-health.timer")
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__WH_MONITOR_B64__/$WH_MONITOR_B64}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__WH_SERVICE_B64__/$WH_SERVICE_B64}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__WH_TIMER_B64__/$WH_TIMER_B64}"
          # name_prefix is "<environment>-portal"; matches the Terraform alarm dimension.
          WH_NAME_PREFIX="$ENV-portal"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__WH_NAME_PREFIX__/$WH_NAME_PREFIX}"

          # Run deploy via SSM using temp file to avoid quoting issues
          PARAMS_FILE=$(mktemp)
          cat > "$PARAMS_FILE" << EOF
          {
            "commands": [$(echo "$DEPLOY_SCRIPT" | jq -Rs .)]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters "file://$PARAMS_FILE" \
            --timeout-seconds 600 \
            --query "Command.CommandId" --output text)

          rm -f "$PARAMS_FILE"

          echo "SSM Command ID: $COMMAND_ID"
          echo "Waiting for deployment (timeout: 15 minutes)..."
          SECONDS_WAITED=0
          TIMEOUT=900
          while true; do
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --cli-read-timeout 30 \
              --cli-connect-timeout 30 && break
            SECONDS_WAITED=$((SECONDS_WAITED + 100))
            if [ $SECONDS_WAITED -ge $TIMEOUT ]; then
              echo "Waiter timed out after ${TIMEOUT}s"
              break
            fi
            echo "Still waiting... (~${SECONDS_WAITED}s elapsed)"
          done
          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
            exit 1
          fi
          echo "Platform deployment successful!"

      - name: Trigger ASG instance refresh
        if: steps.config.outputs.enable_autoscaling == 'true'
        env:
          ASG_NAME: ${{ steps.asg.outputs.asg_name }}
        run: |
          echo "Triggering instance refresh for ASG: $ASG_NAME"

          # Check if there's already an instance refresh in progress
          ACTIVE_REFRESH=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --query "InstanceRefreshes[?Status=='InProgress' || Status=='Pending'].InstanceRefreshId | [0]" \
            --output text)

          if [ "$ACTIVE_REFRESH" != "None" ] && [ -n "$ACTIVE_REFRESH" ]; then
            echo "Instance refresh already in progress: $ACTIVE_REFRESH"
            echo "Waiting for it to complete..."
          else
            # Start instance refresh
            # New instances will read updated image tag from Parameter Store via user_data
            # Lifecycle hook ensures instance is ready before joining ALB
            REFRESH_ID=$(aws autoscaling start-instance-refresh \
              --auto-scaling-group-name "$ASG_NAME" \
              --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}' \
              --query "InstanceRefreshId" --output text)

            echo "Instance refresh started: $REFRESH_ID"
            ACTIVE_REFRESH=$REFRESH_ID
          fi

          # Wait for instance refresh to complete
          echo "Waiting for instance refresh to complete..."
          RETRIES=0
          MAX_RETRIES=60  # 30 minutes max wait
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$ACTIVE_REFRESH" \
              --query "InstanceRefreshes[0].Status" --output text)

            echo "Instance refresh status: $STATUS"

            if [ "$STATUS" = "Successful" ]; then
              echo "Instance refresh completed successfully!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Instance refresh failed or was cancelled!"
              aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name "$ASG_NAME" \
                --instance-refresh-ids "$ACTIVE_REFRESH" \
                --query "InstanceRefreshes[0].StatusReason" --output text
              exit 1
            fi

            RETRIES=$((RETRIES + 1))
            if [ $RETRIES -gt $MAX_RETRIES ]; then
              echo "Timeout waiting for instance refresh"
              exit 1
            fi

            sleep 30
          done

          echo "Platform ASG deployment successful!"
