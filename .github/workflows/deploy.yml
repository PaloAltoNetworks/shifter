name: Deploy

# Single entry point - prevents race conditions by enforcing dependency order
on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: self-hosted
    outputs:
      core: ${{ steps.filter.outputs.core }}
      range: ${{ steps.filter.outputs.range }}
      shifter_engine: ${{ steps.filter.outputs.shifter_engine }}
      portal: ${{ steps.filter.outputs.portal }}
      environment: ${{ steps.env.outputs.environment }}
      is_dev: ${{ steps.env.outputs.is_dev }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            core:
              - 'terraform/modules/ecr/**'
              - 'terraform/environments/*/*.tf'
              - '.github/workflows/_core.yml'
              - '.github/workflows/deploy.yml'
            range:
              - 'terraform/modules/range/**'
              - 'terraform/modules/pulumi-state/**'
              - 'terraform/environments/*/range/**'
              - '.github/workflows/_range.yml'
            shifter_engine:
              - 'shifter-engine/**'
              - 'terraform/modules/pulumi-provisioner/**'
              - 'terraform/modules/ecr/**'
              - 'terraform/environments/*/*.tf'
              - '.github/workflows/_shifter-engine.yml'
              - '.github/workflows/deploy.yml'
            portal:
              - 'terraform/modules/portal/**'
              - 'terraform/environments/*/portal/**'
              - 'portal/**'
              - 'shifter-engine/**'
              - '.github/workflows/_portal.yml'

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            ENV="${{ github.base_ref == 'dev' && 'dev' || 'prod' }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual runs always target dev for safety
            ENV="dev"
          elif [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            ENV="dev"
          else
            ENV="prod"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "is_dev=$( [ \"$ENV\" == \"dev\" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  # ============================================================================
  # DEPENDENCY CHAIN: Core -> Range -> Portal
  # Each component waits for its upstream dependency before running
  # ============================================================================

  quality:
    name: Quality
    needs: changes
    if: |
      needs.changes.outputs.core == 'true' ||
      needs.changes.outputs.range == 'true' ||
      needs.changes.outputs.shifter_engine == 'true' ||
      needs.changes.outputs.portal == 'true' ||
      github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_quality.yml

  core:
    name: Core
    needs: [changes, quality]
    if: |
      (needs.changes.outputs.core == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.quality.result == 'success'
    uses: ./.github/workflows/_core.yml
    with:
      environment: ${{ needs.changes.outputs.environment }}
      is_dev: ${{ needs.changes.outputs.is_dev == 'true' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ROLE_ARN_DEV: ${{ secrets.AWS_ROLE_ARN_DEV }}

  range:
    name: Range
    needs: [changes, quality, core]
    if: |
      always() &&
      (needs.changes.outputs.range == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.core.result == 'success' || needs.core.result == 'skipped') &&
      needs.quality.result == 'success'
    uses: ./.github/workflows/_range.yml
    with:
      environment: ${{ needs.changes.outputs.environment }}
      is_dev: ${{ needs.changes.outputs.is_dev == 'true' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ROLE_ARN_DEV: ${{ secrets.AWS_ROLE_ARN_DEV }}

  shifter-engine:
    name: Shifter Engine
    needs: [changes, quality, core]
    if: |
      always() &&
      (needs.changes.outputs.shifter_engine == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.core.result == 'success' || needs.core.result == 'skipped') &&
      needs.quality.result == 'success'
    uses: ./.github/workflows/_shifter-engine.yml
    with:
      environment: ${{ needs.changes.outputs.environment }}
      is_dev: ${{ needs.changes.outputs.is_dev == 'true' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ROLE_ARN_DEV: ${{ secrets.AWS_ROLE_ARN_DEV }}

  portal:
    name: Portal
    needs: [changes, quality, range, shifter-engine]
    if: |
      always() &&
      (needs.changes.outputs.portal == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.range.result == 'success' || needs.range.result == 'skipped') &&
      (needs.shifter-engine.result == 'success' || needs.shifter-engine.result == 'skipped') &&
      needs.quality.result == 'success'
    uses: ./.github/workflows/_portal.yml
    with:
      environment: ${{ needs.changes.outputs.environment }}
      is_dev: ${{ needs.changes.outputs.is_dev == 'true' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ROLE_ARN_DEV: ${{ secrets.AWS_ROLE_ARN_DEV }}
