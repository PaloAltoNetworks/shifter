apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vmrt-shared-l2
  namespace: vmrt-mixed-subnet
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "vmrt-shared-l2",
      "type": "macvlan",
      "master": "vxlan0",
      "mode": "bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "10.200.0.96/28",
        "exclude": [
          "10.200.0.110/32",
          "10.200.0.111/32"
        ]
      }
    }
