{% extends "mission_control/base.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">History</h1>
    <p class="page-subtitle">View your past range sessions</p>
</div>

<div class="card">
    <!-- Empty state -->
    <div class="empty-state" id="history-empty">
        <div class="empty-state-icon">[ ]</div>
        <p>No range history yet</p>
        <p class="text-small mt-sm">
            Your past ranges will appear here
        </p>
    </div>

    <!-- History list (hidden when empty) -->
    <div id="history-list" style="display: none;">
        <table class="table">
            <thead>
                <tr>
                    <th>DATE</th>
                    <th>AGENT</th>
                    <th>STATUS</th>
                    <th>DURATION</th>
                    <th class="text-right">ACTIONS</th>
                </tr>
            </thead>
            <tbody id="history-tbody">
                <!-- Will be populated dynamically -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
