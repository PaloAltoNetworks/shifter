services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      REDIS_HOST: redis
      PROVISIONER_PATH: /engine/provisioner
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
      - ../engine/provisioner:/engine/provisioner

  # ------------------------------------------------------------------------------
  # SQS Workers
  # Each worker polls its dedicated SQS queue (SNS fan-out)
  # Health check monitors heartbeat file - if stale for >60s, container restarts
  # ------------------------------------------------------------------------------

  worker-cms:
    build: .
    command: python manage.py run_worker --queue cms
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      AWS_REGION: ${AWS_REGION:-us-east-2}
      SQS_CMS_URL: ${SQS_CMS_URL}
    restart: always
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-cms-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

  worker-engine:
    build: .
    command: python manage.py run_worker --queue engine
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      AWS_REGION: ${AWS_REGION:-us-east-2}
      SQS_ENGINE_URL: ${SQS_ENGINE_URL}
    restart: always
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-engine-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

  worker-mc:
    build: .
    command: python manage.py run_worker --queue mc
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      AWS_REGION: ${AWS_REGION:-us-east-2}
      SQS_MC_URL: ${SQS_MC_URL}
      REDIS_HOST: ${REDIS_HOST}
    restart: always
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-mc-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

volumes:
  postgres_data:
