# .gitguardian.yaml
# GitGuardian configuration for Shifter cyber range
# Ignore test files that contain mock credentials

version: v1

paths-ignore:
  # Test files contain mock/fake credentials for unit tests
  - "**/tests/**"
  - "**/test_*.py"
  - "**/conftest.py"
  # Portal test directory
  - "portal/tests/**"
  # Shifter Engine test directory
  - "shifter-engine/tests/**"
  # Legacy path (may appear in git history)
  - "pulumi-provisioner/tests/**"
