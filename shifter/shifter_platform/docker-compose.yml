services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: sns,sqs,s3
      DEBUG: 0
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"sns\": \"running\"'"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: shifter_platform/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      PROVISIONER_PATH: /engine/provisioner
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      WEB_WORKERS: 2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
      - ../engine/provisioner:/engine/provisioner

  # ------------------------------------------------------------------------------
  # SQS Workers
  # Each worker polls its dedicated SQS queue (SNS fan-out)
  # Health check monitors heartbeat file - if stale for >60s, container restarts
  # ------------------------------------------------------------------------------

  worker-cms:
    build:
      context: ..
      dockerfile: shifter_platform/Dockerfile
    command: python manage.py run_worker --queue cms
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_CMS_URL: http://sqs.us-east-2.localhost.localstack.cloud:4566/000000000000/shifter-cms
    restart: always
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-cms-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

  worker-engine:
    build:
      context: ..
      dockerfile: shifter_platform/Dockerfile
    command: python manage.py run_worker --queue engine
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_ENGINE_URL: http://sqs.us-east-2.localhost.localstack.cloud:4566/000000000000/shifter-engine
    restart: always
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-engine-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

  worker-mc:
    build:
      context: ..
      dockerfile: shifter_platform/Dockerfile
    command: python manage.py run_worker --queue mc
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_MC_URL: http://sqs.us-east-2.localhost.localstack.cloud:4566/000000000000/shifter-mc
      REDIS_HOST: redis
    restart: always
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-mc-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

  # ------------------------------------------------------------------------------
  # CTF Scheduler
  # Polls ctf_scheduled_task for due tasks (range provisioning, event lifecycle)
  # ------------------------------------------------------------------------------

  ctf-scheduler:
    build:
      context: ..
      dockerfile: shifter_platform/Dockerfile
    command: python manage.py run_ctf_scheduler
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
    restart: always
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/ctf-scheduler-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

volumes:
  postgres_data:
