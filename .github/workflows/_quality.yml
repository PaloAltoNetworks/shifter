name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Analyze
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shifter
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/shifter_platform
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

      - name: Test shifter_platform with coverage
        working-directory: shifter/shifter_platform
        env:
          TESTING: "1"
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shifter
          DB_USER: test
          DB_PASSWORD: test
        run: |
          uv run python manage.py collectstatic --noinput
          uv run pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload shifter_platform coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: shifter/shifter_platform/coverage.xml
          flags: shifter_platform
          fail_ci_if_error: false

      - name: Cache Checkov
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-checkov-${{ hashFiles('.github/workflows/quality.yml') }}
          restore-keys: |
            ${{ runner.os }}-checkov-

      - name: Checkov IaC Security
        uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61 # v12
        with:
          directory: platform/terraform/
          framework: terraform
          download_external_modules: true
          quiet: true
          compact: true
          soft_fail: true
      # SonarCloud uses automatic analysis (configured in SonarCloud settings)

  shifter-engine-tests:
    name: Shifter Engine Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: shifter/engine/provisioner
        run: |
          python3.12 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: shifter/engine/provisioner
        run: |
          source .venv/bin/activate
          pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: shifter/engine/provisioner/coverage.xml
          flags: provisioner
          fail_ci_if_error: false

  shifter-js-tests:
    name: Shifter JavaScript Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shifter/shifter_platform/package-lock.json

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: npm ci

      - name: Run JavaScript tests
        working-directory: shifter/shifter_platform
        run: npm test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: shifter/shifter_platform/coverage/lcov.info
          flags: shifter-javascript
          fail_ci_if_error: false

  architecture:
    name: Architecture Checks
    runs-on: self-hosted
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shifter
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Check layer imports
        run: python scripts/check_layer_imports.py -o layer-imports.json
        continue-on-error: true

      - name: Check model FKs
        working-directory: shifter/shifter_platform
        env:
          TESTING: "1"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shifter
          DB_USER: test
          DB_PASSWORD: test
        run: uv run python manage.py check_model_fks -o model-fks.json
        continue-on-error: true

      - name: Upload architecture reports
        uses: actions/upload-artifact@v4
        with:
          name: architecture-reports
          path: |
            layer-imports.json
            shifter/shifter_platform/model-fks.json
          retention-days: 30
