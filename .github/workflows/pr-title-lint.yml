name: PR title lint

on:
  pull_request:
    # `pull_request` (not `pull_request_target`) — public-fork inputs run
    # with read-only checkout behavior per repo policy.
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-title:
    name: Lint PR title
    runs-on: self-hosted
    steps:
      - name: Skip conventional title on dev PRs
        if: github.base_ref == 'dev'
        run: |
          echo "PRs targeting dev are exempt from conventional title lint."

      - name: Validate conventional-commit title
        if: github.base_ref != 'dev'
        # amannn/action-semantic-pull-request v5.5.3
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed conventional-commit types: the towncrier fragment types
          # (security, added, changed, deprecated, removed, fixed) plus the
          # broader conventional-commit common types so refactors,
          # docs, and chores are first-class. See CONTRIBUTING.md.
          types: |
            security
            added
            changed
            deprecated
            removed
            fixed
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            revert
          # Scopes are optional; if present, must be lowercase kebab-case.
          requireScope: false
          # Subject must start with a lowercase letter — matches what
          # CONTRIBUTING.md documents and what the towncrier fragment
          # convention expects.
          subjectPattern: ^[a-z].*$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            must start with a lowercase letter. Examples:
              security: harden mcp/ngfw secret handling
              fix(provisioner): retry transient API errors
