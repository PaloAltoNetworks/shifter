fail_fast: true

repos:
  # =============================================================================
  # STAGE 1: Fast checks (linting, formatting, syntax)
  # =============================================================================

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^assets/styles/
      - id: check-yaml
        args: [--unsafe] # Allow custom YAML constructors (mkdocs plugins)
        exclude: ^platform/charts/.*/templates/.*\.ya?ml$
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        # Exclude: tests (check key format strings) + crypto.py (key generation module, not leaked secrets)
        # Plus POLARIS CTF range lab material (intentional training-range
        # keypairs that live inside the disposable docker-compose range
        # — not real credentials, useless outside the range):
        exclude: ^(shifter/engine/provisioner/tests/|shifter/shifter_platform/tests/engine/ssh/|scripts/bootstrap/tests/|shifter/engine/provisioner/utils/crypto\.py|scenario-dev/polaris/build/_shared/)

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.yml$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        args: [--config, .gitleaks.toml]

  # Python - Ruff (linting + formatting)
  # Note: Ruff handles import sorting via "I" rules - no separate isort needed
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: ruff (shifter_platform)
        args: [--fix]
        files: ^shifter/shifter_platform/
      - id: ruff-format
        name: ruff-format (shifter_platform)
        files: ^shifter/shifter_platform/
      - id: ruff
        name: ruff (provisioner)
        args: [--fix]
        files: ^shifter/engine/provisioner/
      - id: ruff-format
        name: ruff-format (provisioner)
        files: ^shifter/engine/provisioner/
      - id: ruff
        name: ruff (packer)
        args: [--fix]
        files: ^shifter/packer/
      - id: ruff-format
        name: ruff-format (packer)
        files: ^shifter/packer/
      - id: ruff
        name: ruff (bootstrap)
        args: [--fix]
        files: ^scripts/bootstrap/
      - id: ruff-format
        name: ruff-format (bootstrap)
        files: ^scripts/bootstrap/
      - id: ruff
        name: ruff (check_layer_imports)
        args: [--fix]
        files: ^scripts/check_layer_imports/
      - id: ruff-format
        name: ruff-format (check_layer_imports)
        files: ^scripts/check_layer_imports/
      - id: ruff
        name: ruff (check_rds_pending_modifications)
        args: [--fix]
        files: ^scripts/check_rds_pending_modifications/
      - id: ruff-format
        name: ruff-format (check_rds_pending_modifications)
        files: ^scripts/check_rds_pending_modifications/
      - id: ruff
        name: ruff (installation)
        args: [--fix]
        files: ^shifter/installation/
      - id: ruff-format
        name: ruff-format (installation)
        files: ^shifter/installation/

  # JavaScript/CSS linting
  - repo: local
    hooks:
      - id: eslint-shifter-platform
        name: eslint (shifter_platform)
        entry: bash -c 'cd shifter/shifter_platform && npx eslint --fix static/js/'
        language: system
        files: ^shifter/shifter_platform/static/js/.*\.js$
        types: [javascript]

      - id: eslint-mcp-shifter-db
        name: eslint (mcp/shifter-db)
        entry: bash -c 'cd mcp/shifter-db && npx eslint .'
        language: system
        files: ^mcp/shifter-db/.*\.js$
        types: [javascript]

      - id: eslint-mcp-ngfw
        name: eslint (mcp/ngfw)
        entry: bash -c 'cd mcp/ngfw && npx eslint .'
        language: system
        files: ^mcp/ngfw/.*\.js$
        types: [javascript]

      - id: eslint-mcp-aws
        name: eslint (mcp/aws)
        entry: bash -c 'cd mcp/aws && npx eslint .'
        language: system
        files: ^mcp/aws/.*\.js$
        types: [javascript]

      - id: stylelint-shifter-platform
        name: stylelint (shifter_platform)
        entry: bash -c 'cd shifter/shifter_platform && npx stylelint --fix static/css/'
        language: system
        files: ^shifter/shifter_platform/static/css/.*\.css$
        types: [css]

  # Shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/

  # Terraform formatting and validation
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      - id: terraform_fmt
        files: ^platform/terraform/
      - id: terraform_tflint
        files: ^platform/terraform/
        args:
          [--args=--config=__GIT_WORKING_DIR__/.tflint.hcl]
      - id: terraform_validate
        files: ^platform/terraform/

  # Custom: AWS security group ingress CIDR scoping check.
  # Catches the polaris cross-range leak class of bug — a "shared SG"
  # with `cidr_blocks = ["10.1.0.0/16"]` ingress that lets one user's
  # range reach another user's subnet at L3. Scoped to range modules:
  # the polaris bake range and the shifter provisioner range module.
  # See scripts/check_tf_sg_cidrs/test_check_tf_sg_cidrs.py for the
  # exact failure modes covered.
  - repo: local
    hooks:
      - id: check-tf-sg-cidrs
        name: AWS SG ingress CIDR scoping (polaris + provisioner range modules)
        entry: python3 scripts/check_tf_sg_cidrs/check_tf_sg_cidrs.py
        language: system
        files: ^(scripts/polaris-aws-range/|shifter/engine/provisioner/terraform/modules/range/).*\.tf$

  # Kubernetes schema validation
  - repo: local
    hooks:
      - id: helm-lint-shifter-chart
        name: helm lint (shifter chart)
        entry: >-
          bash -c 'helm lint platform/charts/shifter -f platform/charts/shifter/values-gcp-dev.yaml &&
          helm lint platform/charts/shifter -f platform/charts/shifter/values-gcp-prod.yaml'
        language: system
        files: ^platform/charts/shifter/
        pass_filenames: false
      - id: kubeconform
        name: kubeconform (k8s schemas)
        entry: kubeconform -strict -summary -ignore-missing-schemas -kubernetes-version 1.31.0
        language: system
        files: ^platform/k8s/.*\.yaml$
        exclude: kustomization\.yaml$
        types: [yaml]

  # =============================================================================
  # STAGE 2: Security (SAST/DAST)
  # =============================================================================

  # Python - Security (bandit)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        name: bandit (shifter_platform)
        args: [-r, --skip, B101]
        files: ^shifter/shifter_platform/
        exclude: ^shifter/shifter_platform/(tests|\.venv)/
      - id: bandit
        name: bandit (provisioner)
        # B101: assert, B404: subprocess import, B603: subprocess call, B607: partial path
        # Provisioner uses subprocess for Pulumi CLI calls with hardcoded commands
        args: [-r, --skip, "B101,B404,B603,B607"]
        files: ^shifter/engine/provisioner/
        exclude: ^shifter/engine/provisioner/(tests|\.venv)/
      - id: bandit
        name: bandit (packer)
        args: [-r, --skip, B101]
        files: ^shifter/packer/
        exclude: ^shifter/packer/(tests|\.venv)/
      - id: bandit
        name: bandit (bootstrap)
        # B101: assert, B404: subprocess import, B603: subprocess call, B607: partial path
        # These are expected in deployment scripts that run CLI tools
        args: [-r, --skip, "B101,B404,B603,B607"]
        files: ^scripts/bootstrap/
        exclude: ^scripts/bootstrap/(tests|\.venv)/
      - id: bandit
        name: bandit (check_layer_imports)
        args: [-r, --skip, "B101,B112"]
        files: ^scripts/check_layer_imports/
        exclude: ^scripts/check_layer_imports/(tests|\.venv)/
      - id: bandit
        name: bandit (installation)
        args: [-r, --skip, B101]
        files: ^shifter/installation/
        exclude: ^shifter/installation/(tests|\.venv)/

  # IaC Security (Terraform, Dockerfile)
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.346
    hooks:
      - id: checkov
        name: checkov (terraform)
        files: ^platform/terraform/
        args:
          [--quiet, --compact, --framework, terraform, --directory, platform/terraform/, --soft-fail]

  # Kubernetes security and best practices
  - repo: local
    hooks:
      - id: kube-linter
        name: kube-linter (k8s security)
        entry: kube-linter lint --config .kube-linter.yaml platform/k8s/
        language: system
        files: ^platform/k8s/
        pass_filenames: false
        types: [yaml]

      - id: k8s-image-registry
        name: k8s image registry check
        entry: >-
          bash -c 'for f in platform/k8s/gcp/overlays/*/kustomization.yaml; do
          if grep -E "newName:" "$f" | grep -qv "pkg\.dev/"; then
          echo "ERROR: Images must use Artifact Registry (pkg.dev) in $f" && exit 1; fi; done'
        language: system
        files: ^platform/k8s/gcp/overlays/.*/kustomization\.yaml$
        pass_filenames: false

  # =============================================================================
  # STAGE 3: Type Checking
  # =============================================================================

  - repo: local
    hooks:
      - id: mypy-shifter-platform
        name: mypy (shifter_platform)
        entry: >-
          bash -c 'cd shifter/shifter_platform && source .venv/bin/activate &&
          DJANGO_DEBUG=true DJANGO_SECRET_KEY=dummy-for-testing
          PYTHONPATH="..:$PYTHONPATH" mypy .'
        language: system
        files: ^shifter/shifter_platform/
        pass_filenames: false
        types: [python]

      - id: mypy-provisioner
        name: mypy (provisioner)
        entry: bash -c 'cd shifter/engine/provisioner && source .venv/bin/activate && mypy .'
        language: system
        files: ^shifter/engine/provisioner/
        pass_filenames: false
        types: [python]

  # =============================================================================
  # STAGE 4: Architecture checks (hard fail - zero tolerance)
  # =============================================================================

  - repo: local
    hooks:
      - id: adr-guard-fast
        name: architecture (adr guard fast)
        entry: python3 scripts/adr_guard/adr_guard.py --changed --level fast
        language: system
        files: ^(docs/adr/|scripts/adr_guard/|\.github/workflows/|\.github/(CODEOWNERS|pull_request_template\.md|copilot-instructions\.md)$|\.claude/|shifter/shifter_platform/.*\.py$|shifter/engine/provisioner/cloud/.*\.py$|\.pre-commit-config\.yaml$|AGENTS\.md$|\.importlinter$|\.tflint\.hcl$|\.gitleaks\.toml$|\.kube-linter\.yaml$|mcp/.*\.(js|mjs|cjs)$)
        pass_filenames: false
        verbose: true

      - id: adr-guard-k8s
        name: architecture (adr guard k8s deployments)
        entry: python3 scripts/adr_guard/adr_guard.py --checks k8s-deployment-security-context --files
        language: python
        additional_dependencies:
          - pyyaml>=6.0
        files: ^(platform/k8s/gcp/base/.*\.ya?ml$|platform/charts/shifter/.*)
        pass_filenames: true
        verbose: true

      - id: import-linter-shifter-platform
        name: architecture (import linter)
        entry: bash -c 'cd shifter/shifter_platform && uv run lint-imports --config ../../.importlinter'
        language: system
        files: ^(shifter/shifter_platform/(cms|engine|management|mission_control|shared|ctf)/.*\.py$|\.importlinter$)
        pass_filenames: false
        verbose: true

      - id: check-layer-imports
        name: architecture (layer imports)
        entry: bash -c 'cd scripts/check_layer_imports && uv run python check_layer_imports.py -q'
        language: system
        files: ^shifter/shifter_platform/
        pass_filenames: false
        verbose: true

      - id: k8s-pss-labels
        name: architecture (k8s PSS labels)
        entry: >-
          bash -c 'for f in platform/k8s/gcp/base/namespaces.yaml; do if ! grep
          -q "pod-security.kubernetes.io/enforce" "$f"; then echo "ERROR: $f
          must include Pod Security Standards labels" && exit 1; fi; done'
        language: system
        files: ^platform/k8s/gcp/base/namespaces\.yaml$
        pass_filenames: false
        verbose: true

      - id: check-model-fks
        name: architecture (model FKs)
        entry: bash -c 'cd shifter/shifter_platform && source .venv/bin/activate && TESTING=1 DJANGO_DEBUG=true DJANGO_SECRET_KEY=dummy-for-testing python manage.py check_model_fks -q'
        language: system
        files: ^shifter/shifter_platform/
        pass_filenames: false
        verbose: true

  # =============================================================================
  # STAGE 5: Tests (slowest - run last, shifter_platform last of all)
  # =============================================================================

  # Packer tests
  - repo: local
    hooks:
      - id: pytest-packer
        name: pytest (packer)
        entry: >-
          bash -c 'cd shifter/packer && uv run pytest tests/ -q --cov=.
          --cov-report=html:../../coverage/packer
          --cov-report=xml:coverage.xml
          --cov-report=term-missing:skip-covered'
        language: system
        files: ^shifter/packer/
        pass_filenames: false

  # Provisioner tests
  - repo: local
    hooks:
      - id: pytest-provisioner
        name: pytest (provisioner)
        entry: >-
          bash -c 'cd shifter/engine/provisioner && source .venv/bin/activate &&
          TESTING=1 python -m pytest tests/ -q --cov=.
          --cov-report=html:../../../coverage/provisioner
          --cov-report=xml:coverage.xml
          --cov-report=term-missing:skip-covered'
        language: system
        files: ^shifter/engine/provisioner/
        pass_filenames: false

  # Bootstrap tests
  - repo: local
    hooks:
      - id: pytest-bootstrap
        name: pytest (bootstrap)
        entry: >-
          bash -c 'cd scripts/bootstrap && uv run pytest tests/ -q --cov=.
          --cov-report=html:../../coverage/bootstrap
          --cov-report=xml:coverage.xml
          --cov-report=term-missing:skip-covered'
        language: system
        files: ^scripts/bootstrap/
        pass_filenames: false

  # Check layer imports tests
  - repo: local
    hooks:
      - id: pytest-check-layer-imports
        name: pytest (check_layer_imports)
        entry: >-
          bash -c 'cd scripts/check_layer_imports && uv run pytest tests/ -q
          --cov=. --cov-report=html:../../coverage/check_layer_imports
          --cov-report=xml:coverage.xml
          --cov-report=term-missing:skip-covered'
        language: system
        files: ^scripts/check_layer_imports/
        pass_filenames: false

      - id: pytest-check-rds-pending-modifications
        name: pytest (check_rds_pending_modifications)
        entry: >-
          bash -c 'cd scripts/check_rds_pending_modifications && uv run pytest tests/ -q'
        language: system
        files: ^scripts/check_rds_pending_modifications/
        pass_filenames: false

  # Installation config tests
  - repo: local
    hooks:
      - id: pytest-installation
        name: pytest (installation)
        entry: >-
          bash -c 'cd shifter/installation && uv run pytest tests/ -q --cov=.
          --cov-report=html:../../coverage/installation
          --cov-report=xml:coverage.xml
          --cov-report=term-missing:skip-covered'
        language: system
        files: ^shifter/installation/
        pass_filenames: false

  # Jest tests (JS)
  - repo: local
    hooks:
      - id: jest-shifter-platform
        name: jest (shifter_platform)
        entry: bash -c 'cd shifter/shifter_platform && npm test -- --coverage --coverageReporters=lcov --coverageReporters=text-summary --coverageDirectory=../../coverage/js'
        language: system
        files: ^shifter/shifter_platform/static/js/.*\.js$
        pass_filenames: false

  # MCP tests (Node.js)
  - repo: local
    hooks:
      - id: test-mcp-shifter-db
        name: test (mcp/shifter-db)
        entry: bash -c 'cd mcp/shifter-db && npm test'
        language: system
        files: ^mcp/shifter-db/
        pass_filenames: false

      - id: test-mcp-ngfw
        name: test (mcp/ngfw)
        entry: bash -c 'cd mcp/ngfw && npm test'
        language: system
        files: ^mcp/ngfw/
        pass_filenames: false

      - id: test-mcp-aws
        name: test (mcp/aws)
        entry: bash -c 'cd mcp/aws && npm test'
        language: system
        files: ^mcp/aws/
        pass_filenames: false

      - id: test-mcp-ops
        name: test (mcp/ops)
        entry: bash -c 'cd mcp/ops && npm test'
        language: system
        files: ^mcp/ops/
        pass_filenames: false

  # Shifter Platform tests (largest test suite - run last)
  - repo: local
    hooks:
      - id: pytest-shifter
        name: pytest (shifter_platform)
        entry: >-
          bash -c 'cd shifter/shifter_platform && source .venv/bin/activate &&
          TESTING=1 DJANGO_DEBUG=true DJANGO_SECRET_KEY=dummy-for-testing python
          -m pytest tests/ --ignore=tests/documentation
          --ignore=tests/risk_register -q --cov=.
          --cov-report=html:../../coverage/shifter_platform
          --cov-report=xml:coverage.xml
          --cov-report=term-missing:skip-covered'
        language: system
        files: ^shifter/shifter_platform/
        pass_filenames: false
