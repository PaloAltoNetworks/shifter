# FIRST RUN: OpenWebUI will fail to start because the PostgreSQL database doesn't exist yet.
# After Portal terraform creates the secret, manually create the database:
#   1. Run: ./scripts/db-connect.sh -e <dev|prod>
#   2. In another terminal, run the SQL from docs/src/agentchat/index.md
#   3. Re-run this workflow
# This is a one-time setup per environment.

name: AgentChat

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      is_dev:
        required: true
        type: boolean

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform/environments/${{ inputs.environment }}/agentchat
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"
      - name: Write tfvars
        env:
          TF_VARS: ${{ inputs.is_dev && secrets.TF_VARS_DEV_AGENTCHAT || secrets.TF_VARS_PROD_AGENTCHAT }}
        run: echo "$TF_VARS" > terraform.tfvars
      - run: terraform fmt -check -recursive
        working-directory: terraform
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color -out=tfplan && terraform show -no-color tfplan > plan.txt
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ inputs.environment }}/agentchat/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan - AgentChat (${{ inputs.environment }})\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`
            });

  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: plan
    if: always() && (needs.plan.result == 'success' || needs.plan.result == 'skipped')
    defaults:
      run:
        working-directory: terraform/environments/${{ inputs.environment }}/agentchat
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"
      - name: Write tfvars
        env:
          TF_VARS: ${{ inputs.is_dev && secrets.TF_VARS_DEV_AGENTCHAT || secrets.TF_VARS_PROD_AGENTCHAT }}
        run: echo "$TF_VARS" > terraform.tfvars
      - run: terraform init
      - run: terraform apply -auto-approve

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: apply
    env:
      AWS_REGION: us-east-2
      ENV: ${{ inputs.environment }}
      INSTANCE_TAG: ${{ inputs.is_dev && 'dev-agentchat-ec2' || 'prod-agentchat-ec2' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get deployment config
        id: config
        env:
          TF_VARS: ${{ inputs.is_dev && secrets.TF_VARS_DEV_AGENTCHAT || secrets.TF_VARS_PROD_AGENTCHAT }}
        run: |
          BEDROCK_REGION=$(echo "$TF_VARS" | grep '^bedrock_region' | sed 's/.*= *"\([^"]*\)".*/\1/')
          if [[ ! "$BEDROCK_REGION" =~ ^[a-z]{2}-[a-z]+-[0-9]+$ ]]; then
            echo "Error: Invalid region format: $BEDROCK_REGION"; exit 1
          fi
          echo "bedrock_region=${BEDROCK_REGION}" >> $GITHUB_OUTPUT

      - name: Get secrets
        id: secrets
        run: |
          BAG_API_KEY=$(aws secretsmanager get-secret-value --secret-id "shifter-${ENV}-agentchat-bag-api-key" --query 'SecretString' --output text)
          echo "::add-mask::$BAG_API_KEY"
          echo "bag_api_key=$BAG_API_KEY" >> $GITHUB_OUTPUT

          DB_JSON=$(aws secretsmanager get-secret-value --secret-id "shifter-${ENV}-portal-openwebui-db" --query 'SecretString' --output text)
          DATABASE_URL=$(echo "$DB_JSON" | jq -r '.database_url')
          echo "::add-mask::$DATABASE_URL"
          echo "database_url=$DATABASE_URL" >> $GITHUB_OUTPUT

          COGNITO_JSON=$(aws secretsmanager get-secret-value --secret-id "shifter-${ENV}-portal-cognito-agentchat" --query 'SecretString' --output text)
          echo "cognito_user_pool_id=$(echo "$COGNITO_JSON" | jq -r '.user_pool_id')" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(echo "$COGNITO_JSON" | jq -r '.client_id')" >> $GITHUB_OUTPUT
          echo "cognito_issuer=$(echo "$COGNITO_JSON" | jq -r '.issuer_url')" >> $GITHUB_OUTPUT

          RDS_JSON=$(aws secretsmanager get-secret-value --secret-id "shifter-${ENV}-portal-db-credentials" --query 'SecretString' --output text)
          echo "rds_hostname=$(echo "$RDS_JSON" | jq -r '.host')" >> $GITHUB_OUTPUT
          echo "rds_port=$(echo "$RDS_JSON" | jq -r '.port')" >> $GITHUB_OUTPUT
          echo "rds_database=$(echo "$RDS_JSON" | jq -r '.dbname')" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push mcp-shifter
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO_NAME: shifter-${{ inputs.is_dev && 'dev-' || '' }}mcp-shifter
        run: |
          IMAGE_TAG="${ECR_REGISTRY}/${ECR_REPO_NAME}:latest"
          docker build -t "$IMAGE_TAG" ./mcp/mcp-shifter
          docker push "$IMAGE_TAG"
          echo "image_uri=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Get Instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running AgentChat EC2 instance"; exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for cloud-init
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          for i in $(seq 1 30); do
            RESULT=$(aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["cloud-init status --wait || cloud-init status"]' \
              --query "Command.CommandId" --output text 2>/dev/null) || true
            if [ -n "$RESULT" ]; then
              sleep 10
              STATUS=$(aws ssm get-command-invocation --command-id "$RESULT" --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text 2>/dev/null) || true
              if echo "$STATUS" | grep -q "done"; then echo "Cloud-init complete"; exit 0; fi
            fi
            echo "Attempt $i: Waiting..."; sleep 10
          done
          echo "Warning: cloud-init wait timed out"

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
          BEDROCK_REGION: ${{ steps.config.outputs.bedrock_region }}
          BAG_API_KEY: ${{ steps.secrets.outputs.bag_api_key }}
          DATABASE_URL: ${{ steps.secrets.outputs.database_url }}
          COGNITO_USER_POOL_ID: ${{ steps.secrets.outputs.cognito_user_pool_id }}
          COGNITO_CLIENT_ID: ${{ steps.secrets.outputs.cognito_client_id }}
          COGNITO_ISSUER: ${{ steps.secrets.outputs.cognito_issuer }}
          RDS_HOSTNAME: ${{ steps.secrets.outputs.rds_hostname }}
          RDS_PORT: ${{ steps.secrets.outputs.rds_port }}
          RDS_DATABASE: ${{ steps.secrets.outputs.rds_database }}
          MCP_SHIFTER_IMAGE: ${{ steps.build-push.outputs.image_uri }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          SSM_PARAMS=$(cat <<EOF
          {
            "commands": [
              "set -e",
              "cd /opt",
              "if [ -d bedrock-access-gateway ]; then cd bedrock-access-gateway && git pull; else git clone https://github.com/Brad-Edwards/bedrock-access-gateway.git && cd bedrock-access-gateway; fi",
              "cd src && docker build -f Dockerfile_ecs -t bedrock-gateway . && cd /opt",
              "aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              "docker pull ${MCP_SHIFTER_IMAGE}",
              "docker stop open-webui bedrock-gateway mcp-shifter 2>/dev/null || true",
              "docker rm open-webui bedrock-gateway mcp-shifter 2>/dev/null || true",
              "docker network create agentchat 2>/dev/null || true",
              "mkdir -p /opt/mcp-shifter-config",
              "echo '{\"sessions\":{\"maxPerUser\":10,\"maxGlobal\":100,\"logInfoThreshold\":50,\"logWarnThreshold\":80},\"connections\":{\"idleTimeoutMs\":300000}}' > /opt/mcp-shifter-config/config.json",
              "docker run -d --name bedrock-gateway --restart unless-stopped --network agentchat -p 8000:8080 -e AWS_REGION=${BEDROCK_REGION} -e API_KEY=${BAG_API_KEY} bedrock-gateway",
              "docker run -d --name mcp-shifter --restart unless-stopped --network agentchat -p 3001:3001 -v /opt/mcp-shifter-config:/app/config:ro -e PORT=3001 -e CONFIG_PATH=/app/config/config.json -e AWS_REGION=${BEDROCK_REGION} -e COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID} -e COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID} -e COGNITO_ISSUER=${COGNITO_ISSUER} -e RDS_HOSTNAME=${RDS_HOSTNAME} -e RDS_PORT=${RDS_PORT} -e RDS_DATABASE=${RDS_DATABASE} -e RDS_USERNAME=mcp_user ${MCP_SHIFTER_IMAGE}",
              "docker pull ghcr.io/open-webui/open-webui:v0.6.41",
              "docker run -d --name open-webui --restart unless-stopped --network agentchat -p 8080:8080 -e OLLAMA_BASE_URL= -e ENABLE_OLLAMA_API=false -e OPENAI_API_BASE_URL=http://bedrock-gateway:8080/api/v1 -e OPENAI_API_KEY=${BAG_API_KEY} -e BYPASS_ADMIN_ACCESS_CONTROL=false -e DATABASE_URL=${DATABASE_URL} ghcr.io/open-webui/open-webui:v0.6.41",
              "echo 'Waiting for health checks...'",
              "for i in \\$(seq 1 30); do if curl -sf http://localhost:8080/health > /dev/null 2>&1; then echo 'OpenWebUI healthy'; break; fi; if [ \\$i -eq 30 ]; then docker logs open-webui; exit 1; fi; sleep 10; done",
              "for i in \\$(seq 1 30); do if curl -sf http://localhost:3001/health > /dev/null 2>&1; then echo 'mcp-shifter healthy'; break; fi; if [ \\$i -eq 30 ]; then docker logs mcp-shifter; exit 1; fi; sleep 10; done",
              "echo 'AgentChat deployment complete'"
            ]
          }
          EOF
          )

          COMMAND_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$INSTANCE_ID" \
            --parameters "$SSM_PARAMS" --timeout-seconds 600 --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null) || STATUS="Pending"
            echo "Attempt $i: Status=$STATUS"
            if [ "$STATUS" == "Success" ]; then echo "AgentChat deployment successful!"; exit 0; fi
            if [ "$STATUS" == "Failed" ] || [ "$STATUS" == "Cancelled" ] || [ "$STATUS" == "TimedOut" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "Deployment timed out"; exit 1
