        "description": "Existing high-complexity functions are exempted with per-function `# noqa: C901` comments. New violations are not exempted by default; they must be refactored or the gate fails. The function-level backlog (one row per exemption, with current complexity) lives at docs/adr/complexity-backlog.md and shrinks as the threshold ratchets.",
