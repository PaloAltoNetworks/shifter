[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests (no external dependencies)
    slow: Tests that take >1s to run
    exercise_real_db_connection: Run the real _get_db_connection body instead of the module-level mock fixture
