# LibreChat Configuration
# https://www.librechat.ai/docs/configuration/librechat_yaml
#
# This file is copied to EC2 by the deploy workflow.
# For local dev, place in librechat/ directory.

version: 1.2.1

# Disable agents UI - users cannot access Agents tab
interface:
  agents: false

endpoints:
  # Explicitly disable built-in Bedrock endpoint
  # We use LiteLLM proxy instead (via custom endpoint)
  bedrock: false

  # Disable agents endpoint from calling Bedrock directly
  # See: https://www.librechat.ai/docs/configuration/librechat_yaml/object_structure/agents
  agents:
    # Don't allow any providers - forces agents to be completely disabled
    allowedProviders: []
    disableBuilder: true

  # Use LiteLLM proxy for Bedrock inference profile support
  # LiteLLM runs as sidecar container on port 4000
  custom:
    - name: "Bedrock"
      apiKey: "${LITELLM_MASTER_KEY:sk-litellm-internal}"
      baseURL: "http://litellm:4000/v1"
      models:
        default: ["claude-sonnet-4.5"]
        fetch: false
      titleConvo: true
      titleModel: "claude-sonnet-4.5"
      modelDisplayLabel: "Claude (Bedrock)"

modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "Claude Sonnet 4.5"
      label: "Claude Sonnet 4.5"
      default: true
      preset:
        endpoint: "Bedrock"
        model: "claude-sonnet-4.5"

