{% load static i18n %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>{% trans "Dev Login" %}</title>
        <link rel="stylesheet" href="{% static 'css/theme.css' %}">
        <style>
        body {
            font-family: Lato, "Assistant", sans-serif;
            background: #1f1f1f;
            color: #eaebeb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #151515;
            padding: 2rem;
            border: 1px solid #484848;
            border-radius: 4px;
            max-width: 400px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }
        .warning {
            background: #FF5252;
            color: #000;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            font-weight: 600;
            border-radius: 4px;
            font-size: 0.875rem;
        }
        p {
            color: #b8b8b8;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 0;
            margin-bottom: 1.5rem;
            background: #1f1f1f;
            border: none;
            border-bottom: 1px solid #575757;
            color: #eaebeb;
            font-family: Lato, "Assistant", sans-serif;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-bottom-color: #eaebeb;
        }
        select {
            width: 100%;
            padding: 0.75rem 0;
            margin-bottom: 1.5rem;
            background: #1f1f1f;
            border: none;
            border-bottom: 1px solid #575757;
            color: #eaebeb;
            font-family: Lato, "Assistant", sans-serif;
            font-size: 14px;
            box-sizing: border-box;
        }
        select:focus {
            outline: none;
            border-bottom-color: #eaebeb;
        }
        label {
            font-size: 0.75rem;
            color: #b8b8b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0.5rem 1.5rem;
            font-family: Lato, "Assistant", sans-serif;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            border-radius: 20px;
        }
        button:hover {
            background: #f4f5f5;
        }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="warning">
                {% trans "\u26a0 DEV MODE ONLY" %}
            </div>
            <h1>
                {% trans "Development Login" %}
            </h1>
            <p>
                {% trans "This bypasses OIDC for local testing." %}
            </p>
            <form method="post">
                {% csrf_token %}
                <label for="email">
                    {% trans "Email" %}
                </label>
                <input type="email"
                       id="email"
                       name="email"
                       value='{% trans "dev@example.com" %}'
                       placeholder='{% trans "Email" %}'>
                <label for="user_type">
                    {% trans "User Type" %}
                </label>
                <select name="user_type" id="user_type">
                    <option value='{% trans "standard" %}'>
                        {% trans "Standard (Mission Control)" %}
                    </option>
                    <option value='{% trans "ctf_organizer" %}'>
                        {% trans "CTF Organizer" %}
                    </option>
                    <option value='{% trans "ctf_participant" %}'>
                        {% trans "CTF Participant" %}
                    </option>
                </select>
                <button type="submit">
                    {% trans "Login as Dev User" %}
                </button>
            </form>
        </div>
    </body>
</html>
