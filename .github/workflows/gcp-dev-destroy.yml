name: GCP Dev Destroy

# Manually-dispatched teardown of the gcp-dev platform-core Terraform stack.
# Authenticates with the same Workload Identity Federation identity the
# deploy uses (.github/workflows/_gcp-dev.yml), so no local credentials are
# needed. Destroys everything in the gcp-dev Terraform state.
#
# Two resources need special handling before `terraform destroy`:
#   - The Cloud SQL instance ships deletion_protection = true; this workflow
#     renders cloud_sql_deletion_protection = false and applies it to the
#     instance first so destroy is permitted.
#   - The Artifact Registry KMS key ring + crypto key cannot be deleted via
#     the GCP API (key rings are permanent; keys only allow version
#     destruction), and the crypto key additionally carries
#     prevent_destroy = true. Both are removed from Terraform state before
#     destroy so Terraform stops managing them. They remain in the project,
#     inert and free, after teardown.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY to confirm teardown of the gcp-dev stack.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  destroy:
    name: Destroy (gcp-dev)
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write
    env:
      TF_DIR: platform/terraform/gcp/environments/gcp-dev
      TF_BACKEND_PREFIX: shifter/gcp-dev/platform-core
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      SQL_INSTANCE_ADDR: module.platform_core.google_sql_database_instance.platform
      KMS_KEYRING_ADDR: module.platform_core.google_kms_key_ring.artifact_registry
      KMS_KEY_ADDR: module.platform_core.google_kms_crypto_key.artifact_registry
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::Confirmation failed. Type DESTROY exactly to proceed."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Ensure GCP auth is configured
        run: |
          if [ -z "${GCP_SERVICE_ACCOUNT}" ] || [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT and GCP_WORKLOAD_IDENTITY_PROVIDER must be configured."
            exit 1
          fi

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
        with:
          version: ">= 416.0.0"

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "1.7.1"

      - name: Render local.auto.tfvars from secrets/variables
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
          GCP_PUBLIC_HOSTNAME: ${{ secrets.GCP_PUBLIC_HOSTNAME }}
          GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN: ${{ secrets.GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN }}
          GCP_MASTER_AUTHORIZED_CIDRS: ${{ secrets.GCP_MASTER_AUTHORIZED_CIDRS }}
        # Mirrors the deploy workflow's render so Terraform can evaluate the
        # config (the committed example.com baseline fails loud). Adds
        # cloud_sql_deletion_protection = false so the SQL instance can be
        # destroyed.
        run: |
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "::error::Required secret GCP_PROJECT_ID is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          if [ -z "${GCP_PUBLIC_HOSTNAME}" ]; then
            echo "::error::Required secret GCP_PUBLIC_HOSTNAME is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          if [ -z "${GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN}" ]; then
            echo "::error::Required secret GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          AUTHORIZED_CIDRS="${GCP_MASTER_AUTHORIZED_CIDRS:-[]}"
          cat > "${TF_DIR}/local.auto.tfvars" <<EOF
          # Auto-generated by .github/workflows/gcp-dev-destroy.yml; do not commit.
          project_id                    = "${GCP_PROJECT_ID}"
          region                        = "${GCP_REGION}"
          artifact_registry_location    = "${GCP_REGION}"
          public_hostname               = "${GCP_PUBLIC_HOSTNAME}"
          identity_allowed_email_domain = "${GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN}"
          gke_master_authorized_cidrs   = ${AUTHORIZED_CIDRS}
          cloud_sql_deletion_protection = false
          EOF

      - name: Resolve Terraform state bucket
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION || 'us-central1' }}
        run: |
          {
            echo "PROJECT_ID=${PROJECT_ID}"
            echo "REGION=${REGION}"
            echo "TF_STATE_BUCKET=${PROJECT_ID}-terraform-state"
          } >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_BACKEND_PREFIX}"

      - name: Lift Cloud SQL deletion protection
        working-directory: ${{ env.TF_DIR }}
        # Only acts if the instance is still in state. -target the instance so
        # the deletion_protection=false value reaches the live resource before
        # destroy. A no-op if SQL was already removed.
        run: |
          if terraform state list | grep -qx "${SQL_INSTANCE_ADDR}"; then
            terraform apply -auto-approve -target="${SQL_INSTANCE_ADDR}"
          else
            echo "Cloud SQL instance not in state; skipping deletion-protection lift."
          fi

      - name: Drop unremovable KMS resources from state
        working-directory: ${{ env.TF_DIR }}
        # GCP does not allow deleting KMS key rings or crypto keys, and the
        # crypto key carries prevent_destroy. Remove both from state so
        # destroy does not attempt (and fail on) them. They survive in the
        # project, inert.
        run: |
          for addr in "${KMS_KEY_ADDR}" "${KMS_KEYRING_ADDR}"; do
            if terraform state list | grep -qx "${addr}"; then
              terraform state rm "${addr}"
            else
              echo "${addr} not in state; skipping."
            fi
          done

      - name: Terraform destroy
        working-directory: ${{ env.TF_DIR }}
        run: terraform destroy -auto-approve
