services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 0
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"running\"'"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      GUACAMOLE_DB_NAME: ${GUACAMOLE_DB_NAME:-guacamole}
      GUACAMOLE_DB_USER: ${GUACAMOLE_DB_USER:-guacamole_admin}
      GUACAMOLE_DB_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      GUACAMOLE_JSON_AUTH_SECRET: ${GUACAMOLE_JSON_AUTH_SECRET}
      GUACAMOLE_BASE_URL: http://localhost:8080/guacamole
      GUACAMOLE_API_BASE_URL: http://guacamole:8080/guacamole
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv

  # ------------------------------------------------------------------------------
  # Celery Worker
  # Runs provisioning tasks (Terraform, range ops, NGFW management)
  # Replaces the SQS workers (worker-engine, worker-cms, worker-mc)
  # ------------------------------------------------------------------------------

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
    restart: unless-stopped

  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  guacamole:
    build:
      context: ../engine/guacamole
    env_file:
      - .env
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: "4822"
      POSTGRESQL_HOSTNAME: db
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: ${GUACAMOLE_DB_NAME:-guacamole}
      POSTGRESQL_USER: ${GUACAMOLE_DB_USER:-guacamole_admin}
      POSTGRESQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole}
      POSTGRESQL_AUTO_CREATE_ACCOUNTS: "true"
      JSON_ENABLED: "true"
      JSON_SECRET_KEY: ${GUACAMOLE_JSON_AUTH_SECRET}
      OPENID_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      guacd:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/guacamole/ || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
