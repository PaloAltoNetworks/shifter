name: Shifter Engine

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      is_dev:
        required: true
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_ROLE_ARN_DEV:
        required: true

env:
  AWS_REGION: us-east-2

jobs:
  build:
    name: Build (${{ inputs.environment }})
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    if: github.event_name != 'pull_request' || inputs.is_dev
    outputs:
      image_tag: ${{ steps.sha.outputs.short }}
    env:
      ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-pulumi-provisioner' || 'shifter-prod-pulumi-provisioner' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./shifter-engine
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.sha.outputs.short }}
          cache-from: type=local,src=/tmp/.buildx-cache-pulumi
          cache-to: type=local,dest=/tmp/.buildx-cache-pulumi-new,mode=max
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-pulumi
          mv /tmp/.buildx-cache-pulumi-new /tmp/.buildx-cache-pulumi || true

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: self-hosted
    permissions:
      id-token: write
    needs: build
    if: github.event_name != 'pull_request' || inputs.is_dev
    env:
      TASK_FAMILY: ${{ inputs.is_dev && 'dev-portal-pulumi-provisioner' || 'prod-portal-pulumi-provisioner' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-pulumi-provisioner' || 'shifter-prod-pulumi-provisioner' }}
        run: |
          # Get AWS account ID
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          NEW_IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"

          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition "${TASK_FAMILY}" --query 'taskDefinition')

          # Update the image in container definitions
          NEW_CONTAINER_DEFS=$(echo "$TASK_DEF" | jq --arg IMAGE "$NEW_IMAGE" '.containerDefinitions[0].image = $IMAGE | .containerDefinitions')

          # Register new task definition revision
          aws ecs register-task-definition \
            --family "${TASK_FAMILY}" \
            --task-role-arn "$(echo "$TASK_DEF" | jq -r '.taskRoleArn')" \
            --execution-role-arn "$(echo "$TASK_DEF" | jq -r '.executionRoleArn')" \
            --network-mode "$(echo "$TASK_DEF" | jq -r '.networkMode')" \
            --container-definitions "$NEW_CONTAINER_DEFS" \
            --requires-compatibilities FARGATE \
            --cpu "$(echo "$TASK_DEF" | jq -r '.cpu')" \
            --memory "$(echo "$TASK_DEF" | jq -r '.memory')"

          echo "Registered new task definition with image: ${NEW_IMAGE}"
