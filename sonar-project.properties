sonar.projectKey=Brad-Edwards_shifter
sonar.organization=brad-edwards
sonar.projectName=Shifter
sonar.projectVersion=2.3.2

# Source paths
sonar.sources=shifter/shifter_platform,shifter/engine/provisioner,shifter/packer,scripts/bootstrap,scripts/check_layer_imports,mcp/shifter-db,mcp/ngfw,mcp/ops,mcp/shared,mcp/aws
sonar.tests=shifter/shifter_platform/tests,shifter/engine/provisioner/tests,shifter/packer/tests,scripts/bootstrap/tests,scripts/check_layer_imports/tests

# Exclusions (including test files - don't need bug/smell analysis on tests)
# scenario-dev/** holds intentionally-vulnerable CTF target content; temp/** is scratch
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/__pycache__/**,**/migrations/**,**/.venv/**,**/staticfiles/**,**/tests/**,**/test_*.py,**/conftest.py,**/documentation/**,docs/ctf/**,scenario-dev/**,temp/**

# Security hotspot exclusions (test files contain mock credentials, docs have decorative JS)
sonar.security.exclusions=**/tests/**,**/test_*.py,**/conftest.py,**/documentation/**,docs/ctf/**,scenario-dev/**,temp/**

# CPD (copy-paste detection) exclusions. mcp/shared/aws-helpers.js
# intentionally consolidates argv-array helpers that previously lived
# in each MCP server; CPD against the previous per-package copies on
# the base branch would falsely flag the consolidation as duplication
# even though the dev tree after merge has only one copy.
sonar.cpd.exclusions=mcp/shared/**,mcp/ngfw/**.test.js,mcp/ops/**.test.js

# Coverage exclusions (test fixtures, dev-only code)
sonar.coverage.exclusions=**/tests/**,**/conftest.py,**/dev_auth.py

# Coverage report paths
sonar.python.coverage.reportPaths=shifter/shifter_platform/coverage.xml,shifter/engine/provisioner/coverage.xml,shifter/packer/coverage.xml,scripts/bootstrap/coverage.xml,scripts/check_layer_imports/coverage.xml
sonar.javascript.lcov.reportPaths=coverage/js/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
