[tool.ruff]
target-version = "py312"
line-length = 120
exclude = [".venv", "__pycache__"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "S", "T20", "SIM", "RUF"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
# S101: assert, S105/S106: hardcoded passwords in tests, S701: jinja2 autoescape (templates are shell scripts, not HTML)
"tests/**/*.py" = ["S101", "S105", "S106", "S701"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
