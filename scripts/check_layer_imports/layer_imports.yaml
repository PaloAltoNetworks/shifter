# Allowed cross-layer imports between service layers
#
# Format: from_layer -> list of allowed import targets
# - "layer" allows the layer's public API (__init__.py exports)
# - "layer.module" allows specific submodules only
#
# Any import not matching this config is a violation.

allowed:
  engine:
    - shared
    - management.services

  cms:
    - shared
    - management.services
    - engine  # public API

  management:
    - shared

  mission_control:
    - shared
    - management.services
    - cms             # public API
    - cms.services
    - engine          # public API
