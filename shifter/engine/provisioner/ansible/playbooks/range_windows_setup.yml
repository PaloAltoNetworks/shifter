---
# Windows Setup Playbook
#
# Configures Windows instances with:
# - Hostname (requires reboot)
# - OpenSSH Server with key authentication
# - Domain join (optional, if join_domain=true)
# - XDR agent installation (optional, if xdr_agent_url provided)
#
# Variables:
#   hostname: Required - hostname to set
#   ssh_public_key: Optional - SSH public key for Administrator access
#   join_domain: Optional - whether to join domain (default: false)
#   domain_name: Required if join_domain - domain to join
#   dc_ip: Required if join_domain - Domain Controller IP
#   domain_admin_user: Optional - domain admin username (default: Administrator)
#   domain_admin_password: Required if join_domain - domain admin password
#   xdr_agent_url: Optional - presigned S3 URL for XDR agent MSI

- name: Configure Windows Instance
  hosts: all
  gather_facts: false
  vars:
    hostname: ""
    ssh_public_key: ""
    join_domain: false
    domain_name: ""
    dc_ip: ""
    domain_admin_user: "Administrator"
    domain_admin_password: ""
    xdr_agent_url: ""

  tasks:
    # =========================================================================
    # BOOTSTRAP: Hostname
    # =========================================================================

    - name: Set hostname
      ansible.windows.win_hostname:
        name: "{{ hostname }}"
      register: hostname_result

    - name: Fail if hostname not set
      ansible.builtin.fail:
        msg: "Failed to set hostname to {{ hostname }}"
      when: hostname_result is failed

    - name: Reboot after hostname change
      ansible.windows.win_reboot:
        reboot_timeout: 600
      when: hostname_result.reboot_required | default(false)

    # =========================================================================
    # BOOTSTRAP: SSH Configuration
    # =========================================================================

    - name: Check if OpenSSH Server is installed
      ansible.windows.win_powershell:
        script: |
          $cap = Get-WindowsCapability -Online | Where-Object Name -like 'OpenSSH.Server*'
          if ($cap.State -eq 'Installed') {
              Write-Output "installed"
          } else {
              Write-Output "not_installed"
          }
      register: ssh_check
      changed_when: false

    - name: Install OpenSSH Server
      ansible.windows.win_powershell:
        script: |
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 -ErrorAction Stop
      register: ssh_install
      when: ssh_check.output[0] == 'not_installed'

    - name: Fail if OpenSSH Server installation failed
      ansible.builtin.fail:
        msg: "Failed to install OpenSSH Server"
      when: ssh_check.output[0] == 'not_installed' and ssh_install is failed

    - name: Start sshd service and set to Automatic
      ansible.windows.win_service:
        name: sshd
        start_mode: auto
        state: started
      register: sshd_service

    - name: Fail if sshd service failed to start
      ansible.builtin.fail:
        msg: "Failed to start sshd service"
      when: sshd_service is failed

    - name: Configure SSH key authentication
      ansible.windows.win_powershell:
        script: |
          $publicKey = '{{ ssh_public_key }}'

          if (-not $publicKey) {
              Write-Host "No public key provided, skipping key auth setup"
              exit 0
          }

          $sshDir = "C:\ProgramData\ssh"
          if (!(Test-Path $sshDir)) {
              New-Item -ItemType Directory -Path $sshDir -Force | Out-Null
          }

          $publicKey | Out-File -Encoding ascii "$sshDir\administrators_authorized_keys"

          # Set proper permissions - must match old behavior exactly
          icacls "$sshDir\administrators_authorized_keys" /inheritance:r `
              /grant "Administrators:F" /grant "SYSTEM:F" | Out-Null

          Write-Host "SSH key authentication configured"
          exit 0
      register: ssh_key_result
      when: ssh_public_key | length > 0

    - name: Fail if SSH key configuration failed
      ansible.builtin.fail:
        msg: "Failed to configure SSH key authentication"
      when: ssh_public_key | length > 0 and ssh_key_result is failed

    # =========================================================================
    # DOMAIN JOIN (conditional)
    # =========================================================================

    - name: Set DNS to Domain Controller
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = "Stop"

          try {
              $dcIp = "{{ dc_ip }}"

              # Set DNS on all active network adapters
              $adapters = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' }
              foreach ($adapter in $adapters) {
                  Set-DnsClientServerAddress -InterfaceIndex $adapter.ifIndex -ServerAddresses $dcIp
                  Write-Host "Set DNS to $dcIp on adapter: $($adapter.Name)"
              }

              Write-Host "DNS configuration completed"
              exit 0
          } catch {
              Write-Host "Error setting DNS: $_"
              exit 1
          }
      register: dns_result
      when: join_domain | bool

    - name: Fail if DNS configuration failed
      ansible.builtin.fail:
        msg: "Failed to set DNS to Domain Controller {{ dc_ip }}"
      when: join_domain | bool and dns_result.rc != 0

    - name: Join domain with DNS resolution wait and retries
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = "Stop"

          $domain = "{{ domain_name }}"
          $adminUser = "{{ domain_admin_user }}"
          $adminPass = ConvertTo-SecureString "{{ domain_admin_password }}" -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential("$domain\$adminUser", $adminPass)

          # Wait for DC DNS to be ready (up to 10 mins - give it time to actually work)
          Write-Host "Waiting for domain controller DNS to be ready..."
          $maxAttempts = 30
          $retryDelaySeconds = 20
          $attempt = 0
          $dnsReady = $false

          Write-Host "Will attempt DNS resolution up to $maxAttempts times with ${retryDelaySeconds}s delay (~10 mins total)"

          while ($attempt -lt $maxAttempts -and -not $dnsReady) {
              $attempt++
              Write-Host "DNS check attempt $attempt of $maxAttempts ($(Get-Date -Format 'HH:mm:ss'))..."

              try {
                  # Try to resolve the domain
                  $resolved = Resolve-DnsName -Name $domain -ErrorAction Stop
                  if ($resolved) {
                      Write-Host "Domain DNS resolved successfully after $attempt attempts"
                      Write-Host "Resolved: $($resolved | Out-String)"
                      $dnsReady = $true
                  }
              } catch {
                  Write-Host "DNS not ready yet: $_"
                  if ($attempt -lt $maxAttempts) {
                      Write-Host "Waiting $retryDelaySeconds seconds before retry..."
                      Start-Sleep -Seconds $retryDelaySeconds
                  }
              }
          }

          if (-not $dnsReady) {
              Write-Host "ERROR: Domain DNS not resolvable after $maxAttempts attempts (~10 mins)"
              exit 1
          }

          # Now attempt domain join with retries (generous - 20 attempts, 30s each = 10 mins)
          $joinAttempts = 20
          $joinRetryDelay = 30
          $joinAttempt = 0
          $joined = $false

          Write-Host "Will attempt domain join up to $joinAttempts times with ${joinRetryDelay}s delay"

          while ($joinAttempt -lt $joinAttempts -and -not $joined) {
              $joinAttempt++
              Write-Host "Domain join attempt $joinAttempt of $joinAttempts ($(Get-Date -Format 'HH:mm:ss'))..."

              try {
                  Write-Host "Attempting to join domain: $domain"
                  Add-Computer -DomainName $domain -Credential $cred -Force -ErrorAction Stop
                  Write-Host "Domain join initiated successfully after $joinAttempt attempts"
                  Write-Host "Machine will restart to complete domain join"
                  $joined = $true
              } catch {
                  Write-Host "Join attempt failed: $_"
                  Write-Host "Exception type: $($_.Exception.GetType().FullName)"
                  if ($_.Exception.InnerException) {
                      Write-Host "Inner exception: $($_.Exception.InnerException.Message)"
                  }
                  if ($joinAttempt -lt $joinAttempts) {
                      Write-Host "Waiting $joinRetryDelay seconds before retry..."
                      Start-Sleep -Seconds $joinRetryDelay
                  }
              }
          }

          if ($joined) {
              exit 0
          } else {
              Write-Host "ERROR: Domain join failed after $joinAttempts attempts (~10 mins)"
              exit 1
          }
      register: domain_join_result
      when: join_domain | bool

    - name: Fail if domain join failed
      ansible.builtin.fail:
        msg: "Failed to join domain {{ domain_name }}"
      when: join_domain | bool and domain_join_result.rc != 0

    - name: Reboot after domain join
      ansible.windows.win_reboot:
        reboot_timeout: 600
      when: join_domain | bool and domain_join_result.rc == 0

    - name: Verify domain membership
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = "Stop"

          $expectedDomain = "{{ domain_name }}"
          $maxAttempts = 30
          $retryDelaySeconds = 20
          $attempt = 0
          $verified = $false

          Write-Host "Will verify domain membership up to $maxAttempts times with ${retryDelaySeconds}s delay (~10 mins)"

          while ($attempt -lt $maxAttempts -and -not $verified) {
              $attempt++
              Write-Host "Verification attempt $attempt of $maxAttempts ($(Get-Date -Format 'HH:mm:ss'))..."

              try {
                  # WMI may not be ready immediately after domain join reboot
                  $computerSystem = Get-WmiObject Win32_ComputerSystem -ErrorAction Stop
                  $currentDomain = $computerSystem.Domain

                  Write-Host "Current domain: $currentDomain"
                  Write-Host "Expected domain: $expectedDomain"

                  if ($currentDomain -eq $expectedDomain) {
                      Write-Host "Successfully joined domain: $currentDomain"
                      $verified = $true
                  } else {
                      Write-Host "Domain mismatch - machine is in: $currentDomain"
                      if ($attempt -lt $maxAttempts) {
                          Write-Host "Domain membership may still be applying, retrying in $retryDelaySeconds seconds..."
                          Start-Sleep -Seconds $retryDelaySeconds
                      }
                  }
              } catch {
                  Write-Host "WMI query failed: $_"
                  if ($attempt -lt $maxAttempts) {
                      Write-Host "WMI service may still be initializing, retrying in $retryDelaySeconds seconds..."
                      Start-Sleep -Seconds $retryDelaySeconds
                  }
              }
          }

          if ($verified) {
              Write-Host "Domain join verification successful"
              exit 0
          } else {
              Write-Host "ERROR: Domain join verification failed after $maxAttempts attempts"
              Write-Host "Expected domain: $expectedDomain"
              exit 1
          }
      register: domain_verify_result
      when: join_domain | bool

    - name: Fail if domain verification failed
      ansible.builtin.fail:
        msg: "Domain membership verification failed - expected {{ domain_name }}"
      when: join_domain | bool and domain_verify_result.rc != 0

    # =========================================================================
    # XDR AGENT INSTALLATION (conditional)
    # =========================================================================

    - name: Download XDR agent
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = "Stop"

          $presignedUrl = "{{ xdr_agent_url }}"
          $installerPath = "C:\Windows\Temp\cortex_xdr_installer.msi"
          $maxRetries = 5
          $retryDelaySeconds = 10

          Write-Host "Downloading XDR agent installer..."

          # Cleanup any existing file from previous attempts (prevents file lock issues)
          if (Test-Path $installerPath) {
              Write-Host "Removing existing installer file..."
              Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
          }

          # Extract hostname from presigned URL for diagnostics
          $uri = [System.Uri]$presignedUrl
          $s3Host = $uri.Host
          Write-Host "S3 endpoint: $s3Host"

          # Test DNS resolution
          Write-Host "Testing DNS resolution..."
          try {
              $dns = [System.Net.Dns]::GetHostAddresses($s3Host)
              Write-Host "DNS resolved to: $($dns -join ', ')"
          } catch {
              Write-Host "WARNING: DNS resolution failed: $_"
          }

          # Ensure TLS 1.2+ for S3 presigned URLs
          $tls = [Net.SecurityProtocolType]::Tls12 -bor [Net.SecurityProtocolType]::Tls13
          [Net.ServicePointManager]::SecurityProtocol = $tls
          Write-Host "TLS protocols enabled: $([Net.ServicePointManager]::SecurityProtocol)"

          # Download with retry logic
          $lastError = $null
          for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
              try {
                  Write-Host "Download attempt $attempt of $maxRetries at $(Get-Date -Format 'HH:mm:ss')..."
                  $startTime = Get-Date
                  Invoke-WebRequest -Uri $presignedUrl -OutFile $installerPath -UseBasicParsing -TimeoutSec 120
                  $duration = (Get-Date) - $startTime
                  Write-Host "Download completed in $($duration.TotalSeconds) seconds"

                  if (Test-Path $installerPath) {
                      $fileSize = (Get-Item $installerPath).Length
                      if ($fileSize -gt 0) {
                          Write-Host "Download complete: $installerPath ($fileSize bytes)"
                          exit 0
                      } else {
                          throw "Downloaded file is empty"
                      }
                  } else {
                      throw "Failed to download installer - file not found"
                  }
              } catch {
                  $lastError = $_
                  Write-Host "Attempt $attempt failed: $_"
                  Write-Host "Exception type: $($_.Exception.GetType().FullName)"
                  if ($_.Exception.InnerException) {
                      Write-Host "Inner exception: $($_.Exception.InnerException.Message)"
                  }

                  if ($attempt -lt $maxRetries) {
                      # Exponential backoff: 10s, 20s, 40s, 80s
                      $delay = $retryDelaySeconds * [Math]::Pow(2, $attempt - 1)
                      Write-Host "Retrying in $delay seconds..."
                      Start-Sleep -Seconds $delay
                      # Cleanup partial download
                      if (Test-Path $installerPath) {
                          Remove-Item $installerPath -Force -ErrorAction SilentlyContinue
                      }
                  }
              }
          }

          Write-Host "All $maxRetries download attempts failed"
          Write-Host "Last error: $lastError"
          exit 1
      register: xdr_download_result
      when: xdr_agent_url | length > 0

    - name: Fail if XDR agent download failed
      ansible.builtin.fail:
        msg: "Failed to download XDR agent from {{ xdr_agent_url }}"
      when: xdr_agent_url | length > 0 and xdr_download_result.rc != 0

    - name: Install XDR agent
      ansible.windows.win_package:
        path: C:\Windows\Temp\cortex_xdr_installer.msi
        state: present
        arguments: /qn /norestart
      register: xdr_install_result
      when: xdr_agent_url | length > 0

    - name: Fail if XDR agent install failed
      ansible.builtin.fail:
        msg: "Failed to install XDR agent"
      when: xdr_agent_url | length > 0 and xdr_install_result is failed

    - name: Check XDR service status
      ansible.windows.win_powershell:
        script: |
          $cortex = Get-Service -Name "CortexXDR" -ErrorAction SilentlyContinue
          $cyserver = Get-Service -Name "cyserver" -ErrorAction SilentlyContinue

          if ($cortex -and $cortex.Status -eq "Running") {
              Write-Output "CortexXDR service is running"
              exit 0
          }
          if ($cyserver -and $cyserver.Status -eq "Running") {
              Write-Output "cyserver service is running"
              exit 0
          }

          # Check for Traps/XDR agent process
          $xdrProcess = Get-Process -Name "CortexXDR*" -ErrorAction SilentlyContinue
          if ($xdrProcess) {
              Write-Output "Cortex XDR process found: $($xdrProcess.Name)"
              exit 0
          }

          Write-Error "XDR agent service/process not found - agent may still be initializing"
          exit 1
      register: xdr_service_result
      retries: 6
      delay: 10
      until: xdr_service_result.rc == 0
      when: xdr_agent_url | length > 0

    - name: Fail if XDR service not running
      ansible.builtin.fail:
        msg: "XDR agent service not running - neither CortexXDR nor cyserver found running"
      when: xdr_agent_url | length > 0 and xdr_service_result.rc != 0

    - name: Cleanup XDR installer
      ansible.windows.win_file:
        path: C:\Windows\Temp\cortex_xdr_installer.msi
        state: absent
      when: xdr_agent_url | length > 0
