name: Deploy Portal Application

on:
  push:
    branches:
      - main
    paths:
      - 'portal/**'
      - '.github/workflows/portal-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: shifter-portal

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Portal

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        working-directory: portal
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY

          docker build \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:$SHORT_SHA \
            .

          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$SHORT_SHA

          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Built and pushed $IMAGE_URI:$SHORT_SHA"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Portal-Deploy

      - name: Get ECR Registry
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Deploy via SSM
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=prod-portal-ec2" \
            --parameters "commands=[
              'set -e',
              'IMAGE=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}',
              'docker pull \$IMAGE',
              'docker stop portal 2>/dev/null || true',
              'docker rm portal 2>/dev/null || true',
              'docker run -d --name portal --restart unless-stopped -p 8000:8000 --env-file /etc/portal.env \$IMAGE'
            ]" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=prod-portal-ec2" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text)" \
            || true

          # Get command status
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=prod-portal-ec2" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text)" \
            --query "Status" \
            --output text)

          echo "Command status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            exit 1
          fi

          echo "Deployment successful!"
