{% extends "mission_control/base.html" %}

{% block extra_css %}
<style>
    .ctfd-card {
        max-width: 760px;
        background: var(--xdr-surface);
        border: 1px solid var(--xdr-border);
        border-radius: 8px;
        padding: 1.5rem;
    }
    .ctfd-intro {
        color: var(--xdr-text-secondary);
        margin-bottom: 1rem;
        line-height: 1.5;
    }
    .ctfd-link-box {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--xdr-border);
        border-radius: 6px;
        padding: 0.9rem 1rem;
        margin-bottom: 1rem;
        word-break: break-all;
    }
    .ctfd-link-box a {
        color: var(--xdr-text);
        text-decoration: none;
    }
    .ctfd-open-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #00c853;
        color: #0b1a10;
        padding: 0.75rem 1.1rem;
        border-radius: 4px;
        font-weight: 700;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="mb-4">
        <h1 class="h3 mb-1">CTFd Platform</h1>
    </div>

    <div class="ctfd-card">
        <p class="ctfd-intro">
            Challenge submission, hints, and walkthrough content now live in the standalone CTFd platform.
            Open it below to log in and submit flags.
        </p>
        <div class="ctfd-link-box">
            <a href="{{ ctfd_url }}" target="_blank" rel="noopener noreferrer">{{ ctfd_url }}</a>
        </div>
        <a class="ctfd-open-btn" href="{{ ctfd_url }}" target="_blank" rel="noopener noreferrer">
            Open CTFd
        </a>
    </div>
</div>
{% endblock %}
