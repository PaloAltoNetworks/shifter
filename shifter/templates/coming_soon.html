{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIFTER // Coming Soon</title>
    <!-- T044: Load Lato font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;400;600;700&display=swap" rel="stylesheet">
    <!-- T043: Link xdr-theme.css for CSS variables -->
    <link rel="stylesheet" href="{% static 'css/xdr-theme.css' %}">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <style>
        /* T045-T047: Cortex XDR color palette */
        :root {
            --accent: #128df3;        /* T046: Cortex blue instead of neon green */
            --accent-glow: rgba(18, 141, 243, 0.4);
            --accent-soft: rgba(18, 141, 243, 0.6);
            --background: #1f1f1f;    /* T045: Cortex background */
            --surface: #151515;
            --text-primary: #eaebeb;  /* T047: Cortex text colors */
            --text-secondary: #b8b8b8;
            --text-muted: #707070;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: Lato, "Assistant", sans-serif;
            background: var(--background);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* Subtle gradient with vignette - more professional */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at center, transparent 0%, var(--background) 70%),
                radial-gradient(ellipse at 30% 70%, rgba(18, 141, 243, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(18, 141, 243, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* T048: Removed noise texture - too busy for professional look */

        /* T048: Removed scanlines - too retro for Cortex aesthetic */

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Logo with subtle glow - T048: more subtle animation */
        .logo {
            width: 160px;
            height: auto;
            margin-bottom: 2rem;
            animation: logoPulse 6s ease-in-out infinite;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        @keyframes logoPulse {
            0%, 100% {
                filter: drop-shadow(0 0 15px var(--accent-glow));
            }
            50% {
                filter: drop-shadow(0 0 25px var(--accent-soft))
                        drop-shadow(0 0 40px var(--accent-glow));
            }
        }

        /* Wordmark - T049: clean styling without glitch */
        .wordmark {
            width: 320px;
            height: auto;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .wordmark-container {
            position: relative;
            display: inline-block;
        }

        /* T048: Subtle hover glow instead of glitch effect */
        .wordmark-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .wordmark-container:hover::before {
            opacity: 0.3;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 400;
            color: var(--accent);
            opacity: 0.9;
            margin-bottom: 2.5rem;
            letter-spacing: 0.02em;
            line-height: 1.6;
            max-width: 480px;
        }

        .launch-date {
            font-family: Lato, "Assistant", sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
        }

        /* Terminal blink cursor - T046: Cortex blue */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background: var(--accent);
            margin-left: 4px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            z-index: 10;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .logo {
                width: 120px;
            }

            .wordmark {
                width: 240px;
            }

            .tagline {
                font-size: 0.9rem;
                padding: 0 1rem;
            }
        }

        @media (max-width: 400px) {
            .logo {
                width: 100px;
            }

            .wordmark {
                width: 200px;
            }

            .tagline {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <!-- T049: Logo and wordmark remain visible -->
        <img src="{% static 'images/logo-transparent.png' %}" alt="Shifter" class="logo">

        <div class="wordmark-container">
            <img src="{% static 'images/wordmark-transparent.png' %}" alt="SHIFTER" class="wordmark">
        </div>

        <p class="tagline">
            Autonomous AI adversaries. Real infrastructure. Controlled environments.<span class="cursor"></span>
        </p>

        <p class="launch-date">// December 18, 2025</p>
    </div>

    <footer class="footer">&copy; 2025 Brad Edwards</footer>

    <!-- T048: Removed glitch JavaScript - using subtle CSS hover effect instead -->
</body>
</html>
