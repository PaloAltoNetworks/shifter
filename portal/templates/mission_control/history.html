{% extends "mission_control/base.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">History</h1>
    <p class="page-subtitle">View your past range sessions</p>
</div>

<div class="card">
    <!-- Empty state with graphical element -->
    <div class="empty-state" id="history-empty">
        <div class="empty-state-graphic">
            <div class="empty-state-graphic-arc"></div>
            <div class="empty-state-graphic-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </div>
        </div>
        <h3>No range history yet</h3>
        <p>Your past ranges will appear here</p>
    </div>

    <!-- History list (hidden when empty) -->
    <div id="history-list" style="display: none;">
        <table class="table">
            <thead>
                <tr>
                    <th>DATE</th>
                    <th>AGENT</th>
                    <th>STATUS</th>
                    <th>DURATION</th>
                    <th class="text-right">ACTIONS</th>
                </tr>
            </thead>
            <tbody id="history-tbody">
                <!-- Will be populated dynamically -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
