# ---------------------------------------------------------------------------
# Relationships — credential and pivot chains
# ---------------------------------------------------------------------------

relationships:
  # Multi-zone credential chain
  vasik-to-gitea:
    type: authenticates_with
    source: e-vasik
    target: a7-git
    description: e.vasik's AD credentials authenticate to Gitea
  vasik-to-mail:
    type: authenticates_with
    source: e-vasik
    target: a1-mail
  vasik-to-intranet:
    type: authenticates_with
    source: e-vasik
    target: a3-intranet

  # Password sharing (Welcome1 reuse)
  webb-ivanov-share-welcome1:
    type: shares_credential_with
    source: m-webb
    target: s-ivanov
    properties:
      variable: default_welcome_password
  ivanov-shah-share-welcome1:
    type: shares_credential_with
    source: s-ivanov
    target: p-shah
    properties:
      variable: default_welcome_password

  # Pivot chain (A14 → A15 → A5, A14 → A16 → A7, A9 → bunker)
  kali-pivots-through-ops:
    type: pivots_through
    source: a14-kali
    target: a5-scada-gw
    properties:
      via: a15-ops-eng01
      unlock: flag-37
  kali-pivots-through-analyst:
    type: pivots_through
    source: a14-kali
    target: a7-git
    properties:
      via: a16-research-analyst01
  kali-pivots-through-splice:
    type: pivots_through
    source: a14-kali
    target: a13-brain-main
    properties:
      via: a9-splice-landing
      unlock: flag-19

  # AD group nesting (Project-L ⊂ Research-Coordination ⊂ Engineering-Support)
  # is expressed via accounts.<x>.groups + the description below. Groups are
  # opaque strings; backend realisation creates the nested group objects.

  # Cryptography chain (flag 30)
  gpg-a8-stores-private-key:
    type: encrypts_for
    source: a8-research-db
    target: e-vasik
    description: GPG private key stored as base64 blob in compartment_b.key_storage
  gpg-a6-holds-ciphertext:
    type: decrypts_with
    source: a6-eng-ws01
    target: a8-research-db
    properties:
      passphrase_variable: gpg_passphrase
      passphrase_location: a7-git

  # Flag discovery bindings (selection; full 38 modelled as metrics)
  flag-05-in-dns:
    type: flag_discovered_at
    source: flag-05
    target: dns-boreas
  flag-17-in-ad:
    type: flag_discovered_at
    source: flag-17
    target: a2-dc01
  flag-37-in-hmi-json:
    type: flag_discovered_at
    source: flag-37
    target: a15-ops-eng01
  flag-19-in-meltdown:
    type: flag_discovered_at
    source: flag-19
    target: a5-scada-gw

