  {
    "id": "ADR-011",
    "title": "OSS deployments use root-configured backend bundles",
    "status": "accepted",
    "scope": "repository",
    "decision": "OSS Shifter deployment intent is selected by a root installation configuration and a backend bundle. A backend bundle is the public OSS unit of backend selection and owns its runtime settings, infrastructure entrypoints, validation checks, required secrets, health checks, and setup documentation. Branch names must not be the architectural source of deployment target selection.",
    "rules": [
      {
        "id": "ADR-011-R1",
        "description": "One root installation config is the authoritative source for backend selection and deployment-level settings.",
        "checks": []
      },
      {
        "id": "ADR-011-R2",
        "description": "Backend bundles are the default OSS selection unit; low-level provider capability composition remains an internal implementation detail unless a later ADR introduces an advanced public mode.",
        "checks": []
      },
      {
        "id": "ADR-011-R3",
        "description": "Branch names must not determine deployment targets. CI may validate backend bundles, but deployment behavior is selected by explicit config or invocation.",
        "checks": []
      },
      {
        "id": "ADR-011-R4",
        "description": "Runtime provider and capability adapter selection must be derived from validated backend configuration while preserving shared service boundaries and adapter protocols.",
        "checks": []
      },
      {
        "id": "ADR-011-R5",
        "description": "AWS and GCP backend migrations must preserve existing security controls, identity boundaries, network isolation, and architecture guardrails unless a later ADR records an intentional change.",
