name: GCP Dev

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      github_environment:
        required: true
        type: string
      deploy_changes:
        required: true
        type: boolean
      require_active_certificate:
        description: >-
          Fail the deploy if the managed certificate is not Active for the public
          hostname (the portal is rendered for https://<hostname> only). Set false
          for first-time bootstrap before DNS is pointed at the ingress IP.
        required: false
        type: boolean
        default: true
    secrets:
      GCP_SERVICE_ACCOUNT:
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: false
      GCP_BOOTSTRAP_ADMIN_EMAIL:
        required: false
      GCP_BOOTSTRAP_ADMIN_PASSWORD:
        required: false
      PLATFORM_BOOTSTRAP_STAFF_EMAILS:
        required: false
      PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS:
        required: false
      # Deployment-owned identity values rendered into local.auto.tfvars at
      # deploy time. See docs/dev/deploy-secrets.md for the canonical list.
      GCP_PROJECT_ID:
        required: false
      GCP_PUBLIC_HOSTNAME:
        required: false
      GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN:
        required: false
      GCP_MASTER_AUTHORIZED_CIDRS:
        required: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ inputs.environment }})
    # Validation does not need deploy-network access; keep PR checks off the deploy runner pool.
    runs-on: ubuntu-latest
    env:
      GCP_ENVIRONMENT: ${{ inputs.environment }}
      KUBECONFORM_VERSION: v0.7.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "1.7.1"
      - uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede
        with:
          version: v1.34.1
      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
      - run: terraform fmt -check -recursive
        working-directory: platform/terraform/gcp
      - run: terraform init -backend=false
        working-directory: platform/terraform/gcp/environments/${{ inputs.environment }}
      - run: terraform validate
        working-directory: platform/terraform/gcp/environments/${{ inputs.environment }}
      - run: |
          (
            kubectl kustomize "platform/k8s/gcp/overlays/${GCP_ENVIRONMENT}"
            printf '\n---\n'
            cat "platform/k8s/gcp/overlays/${GCP_ENVIRONMENT}/platform-edge.generated.yaml"
          ) > /tmp/gcp-platform.yaml
      - run: /tmp/kubeconform -strict -summary /tmp/gcp-platform.yaml

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: self-hosted
    environment: ${{ inputs.github_environment }}
    needs: validate
    if: inputs.deploy_changes && github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
    env:
      TF_DIR: platform/terraform/gcp/environments/${{ inputs.environment }}
      K8S_OVERLAY_DIR: platform/k8s/gcp/overlays/${{ inputs.environment }}
      TF_BACKEND_PREFIX: shifter/${{ inputs.environment }}/platform-core
      EDGE_CERT_NAME: platform-managed-cert
      PLATFORM_BOOTSTRAP_STAFF_EMAILS: ${{ secrets.PLATFORM_BOOTSTRAP_STAFF_EMAILS }}
      PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS: ${{ secrets.PLATFORM_BOOTSTRAP_SUPERUSER_EMAILS }}
      GCP_BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.GCP_BOOTSTRAP_ADMIN_EMAIL }}
      GCP_BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.GCP_BOOTSTRAP_ADMIN_PASSWORD }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Ensure GCP deploy auth is configured
        run: |
          if [ -z "${GCP_SERVICE_ACCOUNT}" ] || [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT and GCP_WORKLOAD_IDENTITY_PROVIDER must be configured for gcp-dev deploys"
            exit 1
          fi
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
        with:
          version: ">= 416.0.0"
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "1.7.1"
      - name: Render local.auto.tfvars from secrets/variables
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
          GCP_PUBLIC_HOSTNAME: ${{ secrets.GCP_PUBLIC_HOSTNAME }}
          GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN: ${{ secrets.GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN }}
          GCP_MASTER_AUTHORIZED_CIDRS: ${{ secrets.GCP_MASTER_AUTHORIZED_CIDRS }}
        # The committed `terraform.tfvars` ships an example.com baseline that
        # fails-loud on apply. Each deployment provides its real values via
        # the GitHub secrets/variables listed above; this step renders them
        # into a `local.auto.tfvars` that Terraform auto-loads alongside the
        # baseline (deployment values override). See docs/dev/deploy-secrets.md
        # for the full required surface.
        run: |
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "::error::Required secret GCP_PROJECT_ID is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          if [ -z "${GCP_PUBLIC_HOSTNAME}" ]; then
            echo "::error::Required secret GCP_PUBLIC_HOSTNAME is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          if [ -z "${GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN}" ]; then
            echo "::error::Required secret GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN is not set. See docs/dev/deploy-secrets.md."
            exit 1
          fi
          # GCP_MASTER_AUTHORIZED_CIDRS is an HCL list literal — e.g. '["1.2.3.4/32"]'.
          # An unset value falls back to '[]' (locks the public control-plane).
          AUTHORIZED_CIDRS="${GCP_MASTER_AUTHORIZED_CIDRS:-[]}"
          cat > "${TF_DIR}/local.auto.tfvars" <<EOF
          # Auto-generated by .github/workflows/_gcp-dev.yml; do not commit.
          project_id                    = "${GCP_PROJECT_ID}"
          region                        = "${GCP_REGION}"
          artifact_registry_location    = "${GCP_REGION}"
          public_hostname               = "${GCP_PUBLIC_HOSTNAME}"
          identity_allowed_email_domain = "${GCP_IDENTITY_ALLOWED_EMAIL_DOMAIN}"
          gke_master_authorized_cidrs   = ${AUTHORIZED_CIDRS}
          EOF
      - name: Bootstrap Terraform backend metadata
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION || 'us-central1' }}
        run: |
          TF_STATE_BUCKET="${PROJECT_ID}-terraform-state"
          TF_STATE_RETENTION_DAYS=30
          TF_STATE_RETENTION_PERIOD_SECONDS=$((TF_STATE_RETENTION_DAYS * 24 * 60 * 60))
          {
            echo "PROJECT_ID=${PROJECT_ID}"
            echo "REGION=${REGION}"
            echo "TF_STATE_BUCKET=${TF_STATE_BUCKET}"
            echo "TF_STATE_RETENTION_DAYS=${TF_STATE_RETENTION_DAYS}"
            echo "TF_STATE_RETENTION_PERIOD_SECONDS=${TF_STATE_RETENTION_PERIOD_SECONDS}"
          } >> "$GITHUB_ENV"
      - name: Bootstrap Terraform state bucket
        run: |
          if ! gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project "${PROJECT_ID}" >/dev/null 2>&1; then
            gcloud storage buckets create "gs://${TF_STATE_BUCKET}" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --uniform-bucket-level-access \
              --public-access-prevention
          fi
          gcloud storage buckets update "gs://${TF_STATE_BUCKET}" --versioning
          RETENTION_DESCRIBE_ERR_FILE=$(mktemp)
          if ! CURRENT_RETENTION_SECONDS=$(gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project "${PROJECT_ID}" --format='value(retentionPolicy.retentionPeriod)' 2>"${RETENTION_DESCRIBE_ERR_FILE}"); then
            echo "::error::Failed to read Terraform state bucket retention policy for ${TF_STATE_BUCKET}: $(cat "${RETENTION_DESCRIBE_ERR_FILE}")"
            rm -f "${RETENTION_DESCRIBE_ERR_FILE}"
            exit 1
          fi
          rm -f "${RETENTION_DESCRIBE_ERR_FILE}"
          # Keep stricter existing retention policies; only raise retention when needed.
          if [ -z "${CURRENT_RETENTION_SECONDS}" ] || [ "${CURRENT_RETENTION_SECONDS}" -lt "${TF_STATE_RETENTION_PERIOD_SECONDS}" ]; then
            gcloud storage buckets update "gs://${TF_STATE_BUCKET}" --project "${PROJECT_ID}" --retention-period="${TF_STATE_RETENTION_PERIOD_SECONDS}s"
          fi
          # Remove broad/public bucket bindings only when present so real IAM errors still fail the workflow.
          remove_bucket_binding_if_present() {
            local member="$1"
            local role="$2"
            local has_binding
            has_binding=$(gcloud storage buckets get-iam-policy "gs://${TF_STATE_BUCKET}" \
              --project="${PROJECT_ID}" \
              --flatten="bindings[].members" \
              --filter="bindings.role=${role} AND bindings.members=${member}" \
              --format='value(bindings.members)')
            if [ -n "${has_binding}" ]; then
              gcloud storage buckets remove-iam-policy-binding "gs://${TF_STATE_BUCKET}" \
                --project="${PROJECT_ID}" \
                --member="${member}" \
                --role="${role}" >/dev/null
              echo "Removed ${member} from ${role} on ${TF_STATE_BUCKET}"
            fi
          }
          gcloud storage buckets add-iam-policy-binding "gs://${TF_STATE_BUCKET}" \
            --project="${PROJECT_ID}" \
            --member="serviceAccount:${GCP_SERVICE_ACCOUNT}" \
            --role="roles/storage.legacyBucketReader" >/dev/null
          gcloud storage buckets add-iam-policy-binding "gs://${TF_STATE_BUCKET}" \
            --project="${PROJECT_ID}" \
            --member="serviceAccount:${GCP_SERVICE_ACCOUNT}" \
            --role="roles/storage.objectAdmin" >/dev/null
          remove_bucket_binding_if_present "allUsers" "roles/storage.objectViewer"
          remove_bucket_binding_if_present "allAuthenticatedUsers" "roles/storage.objectViewer"
          remove_bucket_binding_if_present "projectOwner:${PROJECT_ID}" "roles/storage.legacyBucketOwner"
          remove_bucket_binding_if_present "projectEditor:${PROJECT_ID}" "roles/storage.legacyBucketOwner"
          remove_bucket_binding_if_present "projectViewer:${PROJECT_ID}" "roles/storage.legacyBucketReader"
      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_BACKEND_PREFIX}"
      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve
      - name: Capture Terraform outputs
        working-directory: ${{ env.TF_DIR }}
        run: terraform output -json > /tmp/gcp-terraform-outputs.json
      - name: Seed Identity Platform bootstrap operator
        if: env.GCP_BOOTSTRAP_ADMIN_EMAIL != '' && env.GCP_BOOTSTRAP_ADMIN_PASSWORD != ''
        run: |
          python3 - <<'PY'
          import importlib.util
          import json
          import os
          from pathlib import Path

          module_path = Path("scripts/bootstrap/deploy.py")
          spec = importlib.util.spec_from_file_location("bootstrap_deploy", module_path)
          if spec is None or spec.loader is None:
              raise RuntimeError(f"Unable to load bootstrap module from {module_path}")
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)

          outputs = json.loads(Path("/tmp/gcp-terraform-outputs.json").read_text())
          config = module.GDCBootstrapConfig(
              project_id=os.environ["PROJECT_ID"],
              cluster_id="cluster1",
          )
          module.ensure_gcp_identity_platform_operator(config, outputs)
          PY
      - name: Export deploy metadata
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          outputs = json.loads(Path("/tmp/gcp-terraform-outputs.json").read_text())

          def value(key):
              return outputs[key]["value"]

          image_roots = value("artifact_registry_image_roots")
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"GKE_CLUSTER_NAME={value('gke_cluster_name')}\n")
              env_file.write(f"GKE_CLUSTER_LOCATION={value('gke_cluster_location')}\n")
              env_file.write(f"PORTAL_IMAGE_ROOT={image_roots['portal']}\n")
              env_file.write(f"GUACD_IMAGE_ROOT={image_roots['guacd']}\n")
              env_file.write(f"GUACAMOLE_CLIENT_IMAGE_ROOT={image_roots['guacamole-client']}\n")
              env_file.write(f"PROVISIONER_IMAGE_ROOT={image_roots['pulumi-provisioner']}\n")
              env_file.write(f"ARTIFACT_REGISTRY_HOST={image_roots['portal'].split('/')[0]}\n")
              env_file.write(f"PUBLIC_HOSTNAME={value('public_hostname')}\n")
          PY
      - name: Login to Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.ARTIFACT_REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_ENV"
      - name: Pin overlay image tags to short SHA
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          short_sha = os.environ["SHORT_SHA"]
          path = Path(os.environ["K8S_OVERLAY_DIR"]) / "kustomization.yaml"
          content = path.read_text(encoding="utf-8")

          updated, replacements = re.subn(
            r"(?m)^(\s*newTag:\s*)latest\s*$",
            lambda match: f"{match.group(1)}{short_sha}",
            content,
          )
          if replacements == 0:
            if re.search(r"(?m)^\s*newTag:\s*\S+\s*$", content):
              print(f"No latest tags found in {path}; image tags are already pinned.")
            else:
              raise SystemExit(f"::error file={str(path)}::No image newTag entries found to pin")
          else:
            path.write_text(updated, encoding="utf-8")
            print(f"Pinned {replacements} image tags in {path} to {short_sha}")
          PY
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build and push portal image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./shifter
          file: ./shifter/shifter_platform/Dockerfile
          push: true
          tags: |
            ${{ env.PORTAL_IMAGE_ROOT }}:latest
            ${{ env.PORTAL_IMAGE_ROOT }}:${{ env.SHORT_SHA }}
          no-cache: true
      - name: Build and push provisioner image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./shifter/engine/provisioner
          push: true
          tags: |
            ${{ env.PROVISIONER_IMAGE_ROOT }}:latest
            ${{ env.PROVISIONER_IMAGE_ROOT }}:${{ env.SHORT_SHA }}
          no-cache: true
      - name: Build and push guacd image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./shifter/engine/guacd
          push: true
          tags: |
            ${{ env.GUACD_IMAGE_ROOT }}:latest
            ${{ env.GUACD_IMAGE_ROOT }}:${{ env.SHORT_SHA }}
          no-cache: true
      - name: Build and push guacamole-client image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./shifter/engine/guacamole
          push: true
          tags: |
            ${{ env.GUACAMOLE_CLIENT_IMAGE_ROOT }}:latest
            ${{ env.GUACAMOLE_CLIENT_IMAGE_ROOT }}:${{ env.SHORT_SHA }}
          no-cache: true
      - uses: google-github-actions/get-gke-credentials@3da1e46a907576cefaa90c484278bb5b259dd395
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_CLUSTER_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Render generated runtime env
        run: |
          # The GCP portal runtime is always production-secure (DEBUG off,
          # secure cookies, Identity Platform auth, SITE_URL=https://<hostname>).
          # render_runtime_env.py fails closed if the Terraform outputs lack a
          # public hostname / managed TLS, so an insecure runtime is never
          # rendered or applied (ADR-008-R1/R3).
          python3 scripts/gcp/render_runtime_env.py \
            --terraform-output-json /tmp/gcp-terraform-outputs.json \
            --output "${K8S_OVERLAY_DIR}/platform-runtime.generated.env"
      - name: Render generated edge manifest
        run: |
          python3 scripts/gcp/render_edge_manifest.py \
            --environment "${GCP_ENVIRONMENT}" \
            > "${K8S_OVERLAY_DIR}/platform-edge.generated.yaml"
      - name: Render generated private-service NetworkPolicy
        run: |
          # ADR-008-R6 (#963): the Kustomize base ships a default-deny
          # egress policy for shifter-platform, so the platform pods need
          # an explicit allow rule to reach Cloud SQL / Memorystore. The
          # destination CIDRs are dynamic Terraform outputs, so the
          # NetworkPolicy is generated from /tmp/gcp-terraform-outputs.json
          # with per-endpoint /32 ipBlocks — matching the Helm chart's
          # `privateServiceCidrs` flow used by the bootstrap deploy path
          # rather than opening broad RFC1918 supernets.
          python3 scripts/gcp/render_private_service_netpol.py \
            --terraform-output-json /tmp/gcp-terraform-outputs.json \
            --output "${K8S_OVERLAY_DIR}/platform-private-service.generated.yaml"
      # Roll out the production-secure workload (new runtime ConfigMap + restart)
      # BEFORE (re-)applying the public edge, so the public Ingress never routes
      # to pods still running an older, less-secure runtime config.
      - name: Apply GKE workload manifests
        run: kubectl apply -k "${K8S_OVERLAY_DIR}"
      - name: Apply private-service NetworkPolicy
        run: kubectl apply -f "${K8S_OVERLAY_DIR}/platform-private-service.generated.yaml"
      - name: Sync Guacamole runtime secret
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          outputs = json.loads(Path("/tmp/gcp-terraform-outputs.json").read_text())
          runtime_secret_ids = outputs["runtime_secret_ids"]["value"]

          def secret_name(resource_name: str) -> str:
              return resource_name.rstrip("/").split("/")[-1]

          guacamole_db_secret = secret_name(runtime_secret_ids["guacamole-db"])
          guacamole_json_secret = secret_name(runtime_secret_ids["guacamole-json-auth"])

          db_secret = subprocess.check_output(
              ["gcloud", "secrets", "versions", "access", "latest", "--secret", guacamole_db_secret, "--project", os.environ["PROJECT_ID"]],
              text=True,
          )
          json_auth_secret = subprocess.check_output(
              ["gcloud", "secrets", "versions", "access", "latest", "--secret", guacamole_json_secret, "--project", os.environ["PROJECT_ID"]],
              text=True,
          ).strip()

          db_payload = json.loads(db_secret)
          kubectl_args = [
              "kubectl",
              "create",
              "secret",
              "generic",
              "guacamole-runtime",
              "--namespace",
              "shifter-platform",
              f"--from-literal=POSTGRESQL_USER={db_payload['username']}",
              f"--from-literal=POSTGRESQL_PASSWORD={db_payload['password']}",
              f"--from-literal=JSON_SECRET_KEY={json_auth_secret}",
              "--dry-run=client",
              "-o",
              "yaml",
          ]
          secret_manifest = subprocess.check_output(kubectl_args, text=True)
          subprocess.run(["kubectl", "apply", "-f", "-"], input=secret_manifest, text=True, check=True)
          PY
      - name: Restart control-plane deployments
        run: |
          for deployment in portal-web guacd guacamole-client worker-cms worker-engine worker-mc ctf-scheduler; do
            kubectl rollout restart "deployment/${deployment}" -n shifter-platform
          done
      - name: Wait for rollouts
        run: |
          for deployment in portal-web guacd guacamole-client worker-cms worker-engine worker-mc ctf-scheduler; do
            kubectl rollout status "deployment/${deployment}" -n shifter-platform --timeout=15m
          done
      - name: Apply platform edge manifest
        run: kubectl apply -f "${K8S_OVERLAY_DIR}/platform-edge.generated.yaml"
      - name: Wait for ingress IP
        run: |
          for _ in $(seq 1 60); do
            INGRESS_IP=$(kubectl get ingress platform-external -n shifter-platform -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "${INGRESS_IP}" ]; then
              echo "Ingress IP: ${INGRESS_IP}"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Ingress platform-external did not receive a load-balancer IP within 10 minutes"
          exit 1
      - name: Wait for managed certificate to cover the public hostname
        env:
          REQUIRE_ACTIVE_CERTIFICATE: ${{ inputs.require_active_certificate }}
        run: |
          # The portal is rendered for https://<public_hostname> only, so a
          # reachable deploy needs a ManagedCertificate that is Active for that
          # exact hostname. The certificate object name is fixed, so verify
          # .spec.domains covers ${PUBLIC_HOSTNAME} (a stale cert for a previous
          # hostname can read Active). The production-secure workload is already
          # rolled out by this point, so when this gate fails the cluster is left
          # in the secure config (just not yet HTTPS-reachable via the hostname),
          # not the old runtime.
          cert_covers_hostname() {
            local domains d
            local -a parsed
            domains=$(kubectl get managedcertificate "${EDGE_CERT_NAME}" -n shifter-platform -o jsonpath='{.spec.domains[*]}' 2>/dev/null || true)
            read -ra parsed <<< "${domains}"
            for d in "${parsed[@]}"; do
              [ "${d}" = "${PUBLIC_HOSTNAME}" ] && return 0
            done
            return 1
          }

          if [ "${REQUIRE_ACTIVE_CERTIFICATE}" != "true" ]; then
            # First-time bootstrap: DNS for the hostname cannot be pointed at the
            # ingress IP until the operator has it from this run, so don't park
            # the deploy on the Active wait. Confirm the certificate object was
            # rendered for the hostname, warn, and continue.
            for _ in $(seq 1 12); do
              if cert_covers_hostname; then
                echo "::warning::Bootstrap mode: ManagedCertificate ${EDGE_CERT_NAME} is configured for ${PUBLIC_HOSTNAME} but is not yet Active. Point DNS for ${PUBLIC_HOSTNAME} at the ingress IP, then re-run the deploy without gcp_require_active_certificate."
                exit 0
              fi
              sleep 10
            done
            echo "::error::Bootstrap mode: ManagedCertificate ${EDGE_CERT_NAME} did not appear with ${PUBLIC_HOSTNAME} in .spec.domains within 2 minutes"
            exit 1
          fi

          for _ in $(seq 1 120); do
            CERT_STATUS=$(kubectl get managedcertificate "${EDGE_CERT_NAME}" -n shifter-platform -o jsonpath='{.status.certificateStatus}' 2>/dev/null || true)
            if cert_covers_hostname && [ "${CERT_STATUS}" = "Active" ]; then
              echo "ManagedCertificate ${EDGE_CERT_NAME} is Active for ${PUBLIC_HOSTNAME}"
              exit 0
            fi
            echo "Waiting for ManagedCertificate ${EDGE_CERT_NAME} to cover ${PUBLIC_HOSTNAME} and become Active: status='${CERT_STATUS:-pending}'"
            sleep 30
          done
          echo "::error::ManagedCertificate ${EDGE_CERT_NAME} is not Active for ${PUBLIC_HOSTNAME} after 60 minutes; check that DNS for ${PUBLIC_HOSTNAME} points at the ingress IP. Re-run with gcp_require_active_certificate=false only for first-time bootstrap."
          exit 1
