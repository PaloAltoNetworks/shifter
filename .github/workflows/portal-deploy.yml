name: Deploy Portal Application

on:
  push:
    branches:
      - main
    paths:
      - 'portal/**'
      - '.github/workflows/portal-deploy.yml'
  # Also run after infra workflow completes to ensure secrets are up to date
  workflow_run:
    workflows: ["Deploy Portal Infrastructure"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Prevent concurrent deployments and duplicate runs from push + workflow_run
concurrency:
  group: portal-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: shifter-portal
  DB_SECRET_ARN: arn:aws:secretsmanager:us-east-2:${{ secrets.AWS_ACCOUNT_ID }}:secret:shifter-prod-portal-db-credentials
  APP_SECRET_ARN: arn:aws:secretsmanager:us-east-2:${{ secrets.AWS_ACCOUNT_ID }}:secret:shifter-prod-portal-app
  COGNITO_SECRET_ARN: arn:aws:secretsmanager:us-east-2:${{ secrets.AWS_ACCOUNT_ID }}:secret:shifter-prod-portal-cognito

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    # Skip if triggered by failed infra workflow
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Portal

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        working-directory: portal
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY

          docker build \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:$SHORT_SHA \
            .

          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$SHORT_SHA

          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Built and pushed $IMAGE_URI:$SHORT_SHA"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Portal-Deploy

      - name: Get deployment config
        id: config
        env:
          TF_VARS: ${{ secrets.TF_VARS_PROD_PORTAL }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT

          # Extract domain_name from tfvars secret
          PORTAL_DOMAIN=$(echo "$TF_VARS" | grep '^domain_name' | sed 's/.*= *"\([^"]*\)".*/\1/')
          if [ -z "$PORTAL_DOMAIN" ]; then
            echo "Error: Failed to extract domain_name from tfvars"
            exit 1
          fi
          echo "domain=${PORTAL_DOMAIN}" >> $GITHUB_OUTPUT

          # Extract S3 bucket name from tfvars secret
          S3_BUCKET=$(echo "$TF_VARS" | grep '^user_storage_bucket' | sed 's/.*= *"\([^"]*\)".*/\1/')
          if [ -z "$S3_BUCKET" ]; then
            echo "Error: Failed to extract user_storage_bucket from tfvars"
            exit 1
          fi
          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT

      - name: Deploy via SSM
        env:
          ECR_REGISTRY: ${{ steps.config.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          PORTAL_DOMAIN: ${{ steps.config.outputs.domain }}
          S3_BUCKET: ${{ steps.config.outputs.s3_bucket }}
        run: |
          # Container uses EC2 instance role for AWS credentials via IMDSv2
          # (hop limit=2 configured in Terraform). No explicit IAM user creds needed.
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=prod-portal-ec2" \
            --parameters "commands=[
              'set -e',
              'IMAGE=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}',
              'docker pull \$IMAGE',
              'docker stop portal 2>/dev/null || true',
              'docker rm portal 2>/dev/null || true',
              'docker run -d --name portal --restart unless-stopped -p 8000:8000 \
                -e AWS_REGION=${AWS_REGION} \
                -e AWS_S3_BUCKET_NAME=${S3_BUCKET} \
                -e DB_SECRET_ARN=${DB_SECRET_ARN} \
                -e APP_SECRET_ARN=${APP_SECRET_ARN} \
                -e COGNITO_SECRET_ARN=${COGNITO_SECRET_ARN} \
                -e DJANGO_ALLOWED_HOSTS=${PORTAL_DOMAIN} \
                -e DJANGO_CSRF_TRUSTED_ORIGINS=https://${PORTAL_DOMAIN} \
                \$IMAGE'
            ]" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=prod-portal-ec2" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text)" \
            || true

          # Get command status
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=prod-portal-ec2" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text)" \
            --query "Status" \
            --output text)

          echo "Command status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            exit 1
          fi

          echo "Deployment successful!"
