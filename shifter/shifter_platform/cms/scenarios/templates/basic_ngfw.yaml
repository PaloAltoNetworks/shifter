id: basic
name: Basic Range
description: A basic attacker-victim range with Kali Linux attacker and user-provided agent on victim.
enabled: true
ngfw: true

instances:
  - name: Attacker
    role: attacker
    os_type: kali
    xdr_agent: false

  - name: Workstation
    role: victim
    os_type: from_agent
    xdr_agent: true

subnets:
  - name: attack
    instances: [Attacker]

  - name: target
    instances: [Workstation]
