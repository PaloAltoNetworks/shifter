{% load static user_extras %}
<!DOCTYPE html>
<html lang="en" class="xdr-dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mission Control{% endblock %} - Cortex XDR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/xdr-theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/xdr-sidebar.css' %}">
    {% block extra_css %}{% endblock %}
</head>

            </div>

                </a>
                <div class="user-initials" title="{{ user.email }}">
                    {{ user.email|initials }}
                </div>
            </div>
        </div>
    </nav>

    <div class="layout">
        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{% static 'js/sidebar.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
