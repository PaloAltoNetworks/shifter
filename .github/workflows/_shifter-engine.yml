name: Shifter Engine

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      is_dev:
        required: true
        type: boolean
      deploy_changes:
        required: true
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_ROLE_ARN_DEV:
        required: true

env:
  AWS_REGION: us-east-2

jobs:
  validate:
    name: Validate (${{ inputs.environment }})
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build provisioner image locally
        run: docker build --no-cache -t shifter-engine-validate ./shifter/engine/provisioner

  build:
    name: Build (${{ inputs.environment }})
    runs-on: self-hosted
    needs: validate
    permissions:
      id-token: write
      contents: read
    if: inputs.deploy_changes && github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.sha.outputs.short }}
    env:
      ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-pulumi-provisioner' || 'shifter-prod-pulumi-provisioner' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./shifter/engine/provisioner
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.sha.outputs.short }}
          no-cache: true

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: self-hosted
    permissions:
      id-token: write
    needs: build
    if: inputs.deploy_changes && github.event_name != 'pull_request'
    env:
      TASK_FAMILY: ${{ inputs.is_dev && 'dev-portal-pulumi-provisioner' || 'prod-portal-pulumi-provisioner' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-pulumi-provisioner' || 'shifter-prod-pulumi-provisioner' }}
        run: |
          # Get AWS account ID
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          NEW_IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"

          # Get current task definition (skip if doesn't exist yet - first deploy)
          TASK_DEF=$(aws ecs describe-task-definition --task-definition "${TASK_FAMILY}" --query 'taskDefinition' 2>/dev/null) || {
            echo "::warning::Task definition ${TASK_FAMILY} does not exist yet. Skipping deploy - Platform terraform will create it."
            exit 0
          }

          # Swap the image into the existing task definition and strip the
          # read-only fields AWS rejects on register. Re-registering the whole
          # definition (rather than cherry-picking individual fields) carries
          # every Terraform-managed field forward verbatim — volumes,
          # mountPoints, runtimePlatform, ephemeralStorage, etc. Cherry-picking
          # silently dropped `volumes` once Terraform added them (#1103),
          # breaking every deploy with "Unknown volume 'provisioner-workspace'".
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE
             | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition revision
          aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF"

          echo "Registered new task definition with image: ${NEW_IMAGE}"
