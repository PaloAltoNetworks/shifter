            Resource:
              - !Sub 'arn:${AWS::Partition}:kms:*:${KmsAccountADS}:key/*'
            Condition:
              StringLike:
                kms:ViaService: ec2.*.amazonaws.com
          - Sid: TargetKeyGrant
            Effect: Allow
            Action:
              - kms:CreateGrant
            Resource:
              - !Sub 'arn:${AWS::Partition}:kms:*:*:key/*'
            Condition:
              StringLike:
                kms:ViaService: ec2.*.amazonaws.com
              Bool:
                kms:GrantIsForAWSResource: 'true'
              ForAllValues:StringEquals:
                kms:GrantOperations:
                  - Decrypt
                  - Encrypt
          - Sid: ScanningKeyGrant
            Effect: Allow
            Action:
              - kms:CreateGrant
            Resource:
              - !Sub 'arn:${AWS::Partition}:kms:*:${KmsAccountADS}:key/*'
            Condition:
              StringLike:
                kms:ViaService: ec2.*.amazonaws.com
