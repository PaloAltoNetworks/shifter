<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// =========================================================================
//  LOADING
// =========================================================================
const loadBar = document.getElementById('load-bar');
let loadProgress = 0;
function advanceLoad(pct) {
  loadProgress = Math.min(loadProgress + pct, 100);
  loadBar.style.width = loadProgress + '%';
}

// =========================================================================
//  RENDERER
// =========================================================================
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.65;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);
advanceLoad(10);

// =========================================================================
//  SCENE
// =========================================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050809);
scene.fog = new THREE.FogExp2(0x080c10, 0.004);

// =========================================================================
//  CAMERA (Orthographic Isometric)
// =========================================================================
const frustum = 110;
const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
  -frustum * aspect, frustum * aspect,
  frustum, -frustum,
  -500, 1000
);
const isoDistance = 200;
const isoAngle = Math.PI / 4;
const isoTilt = Math.atan(1 / Math.sqrt(2));
camera.position.set(
  isoDistance * Math.cos(isoTilt) * Math.sin(isoAngle),
  isoDistance * Math.sin(isoTilt),
  isoDistance * Math.cos(isoTilt) * Math.cos(isoAngle)
);
camera.lookAt(0, 0, 0);

// =========================================================================
//  CONTROLS
// =========================================================================
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableRotate = true;
controls.enablePan = true;
controls.enableZoom = true;
controls.minZoom = 0.3;
controls.maxZoom = 3;
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);
advanceLoad(10);

// =========================================================================
//  MATERIALS LIBRARY

  }),
  wallDark: new THREE.MeshStandardMaterial({

  }),
  // Metal -- industrial panels, hatches
  metalDark: new THREE.MeshStandardMaterial({
    color: 0x1a1e24, roughness: 0.3, metalness: 0.8
  }),
  metalRusty: new THREE.MeshStandardMaterial({

  }),
  metalClean: new THREE.MeshStandardMaterial({
    color: 0x2a2e34, roughness: 0.25, metalness: 0.85
  }),

// =========================================================================
//  HELPER: create a box mesh
// =========================================================================
function box(w, h, d, material, castShadow = true, receiveShadow = true) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(g, material);
  m.castShadow = castShadow;
  m.receiveShadow = receiveShadow;
  return m;
}

function cylinder(rTop, rBot, h, segs, material) {
  const g = new THREE.CylinderGeometry(rTop, rBot, h, segs);
  const m = new THREE.Mesh(g, material);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// =========================================================================
//  GROUND PLANE
// =========================================================================
function buildGround() {
  // Tundra ground
  const ground = box(400, 1, 400, mat.ground, false, true);
  ground.position.set(0, -0.5, 0);
  scene.add(ground);

  // Concrete pad inside perimeter
  const pad = box(180, 0.5, 180, mat.concrete, false, true);
  pad.position.set(0, 0.25, 0);
  scene.add(pad);

  // Inner concrete areas with slight height variation
  const innerPad = box(160, 0.3, 160, mat.concreteDark, false, true);
  innerPad.position.set(0, 0.65, 0);
  scene.add(innerPad);

  // Puddles scattered around
  const puddlePositions = [
    [-30, 15], [20, -40], [-50, 30], [40, 50], [-15, -55],
    [55, -20], [-60, -30], [10, 65], [-45, -50], [35, 25],
    [60, 40], [-25, 60], [-55, -10], [0, -30], [50, -50],
    [-40, 45], [25, -15], [-10, -65]
  ];
  puddlePositions.forEach(([x, z]) => {
    const pw = 3 + Math.random() * 8;
    const pd = 2 + Math.random() * 6;
    const p = box(pw, 0.05, pd, mat.puddle, false, true);
    p.position.set(x, 0.82, z);
    p.rotation.y = Math.random() * Math.PI;
    scene.add(p);
  });
}

// =========================================================================
//  PERIMETER FENCE
// =========================================================================
function buildFence() {
  const fenceGroup = new THREE.Group();
  const size = 88;
  const postHeight = 8;
  const postSpacing = 8;
  const sides = [
    { start: [-size, -size], end: [size, -size] },
    { start: [size, -size], end: [size, size] },
    { start: [size, size], end: [-size, size] },
    { start: [-size, size], end: [-size, -size] },
  ];

  sides.forEach(side => {
    const dx = side.end[0] - side.start[0];
    const dz = side.end[1] - side.start[1];
    const len = Math.sqrt(dx * dx + dz * dz);
    const numPosts = Math.floor(len / postSpacing);

    for (let i = 0; i <= numPosts; i++) {
      const t = i / numPosts;
      const x = side.start[0] + dx * t;
      const z = side.start[1] + dz * t;

      // Fence post
      const post = box(0.6, postHeight, 0.6, mat.metalDark);
      post.position.set(x, postHeight / 2 + 0.8, z);
      fenceGroup.add(post);

      // Top bar for razor wire suggestion
      if (i < numPosts) {
        const nx = side.start[0] + dx * (i + 1) / numPosts;
        const nz = side.start[1] + dz * (i + 1) / numPosts;
        const barLen = postSpacing;
        const bar = box(barLen, 0.15, 0.15, mat.metalClean);
        bar.position.set((x + nx) / 2, postHeight + 0.8, (z + nz) / 2);
        bar.rotation.y = Math.atan2(dz, dx);
        fenceGroup.add(bar);

        // Mid horizontal bars
        for (let h = 2; h < postHeight; h += 2) {
          const midBar = box(barLen, 0.1, 0.1, mat.metalDark);
          midBar.position.set((x + nx) / 2, h + 0.8, (z + nz) / 2);
          midBar.rotation.y = Math.atan2(dz, dx);
          fenceGroup.add(midBar);
        }
      }

      // Occasional warning light on posts
      if (i % 4 === 0) {
        const light = box(0.4, 0.4, 0.4, mat.neonMagenta);
        light.position.set(x, postHeight + 1.5, z);
        fenceGroup.add(light);

        const pl = new THREE.PointLight(0xff1a66, 0.5, 15);
        pl.position.copy(light.position);
        fenceGroup.add(pl);
      }
    }
  });

  // Gate on south side
  const gateWidth = 16;
  const gatePillarL = box(1.5, 10, 1.5, mat.metalClean);
  gatePillarL.position.set(-gateWidth / 2, 5.8, -size);
  fenceGroup.add(gatePillarL);

  const gatePillarR = box(1.5, 10, 1.5, mat.metalClean);
  gatePillarR.position.set(gateWidth / 2, 5.8, -size);
  fenceGroup.add(gatePillarR);

  // Gate crossbar
  const gateCross = box(gateWidth, 0.8, 0.8, mat.metalDark);
  gateCross.position.set(0, 10.8, -size);
  fenceGroup.add(gateCross);

  // Gate neon strip
  const gateNeon = box(gateWidth - 2, 0.15, 0.15, mat.neonTeal);
  gateNeon.position.set(0, 11.5, -size);
  fenceGroup.add(gateNeon);

  // "ARES" signage at gate
  const signBacking = box(10, 2.5, 0.3, mat.wallDark);
  signBacking.position.set(0, 13, -size);
  fenceGroup.add(signBacking);
  const signGlow = box(8, 0.2, 0.35, mat.neonTeal);
  signGlow.position.set(0, 13, -size + 0.2);
  fenceGroup.add(signGlow);

  // Security booth at gate
  const booth = box(5, 4, 4, mat.wallMain);
  booth.position.set(gateWidth / 2 + 5, 2.8, -size + 2);
  fenceGroup.add(booth);
  const boothWindow = box(3, 1.5, 0.1, mat.windowLit);
  boothWindow.position.set(gateWidth / 2 + 5, 3.5, -size + 0.05);
  fenceGroup.add(boothWindow);
  const boothRoof = box(6, 0.4, 5, mat.roof);
  boothRoof.position.set(gateWidth / 2 + 5, 5, -size + 2);
  fenceGroup.add(boothRoof);

  // Access panel
  const accessPanel = box(0.8, 1.2, 0.2, mat.metalClean);
  accessPanel.position.set(-gateWidth / 2 - 1.5, 3.5, -size + 0.2);
  fenceGroup.add(accessPanel);
  const cardReader = box(0.3, 0.15, 0.25, mat.neonTeal);
  cardReader.position.set(-gateWidth / 2 - 1.5, 3.8, -size + 0.35);
  fenceGroup.add(cardReader);

  scene.add(fenceGroup);
  return fenceGroup;
}

  // Windows on east face

    for (let col = 0; col < 5; col++) {
      const isLit = Math.random() > 0.5;
      const win = box(0.15, 2, 3.5, isLit ? mat.windowLit : mat.windowDark);
      win.position.set(-0.1, 5 + row * 6, -32 + col * 6);
      group.add(win);
    }
  }

  // Entrance -- south face
  const entranceSurround = box(8, 6, 1, mat.metalClean);
  entranceSurround.position.set(-25, 3.8, -37.8);
  group.add(entranceSurround);
  const entranceDoor = box(5, 5, 0.2, mat.windowDark);
  entranceDoor.position.set(-25, 3.3, -38.2);
  group.add(entranceDoor);

  // Entrance neon strip
  const entranceNeon = box(6, 0.15, 0.15, mat.neonTeal);
  entranceNeon.position.set(-25, 6.8, -38.5);
  group.add(entranceNeon);

  // Entrance light
  const entranceLight = new THREE.PointLight(0x00ffcc, 1.2, 20);
  entranceLight.position.set(-25, 7, -40);
  group.add(entranceLight);

  // Side access card reader
  const sidePanel = box(0.6, 1, 0.2, mat.metalClean);
  sidePanel.position.set(-20, 3.5, -38.3);
  group.add(sidePanel);
  const sideReader = box(0.25, 0.12, 0.25, mat.neonAmber);
  sideReader.position.set(-20, 3.8, -38.5);
  group.add(sideReader);

  // Security cameras
  const camPositions = [
    { pos: [-50, 15, -20], rot: Math.PI / 2 },
    { pos: [-25, 15, -37.5], rot: 0 },
    { pos: [0, 15, -20], rot: -Math.PI / 2 },
  ];
  camPositions.forEach(({ pos, rot }) => {
    const camGroup = new THREE.Group();
    const mount = box(0.5, 0.5, 1.5, mat.metalClean);
    mount.position.set(0, 0, 0);
    camGroup.add(mount);
    const lens = box(0.6, 0.6, 0.4, mat.metalDark);
    lens.position.set(0, 0, -0.9);
    camGroup.add(lens);
    const indicator = box(0.15, 0.15, 0.15, mat.neonMagenta);
    indicator.position.set(0, 0.3, -0.7);
    camGroup.add(indicator);
    camGroup.position.set(...pos);
    camGroup.rotation.y = rot;
    group.add(camGroup);
  });

  // Cable runs along wall base
  for (let i = 0; i < 3; i++) {
    const cable = box(50, 0.15, 0.15, mat.cable);
    cable.position.set(-25, 1 + i * 0.3, -37.9);
    group.add(cable);
  }

  // Corporate logo panel on wall (south face, upper)
  const logoBacking = box(12, 3, 0.2, mat.metalDark);
  logoBacking.position.set(-25, 20, -37.7);
  group.add(logoBacking);

  const logoGlow2 = box(0.2, 2.5, 0.25, mat.neonTeal);
  logoGlow2.position.set(-30, 20, -37.85);
  group.add(logoGlow2);

  scene.add(group);
  return group;
}

// =========================================================================
//  RAIN PARTICLE SYSTEM
// =========================================================================
function createRain() {
  const rainCount = 15000;
  const positions = new Float32Array(rainCount * 3);
  const velocities = new Float32Array(rainCount);

  for (let i = 0; i < rainCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 350;
    positions[i * 3 + 1] = Math.random() * 150;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 350;
    velocities[i] = 1.5 + Math.random() * 2.5;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    color: 0x4a6a8a,
    size: 0.3,
    transparent: true,
    opacity: 0.4,
    depthWrite: false,
  });

  const rain = new THREE.Points(geometry, material);
  scene.add(rain);

  return { rain, velocities };
}

// =========================================================================
//  POST-PROCESSING
// =========================================================================
function setupPostProcessing() {
  const composer = new EffectComposer(renderer);

  // Render pass
  const renderPass = new RenderPass(scene, camera);
  composer.addPass(renderPass);

  // Bloom
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.35,  // strength
    0.6,   // radius
    0.7    // threshold
  );
  composer.addPass(bloomPass);

  // Film grain + vignette shader
  const filmGrainShader = {
    uniforms: {
      tDiffuse: { value: null },
      time: { value: 0 },
      grainIntensity: { value: 0.08 },
      vignetteIntensity: { value: 0.4 },
      scanlineIntensity: { value: 0.03 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D tDiffuse;
      uniform float time;
      uniform float grainIntensity;
      uniform float vignetteIntensity;
      uniform float scanlineIntensity;
      varying vec2 vUv;

      float rand(vec2 co) {
        return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
      }

      void main() {
        vec4 color = texture2D(tDiffuse, vUv);

        // Film grain
        float grain = rand(vUv * time) * grainIntensity;
        color.rgb += grain - grainIntensity * 0.5;

        // Vignette
        vec2 center = vUv - 0.5;
        float dist = length(center);
        float vignette = 1.0 - smoothstep(0.4, 0.9, dist) * vignetteIntensity;
        color.rgb *= vignette;

        // Subtle scanlines
        float scanline = sin(vUv.y * 800.0) * scanlineIntensity;
        color.rgb -= scanline;

        // Slight teal color shift
        color.r *= 0.95;
        color.g *= 1.02;
        color.b *= 1.05;

        gl_FragColor = color;
      }
    `
  };

  const filmPass = new ShaderPass(filmGrainShader);
  composer.addPass(filmPass);

  // Output pass
  const outputPass = new OutputPass();
  composer.addPass(outputPass);

  return { composer, filmPass, bloomPass };
}

// =========================================================================
//  ANIMATED ELEMENTS TRACKING
// =========================================================================
const animState = {
  clock: new THREE.Clock(),
  // Neon flicker targets (collect neon elements)
  flickerTargets: [],
};

// Collect all neon meshes for flickering by scanning the scene
scene.traverse(child => {
  if (child.isMesh && child.material && child.material.emissiveIntensity > 1.0) {
    animState.flickerTargets.push({
      mesh: child,
      baseIntensity: child.material.emissiveIntensity,
      flickerSpeed: 0.5 + Math.random() * 3,
      flickerPhase: Math.random() * Math.PI * 2,
      isNeon: true,
    });
  }
});

// =========================================================================
//  ANIMATION LOOP
// =========================================================================
function animate() {
  requestAnimationFrame(animate);

  const elapsed = animState.clock.getElapsedTime();
  const delta = animState.clock.getDelta();

  // --- Rain animation ---
  const rainPositions = rainData.rain.geometry.attributes.position.array;
  const rainCount = rainPositions.length / 3;
  for (let i = 0; i < rainCount; i++) {
    rainPositions[i * 3 + 1] -= rainData.velocities[i];
    // Wind drift
    rainPositions[i * 3] += 0.05;
    rainPositions[i * 3 + 2] -= 0.02;

    if (rainPositions[i * 3 + 1] < 0) {
      rainPositions[i * 3 + 1] = 130 + Math.random() * 20;
      rainPositions[i * 3] = (Math.random() - 0.5) * 350;
      rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 350;
    }
  }
  rainData.rain.geometry.attributes.position.needsUpdate = true;

  // --- Hatch glow pulsing ---
  const hatchPulse = 1.0 + 0.6 * Math.sin(elapsed * 1.2) + 0.3 * Math.sin(elapsed * 2.7);
  hatchData.hatchLight.intensity = 3 * hatchPulse;
  hatchData.hatchLight2.intensity = 1.5 * hatchPulse;
  if (hatchData.glowRing.material) {
    hatchData.glowRing.material.emissiveIntensity = 1.5 * hatchPulse;
  }
  if (hatchData.seam.material) {
    hatchData.seam.material.emissiveIntensity = 1.5 * hatchPulse;
  }
  if (hatchData.seamCross.material) {
    hatchData.seamCross.material.emissiveIntensity = 1.5 * hatchPulse;
  }

  // --- Neon flicker ---
  animState.flickerTargets.forEach(target => {
    // Occasional full flicker
    const flicker = Math.sin(elapsed * target.flickerSpeed + target.flickerPhase);
    const randomDrop = Math.random() > 0.995 ? 0.1 : 1.0;
    const intensity = target.baseIntensity * (0.7 + 0.3 * flicker) * randomDrop;
    // Clone material to avoid shared material issues for flicker
    // (We accept shared material flicker as a stylistic choice -- they pulse together by group)
    target.mesh.material.emissiveIntensity = intensity;
  });

  // --- Film grain time update ---
  postProc.filmPass.uniforms.time.value = elapsed;

  // --- Puddle shimmer (subtle position wobble of puddle reflections via metalness) ---
  // Done cheaply: vary puddle material metalness slightly
  mat.puddle.metalness = 0.85 + 0.1 * Math.sin(elapsed * 0.8);

  controls.update();
  postProc.composer.render();
}

  const w = window.innerWidth;
  const h = window.innerHeight;

  camera.left = -frustum * a;
  camera.right = frustum * a;
  camera.top = frustum;
  camera.bottom = -frustum;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  postProc.composer.setSize(w, h);
});
