          - Sid: CopyImageAccessImage
            Effect: Allow
            Action:
              - ec2:CopyImage
            Resource:
              - !Sub 'arn:${AWS::Partition}:ec2:*::image/*'
          - Sid: CopyImageAccessSnapshot
            Effect: Allow
            Action:
              - ec2:CopyImage
            Condition:
              StringEquals:
                aws:RequestTag/managed_by: paloaltonetworks
            Resource:
              - !Sub 'arn:${AWS::Partition}:ec2:*::snapshot/*'
          - Sid: DescribeImages
            Effect: Allow
            Action:
              - ec2:DescribeImages
            Resource: '*'
          - Sid: DeregisterImage
            Effect: Allow
            Action:
              - ec2:DeregisterImage
            Resource:
              - !Sub 'arn:${AWS::Partition}:ec2:*::image/*'
            Condition:
              StringEquals:
                ec2:ResourceTag/managed_by: paloaltonetworks
          - Sid: TagImages
            Effect: Allow
            Action:
              - ec2:CreateTags
            Resource:
              - !Sub 'arn:${AWS::Partition}:ec2:*::image/*'
            Condition:
              StringEquals:
                ec2:CreateAction:
                  - CopyImage
                aws:RequestTag/managed_by: paloaltonetworks
