apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-web
  namespace: shifter-platform
  labels:
    app.kubernetes.io/part-of: shifter
    app.kubernetes.io/component: portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/part-of: shifter
      app.kubernetes.io/component: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: shifter
        app.kubernetes.io/component: portal
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: portal
      containers:
        - name: portal
          image: placeholder-portal:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          envFrom:
            - configMapRef:
                name: platform-runtime
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
