name: Portal

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      is_dev:
        required: true
        type: boolean

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/${{ inputs.environment }}/portal
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"
      - name: Write tfvars
        env:
          TF_VARS: ${{ inputs.is_dev && secrets.TF_VARS_DEV_PORTAL || secrets.TF_VARS_PROD_PORTAL }}
        run: echo "$TF_VARS" > terraform.tfvars
      - run: terraform fmt -check -recursive
        working-directory: terraform
      - run: bash ../../../modules/range/provisioner/build-lambdas.sh
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color -out=tfplan && terraform show -no-color tfplan > plan.txt
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ inputs.environment }}/portal/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan - Portal (${{ inputs.environment }})\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`
            });

  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: plan
    if: always() && (needs.plan.result == 'success' || needs.plan.result == 'skipped')
    defaults:
      run:
        working-directory: terraform/environments/${{ inputs.environment }}/portal
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"
      - name: Write tfvars
        env:
          TF_VARS: ${{ inputs.is_dev && secrets.TF_VARS_DEV_PORTAL || secrets.TF_VARS_PROD_PORTAL }}
        run: echo "$TF_VARS" > terraform.tfvars
      - run: bash ../../../modules/range/provisioner/build-lambdas.sh
      - run: terraform init
      - run: terraform apply -auto-approve

  build:
    name: Build (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: apply
    outputs:
      image_tag: ${{ steps.sha.outputs.short }}
    env:
      ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-portal' || 'shifter-portal' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./portal
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: build
    env:
      AWS_REGION: us-east-2
      ENV: ${{ inputs.environment }}
      ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-portal' || 'shifter-portal' }}
      INSTANCE_TAG: ${{ inputs.is_dev && 'dev-portal-ec2' || 'prod-portal-ec2' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get deployment config
        id: config
        env:
          TF_VARS: ${{ inputs.is_dev && secrets.TF_VARS_DEV_PORTAL || secrets.TF_VARS_PROD_PORTAL }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          PORTAL_DOMAIN=$(echo "$TF_VARS" | grep '^domain_name' | sed 's/.*= *"\([^"]*\)".*/\1/')
          echo "domain=${PORTAL_DOMAIN}" >> $GITHUB_OUTPUT
          S3_BUCKET=$(echo "$TF_VARS" | grep '^user_storage_bucket' | sed 's/.*= *"\([^"]*\)".*/\1/')
          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT
          PROVISION_ARN=$(aws stepfunctions list-state-machines --query "stateMachines[?contains(name, '${ENV}-portal-provision-range')].stateMachineArn | [0]" --output text 2>/dev/null || echo "")
          TEARDOWN_ARN=$(aws stepfunctions list-state-machines --query "stateMachines[?contains(name, '${ENV}-portal-teardown-range')].stateMachineArn | [0]" --output text 2>/dev/null || echo "")
          echo "provision_state_machine_arn=${PROVISION_ARN}" >> $GITHUB_OUTPUT
          echo "teardown_state_machine_arn=${TEARDOWN_ARN}" >> $GITHUB_OUTPUT

      - name: Get Instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running Portal EC2 instance with tag: $INSTANCE_TAG"; exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for cloud-init
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          for i in $(seq 1 30); do
            RESULT=$(aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["cloud-init status --wait || cloud-init status"]' \
              --query "Command.CommandId" --output text 2>/dev/null) || true
            if [ -n "$RESULT" ]; then
              sleep 10
              STATUS=$(aws ssm get-command-invocation --command-id "$RESULT" --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text 2>/dev/null) || true
              if echo "$STATUS" | grep -q "done"; then echo "Cloud-init complete"; exit 0; fi
            fi
            echo "Attempt $i: Waiting..."; sleep 10
          done
          echo "Warning: cloud-init wait timed out"

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
          ECR_REGISTRY: ${{ steps.config.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          PORTAL_DOMAIN: ${{ steps.config.outputs.domain }}
          S3_BUCKET: ${{ steps.config.outputs.s3_bucket }}
          PROVISION_STATE_MACHINE_ARN: ${{ steps.config.outputs.provision_state_machine_arn }}
          TEARDOWN_STATE_MACHINE_ARN: ${{ steps.config.outputs.teardown_state_machine_arn }}
          ACCOUNT_ID: ${{ steps.config.outputs.account_id }}
        run: |
          DB_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-db-credentials"
          APP_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-app"
          COGNITO_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-cognito"

          COMMAND_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$INSTANCE_ID" \
            --parameters "commands=[
              'set -e',
              'IMAGE=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}',
              'docker pull \$IMAGE',
              'docker stop portal 2>/dev/null || true',
              'docker rm portal 2>/dev/null || true',
              'docker run -d --name portal --restart unless-stopped -p 8000:8000 \
                -e AWS_REGION=${AWS_REGION} \
                -e AWS_S3_BUCKET_NAME=${S3_BUCKET} \
                -e DB_SECRET_ARN=${DB_SECRET_ARN} \
                -e APP_SECRET_ARN=${APP_SECRET_ARN} \
                -e COGNITO_SECRET_ARN=${COGNITO_SECRET_ARN} \
                -e DJANGO_ALLOWED_HOSTS=${PORTAL_DOMAIN} \
                -e DJANGO_CSRF_TRUSTED_ORIGINS=https://${PORTAL_DOMAIN} \
                -e SITE_URL=https://${PORTAL_DOMAIN} \
                -e PROVISION_STATE_MACHINE_ARN=${PROVISION_STATE_MACHINE_ARN} \
                -e TEARDOWN_STATE_MACHINE_ARN=${TEARDOWN_STATE_MACHINE_ARN} \
                \$IMAGE'
            ]" --timeout-seconds 300 --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
            exit 1
          fi
          echo "Portal deployment successful!"
