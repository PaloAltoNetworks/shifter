services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: sns,sqs,s3
      DEBUG: 0
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"sns\": \"running\"'"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      GUACAMOLE_DB_NAME: ${GUACAMOLE_DB_NAME:-guacamole}
      GUACAMOLE_DB_USER: ${GUACAMOLE_DB_USER:-guacamole_admin}
      GUACAMOLE_DB_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      PROVISIONER_PATH: /engine/provisioner
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      GUACAMOLE_JSON_AUTH_SECRET: ${GUACAMOLE_JSON_AUTH_SECRET}
      GUACAMOLE_BASE_URL: http://localhost:8080/guacamole
      GUACAMOLE_API_BASE_URL: http://guacamole:8080/guacamole
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv
      - ../engine/provisioner:/engine/provisioner

  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  guacamole:
    build:
      context: ../engine/guacamole
    env_file:
      - .env
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: "4822"
      POSTGRESQL_HOSTNAME: db
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: ${GUACAMOLE_DB_NAME:-guacamole}
      POSTGRESQL_USER: ${GUACAMOLE_DB_USER:-guacamole_admin}
      POSTGRESQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD:-guacamole}
      POSTGRESQL_AUTO_CREATE_ACCOUNTS: "true"
      JSON_ENABLED: "true"
      JSON_SECRET_KEY: ${GUACAMOLE_JSON_AUTH_SECRET}
      OPENID_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      guacd:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/guacamole/ || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ------------------------------------------------------------------------------
  # SQS Workers
  # Each worker polls its dedicated SQS queue (SNS fan-out)
  # Health check monitors heartbeat file - if stale for >60s, container restarts
  # ------------------------------------------------------------------------------

  worker-cms:
    build: .
    command: python manage.py run_worker --queue cms
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_CMS_URL: http://sqs.us-east-2.localhost.localstack.cloud:4566/000000000000/shifter-cms
    restart: always
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-cms-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

  worker-engine:
    build: .
    command: python manage.py run_worker --queue engine
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_ENGINE_URL: http://sqs.us-east-2.localhost.localstack.cloud:4566/000000000000/shifter-engine
    restart: always
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-engine-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

  worker-mc:
    build: .
    command: python manage.py run_worker --queue mc
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_MC_URL: http://sqs.us-east-2.localhost.localstack.cloud:4566/000000000000/shifter-mc
      REDIS_HOST: redis
    restart: always
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/worker-mc-heartbeat -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 2

volumes:
  postgres_data:
