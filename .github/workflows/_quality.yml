name: Quality

on:
  workflow_call:
    inputs:
      skip_tests:
        description: 'Skip test jobs (linting still runs)'
        required: false
        type: boolean
        default: false

jobs:
  # ===========================================================================
  # Linting
  # ===========================================================================

  adr-conformance:
    permissions:
      contents: read
    name: Architecture (adr conformance)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML for ADR guard (hermetic, job-scoped, version-pinned)
        env:
          PYYAML_VERSION: "6.0.2"
        run: |
          set -euo pipefail
          python3 --version
          # The self-hosted runner's system Python ships without pip by default
          # (Amazon Linux). Bootstrap pip via stdlib ensurepip into the user
          # site, then install PyYAML into a job-scoped target dir. No system
          # paths are written.
          python3 -m ensurepip --upgrade --user
          python3 -m pip install --quiet --no-deps \
            --target "${RUNNER_TEMP}/py-deps" \
            "pyyaml==${PYYAML_VERSION}"

      - name: Install Helm for ADR guard chart rendering (hermetic, version-pinned, checksum-verified)
        env:
          HELM_VERSION: v3.15.4
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/helm-bin"
          curl -fsSL -o "${RUNNER_TEMP}/helm.tar.gz" \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          # Verify the downloaded tarball against the published SHA256 checksum
          # before extraction or execution. Trust boundary is get.helm.sh; if
          # it is compromised both files compare equal, but this prevents
          # CDN/transport tampering and silent corruption.
          expected=$(curl -fsSL \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz.sha256sum" \
            | awk '{print $1}')
          echo "${expected}  ${RUNNER_TEMP}/helm.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/helm.tar.gz" -C "${RUNNER_TEMP}" linux-amd64/helm
          mv "${RUNNER_TEMP}/linux-amd64/helm" "${RUNNER_TEMP}/helm-bin/helm"
          echo "${RUNNER_TEMP}/helm-bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/helm-bin/helm" version --short

      - name: Run ADR guard
        env:
          PYTHONPATH: ${{ runner.temp }}/py-deps
        run: python3 scripts/adr_guard/adr_guard.py --all --level ci

  workflow-lint:
    permissions:
      contents: read
    name: Lint (GitHub Actions)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: devops-actions/actionlint@467e2ce19b2310e93c9ffa0b50fe31f86b5a7f23 # v0.1.10

  terraform-lint:
    permissions:
      contents: read
    name: Lint (terraform)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e87008f9dd1fe3e34e66aca6c97b4a69f72a7f4 # v4

      - name: Init TFLint
        run: tflint --init --config "${GITHUB_WORKSPACE}/.tflint.hcl"

      - name: Run TFLint
        working-directory: platform/terraform
        run: tflint --recursive --config "${GITHUB_WORKSPACE}/.tflint.hcl"

  shifter-platform-lint:
    permissions:
      contents: read
    name: Lint (shifter_platform)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Lint Python
        working-directory: shifter/shifter_platform
        run: |
          uv run ruff check .
          uv run ruff format --check .

  shifter-platform-lint-js:
    permissions:
      contents: read
    name: Lint JavaScript/CSS (shifter_platform)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shifter/shifter_platform/package-lock.json

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: npm ci

      - name: Lint JavaScript
        working-directory: shifter/shifter_platform
        run: npx eslint static/js/

      - name: Lint CSS
        working-directory: shifter/shifter_platform
        run: npx stylelint static/css/

  provisioner-lint:
    permissions:
      contents: read
    name: Lint (provisioner)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/engine/provisioner
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  packer-lint:
    permissions:
      contents: read
    name: Lint (packer)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/packer
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  bootstrap-lint:
    permissions:
      contents: read
    name: Lint (bootstrap)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/bootstrap
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  check-layer-imports-lint:
    permissions:
      contents: read
    name: Lint (check_layer_imports)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/check_layer_imports
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  check-rds-pending-modifications-lint:
    permissions:
      contents: read
    name: Lint (check_rds_pending_modifications)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/check_rds_pending_modifications
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  installation-lint:
    permissions:
      contents: read
    name: Lint (installation)
    # GitHub-hosted ephemeral runner: this job runs PR-controlled Python from a
    # standalone package with no special infra needs, so keep it off the persistent
    # self-hosted pool.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/installation
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  k8s-lint:
    permissions:
      contents: read
    name: Lint (k8s manifests)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install kube-linter
        run: |
          curl -fsSL -o /tmp/kube-linter.tar.gz \
            "https://github.com/stackrox/kube-linter/releases/download/v0.7.2/kube-linter-linux.tar.gz"
          tar -xzf /tmp/kube-linter.tar.gz -C /tmp kube-linter

      - name: Run kube-linter
        run: /tmp/kube-linter lint --config .kube-linter.yaml platform/k8s/

  k8s-schema:
    permissions:
      contents: read
    name: Lint (k8s schemas)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform

      - name: Validate k8s manifests
        run: |
          find platform/k8s -name '*.yaml' ! -name 'kustomization.yaml' -print0 | \
            xargs -0 /tmp/kubeconform -strict -summary -ignore-missing-schemas -kubernetes-version 1.31.0

  # ===========================================================================
  # Type Checking (non-blocking quality gate)
  # ===========================================================================

  shifter-platform-typecheck:
    permissions:
      contents: read
    name: Type Check (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    runs-on: self-hosted
    continue-on-error: true  # Non-blocking - quality signal only
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Run mypy
        working-directory: shifter/shifter_platform
        run: |
          uv run mypy . --no-error-summary || true
          echo "::notice::Type checking complete - see above for any type errors"

  provisioner-typecheck:
    permissions:
      contents: read
    name: Type Check (provisioner)
    if: ${{ !inputs.skip_tests }}
    runs-on: self-hosted
    continue-on-error: true  # Non-blocking - quality signal only
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/engine/provisioner
        run: uv sync --group dev

      - name: Run mypy
        working-directory: shifter/engine/provisioner
        run: |
          uv run mypy . --no-error-summary || true
          echo "::notice::Type checking complete - see above for any type errors"

  # ===========================================================================
  # Architecture as Code (hard fail - zero tolerance)
  # ===========================================================================

  check-layer-imports-arch:
    permissions:
      contents: read
    name: Architecture (layer imports)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/check_layer_imports
        run: uv sync

      - name: Check layer imports
        working-directory: scripts/check_layer_imports
        run: uv run python check_layer_imports.py

  import-linter-arch:
    permissions:
      contents: read
    name: Architecture (import linter)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Check import contracts
        working-directory: shifter/shifter_platform
        run: uv run lint-imports --config ../../.importlinter

  # ===========================================================================
  # SAST
  # ===========================================================================

  shifter-platform-sast:
    permissions:
      contents: read
    name: SAST (shifter_platform)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r shifter/shifter_platform/ --skip B101 --exclude shifter/shifter_platform/tests,shifter/shifter_platform/.venv

  provisioner-sast:
    permissions:
      contents: read
    name: SAST (provisioner)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        # B404: subprocess import, B603: subprocess call, B607: partial path
        # Provisioner uses subprocess for Pulumi CLI calls with hardcoded commands
        run: |
          uv tool install bandit
          bandit -r shifter/engine/provisioner/ --skip B101,B404,B603,B607 --exclude shifter/engine/provisioner/tests,shifter/engine/provisioner/.venv

  packer-sast:
    permissions:
      contents: read
    name: SAST (packer)
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r shifter/packer/ --skip B101 --exclude shifter/packer/tests,shifter/packer/.venv

  bootstrap-sast:
    permissions:
      contents: read
    name: SAST (bootstrap)
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r scripts/bootstrap/ --skip B101 --exclude scripts/bootstrap/tests,scripts/bootstrap/.venv

  check-layer-imports-sast:
    permissions:
      contents: read
    name: SAST (check_layer_imports)
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        working-directory: scripts/check_layer_imports
        run: |
          uv tool install 'bandit[toml]'
          bandit -r . -c pyproject.toml

  installation-sast:
    permissions:
      contents: read
    name: SAST (installation)
    # GitHub-hosted ephemeral runner (see installation-lint).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r shifter/installation/ --skip B101 --exclude shifter/installation/tests,shifter/installation/.venv

  # ===========================================================================
  # Python Tests
  # ===========================================================================

  shifter-platform-tests:
    permissions:
      contents: read
    name: Tests (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    needs: [shifter-platform-lint, shifter-platform-lint-js, shifter-platform-sast]
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shifter
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/shifter_platform
        env:
          TESTING: "1"
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shifter
          DB_USER: test
          DB_PASSWORD: test
        run: |
          uv run python manage.py collectstatic --noinput
          uv run pytest tests/ --ignore=tests/documentation --cov=config --cov=mission_control --cov=documentation --cov=cms --cov=shared --cov=ctf --cov=engine --cov=risk_register --cov-report=term-missing --cov-report=xml:coverage.xml

  shifter-engine-tests:
    permissions:
      contents: read
    name: Tests (provisioner)
    if: ${{ !inputs.skip_tests }}
    needs: [provisioner-lint, provisioner-sast]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/engine/provisioner
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/engine/provisioner
        env:
          TESTING: "1"
        run: uv run pytest tests/

  packer-tests:
    permissions:
      contents: read
    name: Tests (packer)
    if: ${{ !inputs.skip_tests }}
    needs: [packer-lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/packer
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/packer
        run: uv run pytest tests/

  bootstrap-tests:
    permissions:
      contents: read
    name: Tests (bootstrap)
    if: ${{ !inputs.skip_tests }}
    needs: [bootstrap-lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/bootstrap
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/bootstrap
        run: uv run pytest tests/

  check-layer-imports-tests:
    permissions:
      contents: read
    name: Tests (check_layer_imports)
    if: ${{ !inputs.skip_tests }}
    needs: [check-layer-imports-lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/check_layer_imports
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/check_layer_imports
        run: uv run pytest tests/

  check-rds-pending-modifications-tests:
    permissions:
      contents: read
    name: Tests (check_rds_pending_modifications)
    if: ${{ !inputs.skip_tests }}
    needs: [check-rds-pending-modifications-lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/check_rds_pending_modifications
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/check_rds_pending_modifications
        run: uv run pytest tests/

  installation-tests:
    permissions:
      contents: read
    name: Tests (installation)
    if: ${{ !inputs.skip_tests }}
    needs: [installation-lint]
    # GitHub-hosted ephemeral runner (see installation-lint).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/installation
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/installation
        run: uv run pytest tests/

  adr-guard-tests:
    permissions:
      contents: read
    name: Tests (adr_guard)
    if: ${{ !inputs.skip_tests }}
    needs: [adr-conformance]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML for ADR guard (hermetic, job-scoped, version-pinned)
        env:
          PYYAML_VERSION: "6.0.2"
        run: |
          set -euo pipefail
          python3 --version
          python3 -m ensurepip --upgrade --user
          python3 -m pip install --quiet --no-deps \
            --target "${RUNNER_TEMP}/py-deps" \
            "pyyaml==${PYYAML_VERSION}"

      - name: Run tests
        env:
          PYTHONPATH: ${{ runner.temp }}/py-deps
        run: python3 -m unittest discover -s scripts/adr_guard/tests -p 'test_*.py' -v

  # ===========================================================================
  # JavaScript Tests
  # ===========================================================================

  shifter-platform-js-tests:
    permissions:
      contents: read
    name: Tests JavaScript (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    needs: [shifter-platform-lint-js]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shifter/shifter_platform/package-lock.json

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: npm ci

      - name: Run JavaScript tests
        working-directory: shifter/shifter_platform
        run: npm test

  mcp-lint:
    # Lint always runs, even when [skip tests] is set on the workflow
    # input, because lint is a static check independent of the test
    # gate. Matches the shifter-platform pattern (lint-js / js-tests
    # are separate jobs).
    permissions:
      contents: read
    name: Lint JavaScript (mcp/${{ matrix.package }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        package: [ngfw, ops, shared]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        working-directory: mcp/${{ matrix.package }}
        run: npm ci

      - name: Lint
        working-directory: mcp/${{ matrix.package }}
        run: npm run lint

  mcp-tests:
    permissions:
      contents: read
    name: Tests JavaScript (mcp/${{ matrix.package }})
    if: ${{ !inputs.skip_tests }}
    needs: [mcp-lint]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        package: [ngfw, ops]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        working-directory: mcp/${{ matrix.package }}
        run: npm ci

      - name: Test
        working-directory: mcp/${{ matrix.package }}
        run: npm test

  # ===========================================================================
  # Security
  # ===========================================================================

  security-iac:
    permissions:
      contents: read
    name: Security (IaC)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Cache Checkov
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-checkov-${{ hashFiles('.github/workflows/_quality.yml') }}
          restore-keys: |
            ${{ runner.os }}-checkov-

      - name: Checkov IaC Security
        uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61 # v12
        with:
          directory: platform/terraform/
          framework: terraform
          download_external_modules: true
          quiet: true
          compact: true
          soft_fail: true

  security-k8s:
    permissions:
      contents: read
    name: Security (k8s)
    runs-on: self-hosted
    continue-on-error: true  # Soft-fail until manifest remediation complete
    steps:
      - uses: actions/checkout@v4

      - name: Cache Checkov
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-checkov-k8s-${{ hashFiles('.github/workflows/_quality.yml') }}
          restore-keys: |
            ${{ runner.os }}-checkov-k8s-

      - name: Checkov k8s Security
        uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61 # v12
        with:
          directory: platform/k8s/
          framework: kubernetes
          quiet: true
          compact: true
          soft_fail: true

  secrets-gitleaks:
    permissions:
      contents: read
    name: Security (gitleaks)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine scan range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            RANGE="HEAD~1..HEAD"
          fi
          echo "log_opts=$RANGE" >> "$GITHUB_OUTPUT"

      - name: Run gitleaks on new commits
        uses: DariuszPorowski/github-action-gitleaks@a027585cb1f2780aa441f20f4d0aabf8b1a0d90e # v2.1.0
        with:
          config: .gitleaks.toml
          fail: true
          report_format: json
          log_opts: ${{ steps.range.outputs.log_opts }}

  model-fks-arch:
    permissions:
      contents: read
    name: Architecture (model FKs)
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shifter
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Check model FKs
        working-directory: shifter/shifter_platform
        env:
          TESTING: "1"
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shifter
          DB_USER: test
          DB_PASSWORD: test
        run: uv run python manage.py check_model_fks
