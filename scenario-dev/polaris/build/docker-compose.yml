# NORTHSTORM Range — Single Participant Instance
#
# Network topology per architecture design:
#
#   shared (172.20.0.0/24):    A0, A7, DNS, A14
#   corporate (172.20.10.0/24): A1, A3, A4, A14  (Front Office — Kali is here per A14 spec)
#   scada (172.20.40.0/24):    A5, A3            (VLAN 40 — NOT reachable from Kali)
#   lab (172.20.30.0/24):      A6, A7, A8        (VLAN 30 — NOT reachable from Kali)
#   bunker-ot (172.20.50.0/24): A9, A10, A11, A12, A13 (VLAN 50 — isolated until gate)
#
# Multi-homed containers:
#   A14: shared + corporate (reaches A0, A7, and all FO assets)
#   A3:  corporate + scada + lab (can pivot to SCADA and Lab)
#   A7:  shared + lab (reachable from both Kali and Lab)
#   DNS: shared + corporate + lab (name resolution everywhere)
#
# A2 (Windows Server 2022 AD DC for boreas.local) is an EC2 instance
# adjacent to the docker-compose host, at 10.1.100.11 in the range VPC.
# Reachable from the compose corporate network via the host's iptables
# MASQUERADE path (docker bridge -> host eth0 -> VPC).

networks:
  shared:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  corporate:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.10.0/24
  scada:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.40.0/24
  lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.30.0/24
  bunker-ot:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.50.0/24
  # splice-link: post-blackout local link from the attacker box (A14) to
  # the splice landing box (A9). At range start, only A9 is joined. A14 is
  # attached dynamically by polaris-splice-watcher.service on the host once
  # A5's /api/status reports runaway_complete=true (flag 19 earned). A14
  # does NOT touch bunker-ot, so A9 remains the gateway the participant has
  # to pivot through to reach A10–A13.
  splice-link:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.60.0/24

services:

  # ============================================
  # SHARED ASSETS
  # ============================================

  dns:
    build: ./dns
    container_name: dns
    networks:
      shared:
        ipv4_address: 172.20.0.2
      corporate:
        ipv4_address: 172.20.10.2
      lab:
        ipv4_address: 172.20.30.2
    restart: unless-stopped

  a0-website:
    build:
      context: .
      dockerfile: ./a0/Dockerfile
    container_name: a0-website
    hostname: boreas-systems.ctf
    networks:
      shared:
        ipv4_address: 172.20.0.10
    dns: 172.20.0.2
    restart: unless-stopped

  a7-gitea:
    build:
      context: .
      dockerfile: ./a7/Dockerfile
    container_name: a7-gitea
    hostname: git.boreas.local
    # A7 is lab-only. The previous shared-network interface let Kali
    # reach Gitea directly, bypassing the A16 Lab pivot. Stripping it
    # forces flags 24 and 29 (and the bunker-phase A7 playbook lookups)
    # to go through the A16 cred chain like every other Lab flag.
    networks:
      lab:
        ipv4_address: 172.20.30.20
    dns: 172.20.30.2
    restart: unless-stopped

  # ============================================
  # FRONT OFFICE (per-participant)
  # A14 spec: "Network access to A0, A7, and all Front Office assets"
  # ============================================

  a1-mail:
    build:
      context: .
      dockerfile: ./a1/Dockerfile
    container_name: a1-mail
    hostname: mail.boreas.local
    networks:
      corporate:
        ipv4_address: 172.20.10.20
    dns: 172.20.10.2
    restart: unless-stopped

  a3-intranet:
    build:
      context: .
      dockerfile: ./a3/Dockerfile
    container_name: a3-intranet
    hostname: intranet.boreas.local
    # A3 is corporate-only. The legacy multi-home onto scada/lab was the
    # old one-box pivot hack; SCADA reach is now A15, Lab reach is now A16.
    networks:
      corporate:
        ipv4_address: 172.20.10.30
    dns: 172.20.10.2
    restart: unless-stopped

  a15-ops-eng:
    build:
      context: .
      dockerfile: ./a15/Dockerfile
    container_name: a15-ops-eng
    hostname: ops-eng01.boreas.local
    # A15 is the ONLY Front Office asset multi-homed onto scada. It
    # replaces the old A3 scada-pivot role with a narratively defensible
    # "SCADA operations engineer's workstation". Flag 37 gates flags 18+19.
    networks:
      corporate:
        ipv4_address: 172.20.10.50
      scada:
        ipv4_address: 172.20.40.20
    dns: 172.20.10.2
    restart: unless-stopped

  a16-research-analyst:
    build:
      context: .
      dockerfile: ./a16/Dockerfile
    container_name: a16-research-analyst
    hostname: analyst01.boreas.local
    # A16 is the ONLY Front Office asset multi-homed onto lab. It replaces
    # the old A3 lab-pivot role with a narratively defensible "research
    # data analyst's workstation". Flag 38 rewards compromise.
    networks:
      corporate:
        ipv4_address: 172.20.10.60
      lab:
        ipv4_address: 172.20.30.60
    dns: 172.20.10.2
    restart: unless-stopped

  a4-fileshare:
    build:
      context: .
      dockerfile: ./a4/Dockerfile
    container_name: a4-fileshare
    hostname: fileserv.boreas.local
    networks:
      corporate:
        ipv4_address: 172.20.10.40
    dns: 172.20.10.2
    restart: unless-stopped

  # ============================================
  # SCADA / VLAN 40 (shared, NOT reachable from Kali)
  # A5 spec: "NOT directly reachable from A14 — sits on VLAN 40"
  # Only A3 can reach it (pivot from Front Office)
  # ============================================

  a5-scada:
    build:
      context: .
      dockerfile: ./a5/Dockerfile
    container_name: a5-scada
    hostname: scada-gw.boreas.local
    networks:
      scada:
        ipv4_address: 172.20.40.10
    restart: unless-stopped

  # ============================================
  # LAB / VLAN 30 (per-participant, NOT reachable from Kali)
  # A6 spec: "Reachable via pivot from Front Office (A3)"
  # ============================================

  a6-workstation:
    build:
      context: .
      dockerfile: ./a6/Dockerfile
    container_name: a6-workstation
    hostname: eng-ws01.boreas.local
    networks:
      lab:
        ipv4_address: 172.20.30.10
    dns: 172.20.30.2
    restart: unless-stopped

  a8-database:
    build:
      context: .
      dockerfile: ./a8/Dockerfile
    container_name: a8-database
    hostname: researchdb.boreas.local
    networks:
      lab:
        ipv4_address: 172.20.30.30
    dns: 172.20.30.2
    restart: unless-stopped

  # ============================================
  # BUNKER OT / VLAN 50 (per-participant, isolated until blackout path)
  # A9 spec: "Access opens after the local blackout and splice"
  # ============================================

  a9-splice:
    build:
      context: .
      dockerfile: ./a9/Dockerfile
    container_name: a9-splice
    hostname: splice-relay
    networks:
      bunker-ot:
        ipv4_address: 172.20.50.5
      splice-link:
        ipv4_address: 172.20.60.5
    restart: unless-stopped

  a10-tail:
    build:
      context: .
      dockerfile: ./a10/Dockerfile
    container_name: a10-tail
    hostname: tail-ctrl
    networks:
      bunker-ot:
        ipv4_address: 172.20.50.10
    restart: unless-stopped

  a11-leg:
    build:
      context: .
      dockerfile: ./a11/Dockerfile
    container_name: a11-leg
    hostname: leg-ctrl
    networks:
      bunker-ot:
        ipv4_address: 172.20.50.11
    restart: unless-stopped

  a12-arms:
    build:
      context: .
      dockerfile: ./a12/Dockerfile
    container_name: a12-arms
    hostname: arms-ctrl
    networks:
      bunker-ot:
        ipv4_address: 172.20.50.12
    restart: unless-stopped

  a13-brain:
    build:
      context: .
      dockerfile: ./a13/Dockerfile
    container_name: a13-brain
    hostname: brain-main
    networks:
      bunker-ot:
        ipv4_address: 172.20.50.50
    restart: unless-stopped

  # ============================================
  # ATTACKER (per-participant)
  # A14 spec: "Network access to A0, A7, and all Front Office assets"
  # "A5 is NOT directly reachable — requires pivoting"
  # ============================================

  a14-kali:
    build:
      context: .
      dockerfile: ./a14/Dockerfile
    container_name: a14-kali
    hostname: operator
    networks:
      shared:
        ipv4_address: 172.20.0.140
      corporate:
        ipv4_address: 172.20.10.140
    dns: 172.20.0.2
    stdin_open: true
    tty: true
    restart: unless-stopped
