# ---------------------------------------------------------------------------
# Vulnerabilities — CWE-labelled or misconfiguration-labelled weaknesses
# ---------------------------------------------------------------------------

vulnerabilities:
  dns-axfr-enabled:
    name: DNS AXFR enabled
    class: CWE-200
    technical: true
    description: BIND configured to accept AXFR zone transfers from any source
  directory-listing-exposed:
    name: Nginx directory listing exposed
    class: CWE-548
    technical: true
