openapi: 3.1.0
info:
  title: Shifter Risk Register API
  version: 1.0.0
  description: |
    REST API for managing security risks, comments, and API keys.
    Supports both human administrators (via session auth) and AI agents (via API key).

servers:
  - url: /api/v1
    description: API v1

security:
  - ApiKeyAuth: []
  - SessionAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "API key for programmatic access (format: rr_live_...)"
    SessionAuth:
      type: apiKey
      in: cookie
      name: sessionid
      description: Django session cookie (for browser-based access)

  schemas:
    Severity:
      type: string
      enum: [critical, high, medium, low]

    Status:
      type: string
      enum: [open, acknowledged, mitigating, resolved, closed]

    StrideCategory:
      type: string
      enum: [S, T, R, I, D, E]
      description: |
        STRIDE threat category:
        - S: Spoofing
        - T: Tampering
        - R: Repudiation
        - I: Information Disclosure
        - D: Denial of Service
        - E: Elevation of Privilege

    Risk:
      type: object
      required:
        - id
        - title
        - description
        - severity
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
        stride_categories:
          type: array
          items:
            $ref: '#/components/schemas/StrideCategory'
        likelihood_score:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        impact_score:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        risk_score:
          type: integer
          readOnly: true
          nullable: true
          description: Computed as likelihood_score * impact_score
        attack_vector:
          type: string
          nullable: true
        affected_assets:
          type: string
          nullable: true
        mitigation_status:
          type: string
          nullable: true
        resolution_reason:
          type: string
          nullable: true
        comment_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    RiskCreate:
      type: object
      required:
        - title
        - description
        - severity
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
          default: open
        stride_categories:
          type: array
          items:
            $ref: '#/components/schemas/StrideCategory'
        likelihood_score:
          type: integer
          minimum: 1
          maximum: 5
        impact_score:
          type: integer
          minimum: 1
          maximum: 5
        attack_vector:
          type: string
        affected_assets:
          type: string
        mitigation_status:
          type: string

    RiskUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/Status'
        stride_categories:
          type: array
          items:
            $ref: '#/components/schemas/StrideCategory'
        likelihood_score:
          type: integer
          minimum: 1
          maximum: 5
        impact_score:
          type: integer
          minimum: 1
          maximum: 5
        attack_vector:
          type: string
        affected_assets:
          type: string
        mitigation_status:
          type: string
        resolution_reason:
          type: string

    Comment:
      type: object
      required:
        - id
        - risk_id
        - content
        - author
        - created_at
      properties:
        id:
          type: integer
          readOnly: true
        risk_id:
          type: integer
        content:
          type: string
        author:
          type: object
          properties:
            type:
              type: string
              enum: [user, apikey]
            id:
              type: integer
            name:
              type: string
              description: Display name (email for user, key name for apikey)
        parent_comment_id:
          type: integer
          nullable: true
          description: ID of previous version if this is an edit
        created_at:
          type: string
          format: date-time
          readOnly: true

    CommentCreate:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1

    APIKey:
      type: object
      required:
        - id
        - name
        - prefix
        - created_at
        - is_active
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        prefix:
          type: string
          description: First 8 characters of key for identification
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
          readOnly: true

    APIKeyCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
        expires_at:
          type: string
          format: date-time
          nullable: true

    APIKeyCreated:
      type: object
      required:
        - id
        - name
        - key
        - prefix
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
          description: Full API key - shown only once at creation
        prefix:
          type: string

    PaginatedRisks:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Risk'

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable message
        details:
          type: object
          description: Field-specific errors for validation failures

paths:
  /risks/:
    get:
      summary: List all risks
      operationId: listRisks
      tags: [Risks]
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/Status'
        - name: severity
          in: query
          schema:
            $ref: '#/components/schemas/Severity'
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Paginated list of risks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRisks'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new risk
      operationId: createRisk
      tags: [Risks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskCreate'
      responses:
        '201':
          description: Risk created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required

  /risks/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Get risk details
      operationId: getRisk
      tags: [Risks]
      responses:
        '200':
          description: Risk details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '404':
          description: Risk not found

    patch:
      summary: Update a risk
      operationId: updateRisk
      tags: [Risks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskUpdate'
      responses:
        '200':
          description: Risk updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '400':
          description: Validation error
        '404':
          description: Risk not found

    delete:
      summary: Soft-delete a risk
      operationId: deleteRisk
      tags: [Risks]
      responses:
        '204':
          description: Risk deleted
        '404':
          description: Risk not found

  /risks/{id}/restore/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    post:
      summary: Restore a deleted risk
      operationId: restoreRisk
      tags: [Risks]
      responses:
        '200':
          description: Risk restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '400':
          description: Risk is not deleted
        '404':
          description: Risk not found

  /risks/{id}/comments/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: List comments on a risk
      operationId: listComments
      tags: [Comments]
      parameters:
        - name: include_deleted
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '404':
          description: Risk not found

    post:
      summary: Add a comment to a risk
      operationId: createComment
      tags: [Comments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreate'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Validation error
        '404':
          description: Risk not found

  /risks/{risk_id}/comments/{comment_id}/:
    parameters:
      - name: risk_id
        in: path
        required: true
        schema:
          type: integer
      - name: comment_id
        in: path
        required: true
        schema:
          type: integer

    delete:
      summary: Soft-delete a comment
      operationId: deleteComment
      tags: [Comments]
      responses:
        '204':
          description: Comment deleted
        '404':
          description: Comment not found

  /api-keys/:
    get:
      summary: List API keys (admin only)
      operationId: listAPIKeys
      tags: [API Keys]
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKey'
        '403':
          description: Admin access required

    post:
      summary: Create a new API key (admin only)
      operationId: createAPIKey
      tags: [API Keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIKeyCreate'
      responses:
        '201':
          description: API key created (key shown only once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyCreated'
        '400':
          description: Validation error
        '403':
          description: Admin access required

  /api-keys/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Get API key details
      operationId: getAPIKey
      tags: [API Keys]
      responses:
        '200':
          description: API key details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
        '404':
          description: API key not found

  /api-keys/{id}/revoke/:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    post:
      summary: Revoke an API key
      operationId: revokeAPIKey
      tags: [API Keys]
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
        '400':
          description: API key already revoked
        '404':
          description: API key not found

tags:
  - name: Risks
    description: Risk CRUD operations
  - name: Comments
    description: Comment operations on risks
  - name: API Keys
    description: API key management (admin only)
