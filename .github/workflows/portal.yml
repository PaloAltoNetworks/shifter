name: Portal

on:
  pull_request:
    paths:
      - 'terraform/modules/portal/**'
      - 'terraform/modules/range/provisioner/**'
      - 'terraform/environments/*/portal/**'
      - 'portal/**'
      - '.github/workflows/portal.yml'
  push:
    branches: [main, dev]
    paths:
      - 'terraform/modules/portal/**'
      - 'terraform/modules/range/provisioner/**'
      - 'terraform/environments/*/portal/**'
      - 'portal/**'
      - '.github/workflows/portal.yml'
  workflow_run:
    workflows: ["Range"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: portal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  set-env:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      is_dev: ${{ steps.set.outputs.is_dev }}
      ecr_repo: ${{ steps.set.outputs.ecr_repo }}
      instance_tag: ${{ steps.set.outputs.instance_tag }}
    steps:
      - name: Determine environment
        id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PR_BASE_REF: ${{ github.base_ref }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" == "workflow_run" ]; then
            if [ "$WORKFLOW_RUN_BRANCH" == "dev" ]; then
              ENV="dev"
            else
              ENV="prod"
            fi
          elif [ "$EVENT_NAME" == "pull_request" ]; then
            if [ "$PR_BASE_REF" == "dev" ]; then
              ENV="dev"
            else
              ENV="prod"
            fi
          elif [ "$GIT_REF" == "refs/heads/dev" ]; then
            ENV="dev"
          else
            ENV="prod"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT

          if [ "$ENV" == "dev" ]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "ecr_repo=shifter-dev-portal" >> $GITHUB_OUTPUT
            echo "instance_tag=dev-portal-ec2" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "ecr_repo=shifter-portal" >> $GITHUB_OUTPUT
            echo "instance_tag=prod-portal-ec2" >> $GITHUB_OUTPUT
          fi

  # PR: Show terraform plan
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: set-env
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform/environments/${{ needs.set-env.outputs.environment }}/portal
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.1"

      - name: Write tfvars
        env:
          TF_VARS: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.TF_VARS_DEV_PORTAL || secrets.TF_VARS_PROD_PORTAL }}
        run: echo "$TF_VARS" > terraform.tfvars

      - run: terraform fmt -check -recursive
        working-directory: terraform

      - run: bash ../../../modules/range/provisioner/build-lambdas.sh

      - run: terraform init

      - run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = '${{ needs.set-env.outputs.environment }}';
            const plan = fs.readFileSync(`terraform/environments/${env}/portal/plan.txt`, 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan - Portal (${env})\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`
            });

  # Apply terraform (PR to dev, push, workflow_run, workflow_dispatch)
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [set-env, terraform-plan]
    if: |
      always() &&
      (needs.terraform-plan.result == 'success' || needs.terraform-plan.result == 'skipped') &&
      (
        (github.event_name == 'pull_request' && needs.set-env.outputs.is_dev == 'true') ||
        (github.event_name == 'push') ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch')
      )
    defaults:
      run:
        working-directory: terraform/environments/${{ needs.set-env.outputs.environment }}/portal
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.1"

      - name: Write tfvars
        env:
          TF_VARS: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.TF_VARS_DEV_PORTAL || secrets.TF_VARS_PROD_PORTAL }}
        run: echo "$TF_VARS" > terraform.tfvars

      - run: bash ../../../modules/range/provisioner/build-lambdas.sh

      - run: terraform init

      - run: terraform apply -auto-approve

  # Build and push Docker image
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [set-env, terraform-apply]
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    env:
      ECR_REPOSITORY: ${{ needs.set-env.outputs.ecr_repo }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        working-directory: portal
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY

          docker build -t $IMAGE_URI:latest -t $IMAGE_URI:$SHORT_SHA .
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$SHORT_SHA

          echo "image_tag=$SHORT_SHA" >> $GITHUB_OUTPUT

  # Deploy to EC2
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [set-env, build-and-push]
    env:
      AWS_REGION: us-east-2
      ECR_REPOSITORY: ${{ needs.set-env.outputs.ecr_repo }}
      INSTANCE_TAG: ${{ needs.set-env.outputs.instance_tag }}
      ENV: ${{ needs.set-env.outputs.environment }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get deployment config
        id: config
        env:
          TF_VARS: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.TF_VARS_DEV_PORTAL || secrets.TF_VARS_PROD_PORTAL }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

          PORTAL_DOMAIN=$(echo "$TF_VARS" | grep '^domain_name' | sed 's/.*= *"\([^"]*\)".*/\1/')
          echo "domain=${PORTAL_DOMAIN}" >> $GITHUB_OUTPUT

          S3_BUCKET=$(echo "$TF_VARS" | grep '^user_storage_bucket' | sed 's/.*= *"\([^"]*\)".*/\1/')
          echo "s3_bucket=${S3_BUCKET}" >> $GITHUB_OUTPUT

          PROVISION_ARN=$(aws stepfunctions list-state-machines --query "stateMachines[?contains(name, '${ENV}-portal-provision-range')].stateMachineArn | [0]" --output text 2>/dev/null || echo "")
          TEARDOWN_ARN=$(aws stepfunctions list-state-machines --query "stateMachines[?contains(name, '${ENV}-portal-teardown-range')].stateMachineArn | [0]" --output text 2>/dev/null || echo "")
          echo "provision_state_machine_arn=${PROVISION_ARN}" >> $GITHUB_OUTPUT
          echo "teardown_state_machine_arn=${TEARDOWN_ARN}" >> $GITHUB_OUTPUT

      - name: Get Instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running Portal EC2 instance with tag: $INSTANCE_TAG"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for cloud-init
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          echo "Waiting for cloud-init to complete..."
          for i in $(seq 1 30); do
            RESULT=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["cloud-init status --wait || cloud-init status"]' \
              --query "Command.CommandId" \
              --output text 2>/dev/null) || true

            if [ -n "$RESULT" ]; then
              sleep 10
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$RESULT" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text 2>/dev/null) || true

              if echo "$STATUS" | grep -q "done"; then
                echo "Cloud-init complete"
                exit 0
              fi
            fi

            echo "Attempt $i: Waiting for cloud-init..."
            sleep 10
          done
          echo "Warning: cloud-init wait timed out, proceeding anyway"

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
          ECR_REGISTRY: ${{ steps.config.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          PORTAL_DOMAIN: ${{ steps.config.outputs.domain }}
          S3_BUCKET: ${{ steps.config.outputs.s3_bucket }}
          PROVISION_STATE_MACHINE_ARN: ${{ steps.config.outputs.provision_state_machine_arn }}
          TEARDOWN_STATE_MACHINE_ARN: ${{ steps.config.outputs.teardown_state_machine_arn }}
          ACCOUNT_ID: ${{ steps.config.outputs.account_id }}
        run: |
          DB_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-db-credentials"
          APP_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-app"
          COGNITO_SECRET_ARN="arn:aws:secretsmanager:us-east-2:${ACCOUNT_ID}:secret:shifter-${ENV}-portal-cognito"

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters "commands=[
              'set -e',
              'IMAGE=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}',
              'docker pull \$IMAGE',
              'docker stop portal 2>/dev/null || true',
              'docker rm portal 2>/dev/null || true',
              'docker run -d --name portal --restart unless-stopped -p 8000:8000 \
                -e AWS_REGION=${AWS_REGION} \
                -e AWS_S3_BUCKET_NAME=${S3_BUCKET} \
                -e DB_SECRET_ARN=${DB_SECRET_ARN} \
                -e APP_SECRET_ARN=${APP_SECRET_ARN} \
                -e COGNITO_SECRET_ARN=${COGNITO_SECRET_ARN} \
                -e DJANGO_ALLOWED_HOSTS=${PORTAL_DOMAIN} \
                -e DJANGO_CSRF_TRUSTED_ORIGINS=https://${PORTAL_DOMAIN} \
                -e SITE_URL=https://${PORTAL_DOMAIN} \
                -e PROVISION_STATE_MACHINE_ARN=${PROVISION_STATE_MACHINE_ARN} \
                -e TEARDOWN_STATE_MACHINE_ARN=${TEARDOWN_STATE_MACHINE_ARN} \
                \$IMAGE'
            ]" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          echo "Command status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
            exit 1
          fi

          echo "Deployment successful!"
