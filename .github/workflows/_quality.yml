name: Quality

on:
  workflow_call:
    inputs:
      skip_tests:
        description: 'Skip test jobs (linting still runs)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Linting
  # ===========================================================================

  adr-conformance:
    name: Architecture (adr conformance)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run ADR guard
        run: python3 scripts/adr_guard/adr_guard.py --all --level ci

  workflow-lint:
    name: Lint (GitHub Actions)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: devops-actions/actionlint@467e2ce19b2310e93c9ffa0b50fe31f86b5a7f23 # v0.1.10

  terraform-lint:
    name: Lint (terraform)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e87008f9dd1fe3e34e66aca6c97b4a69f72a7f4 # v4

      - name: Init TFLint
        run: tflint --init --config "${GITHUB_WORKSPACE}/.tflint.hcl"

      - name: Run TFLint
        working-directory: platform/terraform
        run: tflint --recursive --config "${GITHUB_WORKSPACE}/.tflint.hcl"

  shifter-platform-lint:
    name: Lint (shifter_platform)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Lint Python
        working-directory: shifter/shifter_platform
        run: |
          uv run ruff check .
          uv run ruff format --check .

  shifter-platform-lint-js:
    name: Lint JavaScript/CSS (shifter_platform)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shifter/shifter_platform/package-lock.json

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: npm ci

      - name: Lint JavaScript
        working-directory: shifter/shifter_platform
        run: npx eslint static/js/

      - name: Lint CSS
        working-directory: shifter/shifter_platform
        run: npx stylelint static/css/

  provisioner-lint:
    name: Lint (provisioner)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/engine/provisioner
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  packer-lint:
    name: Lint (packer)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: shifter/packer
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  bootstrap-lint:
    name: Lint (bootstrap)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/bootstrap
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  check-layer-imports-lint:
    name: Lint (check_layer_imports)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Lint Python
        working-directory: scripts/check_layer_imports
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  # ===========================================================================
  # Type Checking (non-blocking quality gate)
  # ===========================================================================

  shifter-platform-typecheck:
    name: Type Check (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    runs-on: self-hosted
    continue-on-error: true  # Non-blocking - quality signal only
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Run mypy
        working-directory: shifter/shifter_platform
        run: |
          uv run mypy . --no-error-summary || true
          echo "::notice::Type checking complete - see above for any type errors"

  provisioner-typecheck:
    name: Type Check (provisioner)
    if: ${{ !inputs.skip_tests }}
    runs-on: self-hosted
    continue-on-error: true  # Non-blocking - quality signal only
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/engine/provisioner
        run: uv sync --group dev

      - name: Run mypy
        working-directory: shifter/engine/provisioner
        run: |
          uv run mypy . --no-error-summary || true
          echo "::notice::Type checking complete - see above for any type errors"

  # ===========================================================================
  # Architecture as Code (hard fail - zero tolerance)
  # ===========================================================================

  check-layer-imports-arch:
    name: Architecture (layer imports)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/check_layer_imports
        run: uv sync

      - name: Check layer imports
        working-directory: scripts/check_layer_imports
        run: uv run python check_layer_imports.py

  import-linter-arch:
    name: Architecture (import linter)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Check import contracts
        working-directory: shifter/shifter_platform
        run: uv run lint-imports --config ../../.importlinter

  # ===========================================================================
  # SAST
  # ===========================================================================

  shifter-platform-sast:
    name: SAST (shifter_platform)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r shifter/shifter_platform/ --skip B101 --exclude shifter/shifter_platform/tests,shifter/shifter_platform/.venv

  provisioner-sast:
    name: SAST (provisioner)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        # B404: subprocess import, B603: subprocess call, B607: partial path
        # Provisioner uses subprocess for Pulumi CLI calls with hardcoded commands
        run: |
          uv tool install bandit
          bandit -r shifter/engine/provisioner/ --skip B101,B404,B603,B607 --exclude shifter/engine/provisioner/tests,shifter/engine/provisioner/.venv

  packer-sast:
    name: SAST (packer)
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r shifter/packer/ --skip B101 --exclude shifter/packer/tests,shifter/packer/.venv

  bootstrap-sast:
    name: SAST (bootstrap)
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        run: |
          uv tool install bandit
          bandit -r scripts/bootstrap/ --skip B101 --exclude scripts/bootstrap/tests,scripts/bootstrap/.venv

  check-layer-imports-sast:
    name: SAST (check_layer_imports)
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Run Bandit
        working-directory: scripts/check_layer_imports
        run: |
          uv tool install 'bandit[toml]'
          bandit -r . -c pyproject.toml

  # ===========================================================================
  # Python Tests
  # ===========================================================================

  shifter-platform-tests:
    name: Tests (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    needs: [shifter-platform-lint, shifter-platform-lint-js, shifter-platform-sast]
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shifter
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/shifter_platform
        env:
          TESTING: "1"
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shifter
          DB_USER: test
          DB_PASSWORD: test
        run: |
          uv run python manage.py collectstatic --noinput
          uv run pytest tests/ --ignore=tests/documentation --cov=config --cov=mission_control --cov=documentation --cov=cms --cov=shared --cov=ctf --cov=engine --cov=risk_register --cov-report=term-missing --cov-report=xml:coverage.xml

  shifter-engine-tests:
    name: Tests (provisioner)
    if: ${{ !inputs.skip_tests }}
    needs: [provisioner-lint, provisioner-sast]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/engine/provisioner
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/engine/provisioner
        env:
          TESTING: "1"
        run: uv run pytest tests/

  packer-tests:
    name: Tests (packer)
    if: ${{ !inputs.skip_tests }}
    needs: [packer-lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/packer
        run: uv sync --group dev

      - name: Run tests
        working-directory: shifter/packer
        run: uv run pytest tests/

  bootstrap-tests:
    name: Tests (bootstrap)
    if: ${{ !inputs.skip_tests }}
    needs: [bootstrap-lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/bootstrap
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/bootstrap
        run: uv run pytest tests/

  check-layer-imports-tests:
    name: Tests (check_layer_imports)
    if: ${{ !inputs.skip_tests }}
    needs: [check-layer-imports-lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: scripts/check_layer_imports
        run: uv sync --group dev

      - name: Run tests
        working-directory: scripts/check_layer_imports
        run: uv run pytest tests/

  adr-guard-tests:
    name: Tests (adr_guard)
    if: ${{ !inputs.skip_tests }}
    needs: [adr-conformance]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: python3 -m unittest discover -s scripts/adr_guard/tests -p 'test_*.py' -v

  # ===========================================================================
  # JavaScript Tests
  # ===========================================================================

  shifter-platform-js-tests:
    name: Tests JavaScript (shifter_platform)
    if: ${{ !inputs.skip_tests }}
    needs: [shifter-platform-lint-js]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shifter/shifter_platform/package-lock.json

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: npm ci

      - name: Run JavaScript tests
        working-directory: shifter/shifter_platform
        run: npm test

  # ===========================================================================
  # Security
  # ===========================================================================

  security-iac:
    name: Security (IaC)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Cache Checkov
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-checkov-${{ hashFiles('.github/workflows/_quality.yml') }}
          restore-keys: |
            ${{ runner.os }}-checkov-

      - name: Checkov IaC Security
        uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61 # v12
        with:
          directory: platform/terraform/
          framework: terraform
          download_external_modules: true
          quiet: true
          compact: true
          soft_fail: true

  secrets-gitleaks:
    name: Security (gitleaks)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine scan range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            RANGE="HEAD~1..HEAD"
          fi
          echo "log_opts=$RANGE" >> "$GITHUB_OUTPUT"

      - name: Run gitleaks on new commits
        uses: DariuszPorowski/github-action-gitleaks@a027585cb1f2780aa441f20f4d0aabf8b1a0d90e # v2.1.0
        with:
          config: .gitleaks.toml
          fail: true
          report_format: json
          log_opts: ${{ steps.range.outputs.log_opts }}

  model-fks-arch:
    name: Architecture (model FKs)
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shifter
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dependencies
        working-directory: shifter/shifter_platform
        run: uv sync --group dev

      - name: Check model FKs
        working-directory: shifter/shifter_platform
        env:
          TESTING: "1"
          DJANGO_DEBUG: "true"
          DJANGO_SECRET_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: shifter
          DB_USER: test
          DB_PASSWORD: test
        run: uv run python manage.py check_model_fks
