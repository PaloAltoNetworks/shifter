# .gitguardian.yaml
# GitGuardian configuration for Shifter cyber range
# Ignore test files that contain mock credentials

version: v1

paths-ignore:
  # Test files contain mock/fake credentials for unit tests
  - "**/tests/**"
  - "**/test_*.py"
  - "**/conftest.py"
  # Shifter Platform test directory
  - "shifter/shifter_platform/tests/**"
  # Shifter Engine test directory
  - "shifter/engine/provisioner/tests/**"
  # Packer test directory
  - "shifter/packer/tests/**"
  # Bootstrap scripts test directory
  - "scripts/bootstrap/tests/**"
  # Check layer imports test directory
  - "scripts/check_layer_imports/tests/**"
  # Legacy path (may appear in git history)
  - "pulumi-provisioner/tests/**"
