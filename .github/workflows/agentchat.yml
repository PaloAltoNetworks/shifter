name: AgentChat

on:
  pull_request:
    paths:
      - 'terraform/modules/agentchat/**'
      - 'terraform/environments/*/agentchat/**'
      - 'agentchat/**'
      - '.github/workflows/agentchat.yml'
  push:
    branches: [main, dev]
    paths:
      - 'terraform/modules/agentchat/**'
      - 'terraform/environments/*/agentchat/**'
      - 'agentchat/**'
      - '.github/workflows/agentchat.yml'
  workflow_run:
    workflows: ["Portal"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: agentchat-${{ github.ref }}
  cancel-in-progress: false

jobs:
  set-env:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      is_dev: ${{ steps.set.outputs.is_dev }}
      instance_tag: ${{ steps.set.outputs.instance_tag }}
    steps:
      - name: Determine environment
        id: set
        env:
          # Use env vars to prevent script injection from untrusted inputs
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PR_BASE_REF: ${{ github.base_ref }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" == "workflow_run" ]; then
            # Validate branch name matches expected pattern
            if [ "$WORKFLOW_RUN_BRANCH" == "dev" ]; then
              ENV="dev"
            elif [ "$WORKFLOW_RUN_BRANCH" == "main" ]; then
              ENV="prod"
            else
              echo "Error: Unexpected branch for workflow_run: $WORKFLOW_RUN_BRANCH"
              exit 1
            fi
          elif [ "$EVENT_NAME" == "pull_request" ]; then
            # Validate base_ref matches expected pattern
            if [ "$PR_BASE_REF" == "dev" ]; then
              ENV="dev"
            elif [ "$PR_BASE_REF" == "main" ]; then
              ENV="prod"
            else
              echo "Error: PRs must target dev or main branch, got: $PR_BASE_REF"
              exit 1
            fi
          elif [ "$GIT_REF" == "refs/heads/dev" ]; then
            ENV="dev"
          elif [ "$GIT_REF" == "refs/heads/main" ]; then
            ENV="prod"
          else
            echo "Error: Unexpected ref: $GIT_REF"
            exit 1
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT

          if [ "$ENV" == "dev" ]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "instance_tag=dev-agentchat-ec2" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "instance_tag=prod-agentchat-ec2" >> $GITHUB_OUTPUT
          fi

  # PR: Show terraform plan
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: set-env
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform/environments/${{ needs.set-env.outputs.environment }}/agentchat
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"

      - name: Write tfvars
        env:
          TF_VARS: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.TF_VARS_DEV_AGENTCHAT || secrets.TF_VARS_PROD_AGENTCHAT }}
        run: echo "$TF_VARS" > terraform.tfvars

      - run: terraform fmt -check -recursive
        working-directory: terraform

      - run: terraform init

      - run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = '${{ needs.set-env.outputs.environment }}';
            const plan = fs.readFileSync(`terraform/environments/${env}/agentchat/plan.txt`, 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan - AgentChat (${env})\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`
            });

  # Apply terraform
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [set-env, terraform-plan]
    if: |
      always() &&
      (needs.terraform-plan.result == 'success' || needs.terraform-plan.result == 'skipped') &&
      (
        (github.event_name == 'pull_request' && needs.set-env.outputs.is_dev == 'true') ||
        (github.event_name == 'push') ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch')
      )
    defaults:
      run:
        working-directory: terraform/environments/${{ needs.set-env.outputs.environment }}/agentchat
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"

      - name: Write tfvars
        env:
          TF_VARS: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.TF_VARS_DEV_AGENTCHAT || secrets.TF_VARS_PROD_AGENTCHAT }}
        run: echo "$TF_VARS" > terraform.tfvars

      - run: terraform init

      - run: terraform apply -auto-approve

  # Deploy containers to EC2
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [set-env, terraform-apply]
    env:
      AWS_REGION: us-east-2
      INSTANCE_TAG: ${{ needs.set-env.outputs.instance_tag }}
      ENV: ${{ needs.set-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get deployment config
        id: config
        env:
          TF_VARS: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.TF_VARS_DEV_AGENTCHAT || secrets.TF_VARS_PROD_AGENTCHAT }}
        run: |
          BEDROCK_REGION=$(echo "$TF_VARS" | grep '^bedrock_region' | sed 's/.*= *"\([^"]*\)".*/\1/')

          # Validate region format to prevent shell injection
          if [[ ! "$BEDROCK_REGION" =~ ^[a-z]{2}-[a-z]+-[0-9]+$ ]]; then
            echo "Error: Invalid region format: $BEDROCK_REGION"
            exit 1
          fi

          echo "bedrock_region=${BEDROCK_REGION}" >> $GITHUB_OUTPUT

      - name: Get BAG API Key from Secrets Manager
        id: secrets
        run: |
          SECRET_NAME="shifter-${ENV}-agentchat-bag-api-key"
          BAG_API_KEY=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" \
            --query 'SecretString' \
            --output text)

          # Mask the secret in logs
          echo "::add-mask::$BAG_API_KEY"
          echo "bag_api_key=$BAG_API_KEY" >> $GITHUB_OUTPUT

      - name: Get Instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running AgentChat EC2 instance with tag: $INSTANCE_TAG"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for cloud-init
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          echo "Waiting for cloud-init to complete..."
          for i in $(seq 1 30); do
            RESULT=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["cloud-init status --wait || cloud-init status"]' \
              --query "Command.CommandId" \
              --output text 2>/dev/null) || true

            if [ -n "$RESULT" ]; then
              sleep 10
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$RESULT" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text 2>/dev/null) || true

              if echo "$STATUS" | grep -q "done"; then
                echo "Cloud-init complete"
                exit 0
              fi
            fi

            echo "Attempt $i: Waiting for cloud-init..."
            sleep 10
          done
          echo "Warning: cloud-init wait timed out, proceeding anyway"

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
          BEDROCK_REGION: ${{ steps.config.outputs.bedrock_region }}
          BAG_API_KEY: ${{ steps.secrets.outputs.bag_api_key }}
        run: |
          # Build SSM parameters JSON with env vars expanded
          SSM_PARAMS=$(cat <<EOF
          {
            "commands": [
              "set -e",
              "cd /opt",
              "# Clone or update BAG repo (forked for supply chain security)",
              "if [ -d bedrock-access-gateway ]; then cd bedrock-access-gateway && git pull; else git clone https://github.com/Brad-Edwards/bedrock-access-gateway.git && cd bedrock-access-gateway; fi",
              "# Build BAG image from src directory",
              "cd src",
              "docker build -f Dockerfile_ecs -t bedrock-gateway .",
              "# Stop existing containers",
              "docker stop open-webui bedrock-gateway 2>/dev/null || true",
              "docker rm open-webui bedrock-gateway 2>/dev/null || true",
              "# Create network if not exists",
              "docker network create agentchat 2>/dev/null || true",
              "# Start BAG with secret API key",
              "docker run -d --name bedrock-gateway --restart unless-stopped --network agentchat -p 8000:80 -e AWS_REGION=${BEDROCK_REGION} -e DEFAULT_API_KEYS=${BAG_API_KEY} bedrock-gateway",
              "# Pull and start OpenWebUI (pinned version)",
              "docker pull ghcr.io/open-webui/open-webui:v0.6.41",
              "docker run -d --name open-webui --restart unless-stopped --network agentchat -p 3000:8080 -e OLLAMA_BASE_URL= -e ENABLE_OLLAMA_API=false -v open-webui-data:/app/backend/data ghcr.io/open-webui/open-webui:v0.6.41",
              "# Wait for OpenWebUI to be healthy",
              "echo 'Waiting for OpenWebUI health check...'",
              "for i in \$(seq 1 30); do if curl -sf http://localhost:3000/health > /dev/null 2>&1; then echo \"OpenWebUI healthy after \${i}0 seconds\"; break; fi; if [ \$i -eq 30 ]; then echo 'Health check failed after 300 seconds'; docker logs open-webui; exit 1; fi; sleep 10; done",
              "echo 'Deployment complete'"
            ]
          }
          EOF
          )

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters "$SSM_PARAMS" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll for completion (up to 10 minutes for docker build/pull)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null) || STATUS="Pending"

            echo "Attempt $i: Status=$STATUS"

            if [ "$STATUS" == "Success" ]; then
              echo "Deployment successful!"
              exit 0
            elif [ "$STATUS" == "Failed" ] || [ "$STATUS" == "Cancelled" ] || [ "$STATUS" == "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deployment timed out after 10 minutes"
          exit 1
