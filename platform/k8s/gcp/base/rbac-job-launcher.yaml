apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-launcher
  namespace: shifter-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-launcher-portal
  namespace: shifter-jobs
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: shifter-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-launcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-launcher-workers
  namespace: shifter-jobs
subjects:
  - kind: ServiceAccount
    name: workers
    namespace: shifter-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-launcher
