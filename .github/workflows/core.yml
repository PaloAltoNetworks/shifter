name: Core

on:
  pull_request:
    paths:
      - 'terraform/modules/ecr/**'
      - 'terraform/environments/*/*.tf'
      - '.github/workflows/core.yml'
  push:
    branches:
      - main
      - dev
    paths:
      - 'terraform/modules/ecr/**'
      - 'terraform/environments/*/*.tf'
      - '.github/workflows/core.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # Set environment based on branch
  set-env:
    name: Set Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      is_dev: ${{ steps.set.outputs.is_dev }}
    steps:
      - name: Determine environment
        id: set
        run: |
          # For PRs, use base_ref (target branch)
          # For push, use ref
          # For workflow_dispatch, use input
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "${{ github.base_ref }}" == "dev" ]; then
              ENV="dev"
            else
              ENV="prod"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            ENV="dev"
          else
            ENV="prod"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          
          if [ "$ENV" == "dev" ]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
          fi

  terraform-plan:
    name: Terraform Plan (${{ needs.set-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: set-env
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform/environments/${{ needs.set-env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
          role-session-name: GitHubActions-Terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.1"

      - name: Write tfvars from secret
        env:
          TF_VARS: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.TF_VARS_DEV_FOUNDATION || secrets.TF_VARS_PROD_FOUNDATION }}
        run: echo "$TF_VARS" > terraform.tfvars

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = '${{ needs.set-env.outputs.environment }}';
            const plan = fs.readFileSync(`terraform/environments/${env}/plan.txt`, 'utf8');
            const output = `#### Terraform Plan - Core (${env})
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # Deploy on PR for dev only
  terraform-apply-pr:
    name: Terraform Apply PR (${{ needs.set-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [set-env, terraform-plan]
    if: github.event_name == 'pull_request' && needs.set-env.outputs.is_dev == 'true'
    defaults:
      run:
        working-directory: terraform/environments/${{ needs.set-env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-2
          role-session-name: GitHubActions-Terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.1"

      - name: Write tfvars from secret
        env:
          TF_VARS: ${{ secrets.TF_VARS_DEV_FOUNDATION }}
        run: echo "$TF_VARS" > terraform.tfvars

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

  # Deploy on merge/push
  terraform-apply:
    name: Terraform Apply (${{ needs.set-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: set-env
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: terraform/environments/${{ needs.set-env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
          role-session-name: GitHubActions-Terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.1"

      - name: Write tfvars from secret
        env:
          TF_VARS: ${{ needs.set-env.outputs.is_dev == 'true' && secrets.TF_VARS_DEV_FOUNDATION || secrets.TF_VARS_PROD_FOUNDATION }}
        run: echo "$TF_VARS" > terraform.tfvars

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Output ECR Repository URL
        run: terraform output -json
