fail_fast: true

repos:
  # Python - Ruff (linting + formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^shifter/shifter_platform/
      - id: ruff-format
        files: ^shifter/shifter_platform/

  # Python - Tests (shifter_platform)
  - repo: local
    hooks:
      - id: pytest-shifter
        name: pytest (shifter_platform)
        entry: bash -c 'cd shifter/shifter_platform && source .venv/bin/activate && TESTING=1 python -m pytest tests/ --ignore=tests/documentation --ignore=tests/risk_register -q'
        language: system
        files: ^shifter/shifter_platform/
        pass_filenames: false
        always_run: true

  # Python - Security
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args: [-c, shifter/shifter_platform/pyproject.toml, -r]
        additional_dependencies: ["bandit[toml]"]
        files: ^shifter/shifter_platform/
        exclude: ^shifter/shifter_platform/(tests|\.venv)/

  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^assets/styles/
      - id: check-yaml
        args: [--unsafe] # Allow custom YAML constructors (mkdocs plugins)
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^shifter-engine/tests/  # Tests check key format strings

  # CSS - Stylelint
  - repo: local
    hooks:
      - id: stylelint
        name: stylelint
        entry: npx stylelint --fix
        language: system
        files: ^shifter/shifter_platform/static/css/.*\.css$
        types: [css]

  # Packer tests
  - repo: local
    hooks:
      - id: pytest-packer
        name: pytest (packer)
        entry: bash -c 'cd shifter/packer && uv run pytest tests/ -q'
        language: system
        files: ^shifter/packer/
        pass_filenames: false

  # Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      - id: terraform_fmt
        files: ^platform/terraform/
      - id: terraform_validate
        files: ^platform/terraform/

  # IaC Security (Terraform, Dockerfile)
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.346
    hooks:
      - id: checkov
        files: ^platform/terraform/
        args:
          [--quiet, --compact, --directory, platform/terraform/, --soft-fail]

  # Shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/
