apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctf-scheduler
  namespace: shifter-platform
  labels:
    app.kubernetes.io/part-of: shifter
    app.kubernetes.io/component: ctf-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: shifter
      app.kubernetes.io/component: ctf-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: shifter
        app.kubernetes.io/component: ctf-scheduler
    spec:
      serviceAccountName: workers
      containers:
        - name: ctf-scheduler
          image: placeholder-portal:latest
          imagePullPolicy: Always
          args: ["python", "manage.py", "run_ctf_scheduler"]
          envFrom:
            - configMapRef:
                name: platform-runtime
          livenessProbe:
            exec:
              command: ["sh", "-c", "find /tmp/ctf-scheduler-heartbeat -mmin -2 | grep -q ."]
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
