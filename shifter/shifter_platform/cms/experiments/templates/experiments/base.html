{% load static user_extras i18n %}
<!DOCTYPE html>
<html lang="en" class="xdr-dark-theme">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}
                {% trans "Experiments" %}
            {% endblock %}
        {% trans "- Cortex Shifter" %}</title>
        <link rel="stylesheet" href="{% static 'css/xdr-theme.css' %}">
        <link rel="stylesheet" href="{% static 'css/xdr-sidebar.css' %}">
        <link rel="icon"
              type="image/png"
              href="{% static 'images/favicon.png' %}">
        {% block extra_css %}
        {% endblock %}
    </head>
    <body class="xdr-dark-theme">
        {% include "partials/icon_sidebar.html" %}
        <div class="layout">
            <main class="main">
                {% block content %}
                {% endblock %}
            </main>
        </div>
        <script src="{% static 'js/sidebar.js' %}"></script>
        {% block extra_js %}
        {% endblock %}
    </body>
</html>
