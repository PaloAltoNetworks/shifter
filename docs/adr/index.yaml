    "title": "Cross-layer access goes through service boundaries",
    "status": "accepted",
    "scope": "shifter_platform",
    "decision": "Cross-layer imports may target shared contracts and explicitly allowed service seams only.",
    "rules": [
      {
        "id": "ADR-001-R1",
        "description": "Cross-layer imports must conform to scripts/check_layer_imports/layer_imports.yaml.",
        "checks": ["layer-imports"]
      },
      {
        "id": "ADR-001-R2",
        "description": "Direct cross-layer model imports are disallowed by default and must be introduced intentionally.",
        "checks": ["cross-layer-model-imports"]
      }
    ],
    "exceptions": [],
    "enforcement": ["pre-commit", "ci", "claude-hook", "agent-policy"],
    "evidence": [
