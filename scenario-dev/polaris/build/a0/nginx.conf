server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # robots.txt disallows /internal/ and /admin/ to encourage targeted enumeration
    location = /robots.txt {
        default_type text/plain;
    }

    # /internal/ serves a hand-written index.html that lists the quarterly reports and
    # org chart, but NOT the annual report. The annual report PDF exists on disk at
    # /internal/boreas-annual-2025.pdf and is reachable via direct URL — participants
    # must fuzz the filename pattern (boreas-*.pdf) to find it.
    location /internal/ {
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 "Not Found\n";
    }
}
