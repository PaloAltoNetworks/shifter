# Allowed cross-layer imports between service layers
#
# Rule: Layers may ONLY import another layer's services.py.
# shared is freely importable by all layers (contracts layer).
# No model imports, no internal submodule imports, no __init__.py shortcuts.
#
# Any import not matching this config is a violation.

allowed:
  engine:
    - shared
    - management.services

  cms:
    - shared
    - management.services
    - engine.services

  management:
    - shared

  mission_control:
    - shared
    - management.services
    - cms.services
    - engine.services

  ctf:
    - shared
    - cms.services
    - management.services
