name: Platform

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      is_dev:
        required: true
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_ROLE_ARN_DEV:
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: self-hosted
    defaults:
      run:
        working-directory: platform/terraform/environments/${{ inputs.environment }}/portal
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"
      - run: terraform fmt -check -recursive
        working-directory: platform/terraform
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color -out=tfplan && terraform show -no-color tfplan > plan.txt
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('platform/terraform/environments/${{ inputs.environment }}/portal/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan - Platform (${{ inputs.environment }})\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`
            });

  push-guacamole-images:
    name: Push Guacamole Images (${{ inputs.environment }})
    runs-on: self-hosted
    needs: plan
    if: |
      always() &&
      (needs.plan.result == 'success' || needs.plan.result == 'skipped') &&
      (github.event_name != 'pull_request' || inputs.environment == 'dev')
    env:
      GUACD_REPO: ${{ inputs.is_dev && 'shifter-dev-guacd' || 'shifter-guacd' }}
      GUACAMOLE_CLIENT_REPO: ${{ inputs.is_dev && 'shifter-dev-guacamole-client' || 'shifter-guacamole-client' }}
      GUACAMOLE_VERSION: "1.5.5"
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Push guacd image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Check if image already exists
          if aws ecr describe-images --repository-name "$GUACD_REPO" --image-ids imageTag="${GUACAMOLE_VERSION}" 2>/dev/null; then
            echo "Image $GUACD_REPO:$GUACAMOLE_VERSION already exists, skipping"
          else
            echo "Pulling and pushing guacd:$GUACAMOLE_VERSION"
            docker pull guacamole/guacd:${GUACAMOLE_VERSION}
            docker tag guacamole/guacd:${GUACAMOLE_VERSION} ${ECR_REGISTRY}/${GUACD_REPO}:${GUACAMOLE_VERSION}
            docker tag guacamole/guacd:${GUACAMOLE_VERSION} ${ECR_REGISTRY}/${GUACD_REPO}:latest
            docker push ${ECR_REGISTRY}/${GUACD_REPO}:${GUACAMOLE_VERSION}
            docker push ${ECR_REGISTRY}/${GUACD_REPO}:latest
          fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push guacamole-client image (with OIDC extension)
        uses: docker/build-push-action@v5
        with:
          context: ./shifter/engine/guacamole
          push: true
          build-args: |
            GUACAMOLE_VERSION=${{ env.GUACAMOLE_VERSION }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.GUACAMOLE_CLIENT_REPO }}:${{ env.GUACAMOLE_VERSION }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.GUACAMOLE_CLIENT_REPO }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache-guacamole
          cache-to: type=local,dest=/tmp/.buildx-cache-guacamole-new,mode=max
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-guacamole
          mv /tmp/.buildx-cache-guacamole-new /tmp/.buildx-cache-guacamole || true

  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: self-hosted
    needs: [plan, push-guacamole-images]
    if: |
      always() &&
      (needs.plan.result == 'success' || needs.plan.result == 'skipped') &&
      (needs.push-guacamole-images.result == 'success' || needs.push-guacamole-images.result == 'skipped') &&
      (github.event_name != 'pull_request' || inputs.environment == 'dev')
    defaults:
      run:
        working-directory: platform/terraform/environments/${{ inputs.environment }}/portal
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.1"
      - run: terraform init
      - name: Handle Service Discovery replacement
        env:
          ENV: ${{ inputs.environment }}
        run: |
          # Check if Service Discovery service needs replacement
          echo "Running terraform plan to check for Service Discovery changes..."
          terraform plan -detailed-exitcode -out=tfplan 2>&1 || PLAN_EXIT=$?

          echo "Plan exit code: ${PLAN_EXIT:-0}"

          # Exit code 2 means there are changes
          if [ "${PLAN_EXIT:-0}" = "2" ]; then
            # Check if service discovery service is being deleted/replaced
            echo "Checking plan for Service Discovery changes..."
            if terraform show -json tfplan | jq -e '.resource_changes[]? | select(.address | contains("service_discovery_service")) | select(.change.actions | index("delete"))' > /dev/null 2>&1; then
              echo "Service Discovery service deletion detected - scaling down ECS services first"

              # Find the Guacamole ECS cluster using AWS CLI directly (pattern: {env}-portal-guacamole)
              CLUSTER_NAME="${ENV}-portal-guacamole"
              echo "Looking for Guacamole cluster: $CLUSTER_NAME"

              # Verify cluster exists
              if aws ecs describe-clusters --clusters "$CLUSTER_NAME" --query "clusters[0].status" --output text 2>/dev/null | grep -q "ACTIVE"; then
                echo "Found active Guacamole cluster: $CLUSTER_NAME"

                # Scale down guacd service to deregister from Service Discovery
                GUACD_SERVICE="${ENV}-portal-guacd"
                echo "Scaling down guacd service: $GUACD_SERVICE"

                if aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$GUACD_SERVICE" --query "services[0].status" --output text 2>/dev/null | grep -q "ACTIVE"; then
                  echo "Scaling guacd service to 0..."
                  aws ecs update-service --cluster "$CLUSTER_NAME" --service "$GUACD_SERVICE" --desired-count 0 --no-cli-pager

                  # Wait for tasks to drain (max 2 minutes)
                  for i in $(seq 1 24); do
                    RUNNING=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$GUACD_SERVICE" --query "services[0].runningCount" --output text 2>/dev/null || echo "0")
                    if [ "$RUNNING" = "0" ]; then
                      echo "All guacd tasks stopped"
                      break
                    fi
                    echo "Waiting for tasks to stop... ($RUNNING running)"
                    sleep 5
                  done

                  # Give Service Discovery time to deregister
                  echo "Waiting for Service Discovery to deregister instances..."
                  sleep 15
                else
                  echo "guacd service not found or not active"
                fi
              else
                echo "Guacamole cluster not found or not active"
              fi
            else
              echo "No Service Discovery deletion in plan"
            fi
          else
            echo "No changes detected or plan succeeded without changes"
          fi

          rm -f tfplan
      - run: terraform apply -auto-approve
      - name: Wait for Guacamole ECS services to stabilize
        env:
          ENV: ${{ inputs.environment }}
        run: |
          CLUSTER_NAME="${ENV}-portal-guacamole"

          # Check if cluster exists
          if ! aws ecs describe-clusters --clusters "$CLUSTER_NAME" --query "clusters[0].status" --output text 2>/dev/null | grep -q "ACTIVE"; then
            echo "Guacamole cluster not found, skipping stability check"
            exit 0
          fi

          echo "Waiting for Guacamole ECS services to stabilize..."

          # Wait for both services (10 min timeout is default)
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "${ENV}-portal-guacd" "${ENV}-portal-guacamole-client"

          echo "Guacamole ECS services are stable"

  build:
    name: Build (${{ inputs.environment }})
    runs-on: self-hosted
    needs: apply
    if: github.event_name != 'pull_request' || inputs.environment == 'dev'
    outputs:
      image_tag: ${{ steps.sha.outputs.short }}
    env:
      ECR_REPOSITORY: ${{ inputs.is_dev && 'shifter-dev-portal' || 'shifter-portal' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./shifter/shifter_platform
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.sha.outputs.short }}
          cache-from: type=local,src=/tmp/.buildx-cache-portal
          cache-to: type=local,dest=/tmp/.buildx-cache-portal-new,mode=max
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-portal
          mv /tmp/.buildx-cache-portal-new /tmp/.buildx-cache-portal || true

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: self-hosted
    needs: build
    if: github.event_name != 'pull_request' || inputs.environment == 'dev'
    env:
      AWS_REGION: us-east-2
      ENV: ${{ inputs.environment }}
      PS_PREFIX: /shifter/${{ inputs.environment }}/portal
      INSTANCE_TAG: ${{ inputs.is_dev && 'dev-portal-ec2' || 'prod-portal-ec2' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.is_dev && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Get deployment config
        id: config
        run: |
          TFVARS_FILE="platform/terraform/environments/${ENV}/portal/terraform.tfvars"
          # Check if autoscaling is enabled
          ENABLE_AUTOSCALING=$(grep '^enable_autoscaling' "$TFVARS_FILE" | sed 's/.*= *\([^ ]*\).*/\1/' | tr -d ' ')
          echo "enable_autoscaling=${ENABLE_AUTOSCALING}" >> $GITHUB_OUTPUT

      - name: Update Parameter Store with new image tag
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          echo "Updating Parameter Store with image tag: ${IMAGE_TAG}"
          aws ssm put-parameter \
            --name "${PS_PREFIX}/image-tag" \
            --value "${IMAGE_TAG}" \
            --type String \
            --overwrite
          echo "Parameter Store updated successfully"

      - name: Get Instance ID (single instance mode)
        id: instance
        if: steps.config.outputs.enable_autoscaling != 'true'
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running Platform EC2 instance with tag: $INSTANCE_TAG"; exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Get ASG Name (ASG mode)
        id: asg
        if: steps.config.outputs.enable_autoscaling == 'true'
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?contains(AutoScalingGroupName, '${ENV}-portal-asg')].AutoScalingGroupName | [0]" \
            --output text)
          if [ "$ASG_NAME" == "None" ] || [ -z "$ASG_NAME" ]; then
            echo "Error: Could not find ASG with name containing: ${ENV}-portal-asg"; exit 1
          fi
          echo "asg_name=$ASG_NAME" >> $GITHUB_OUTPUT

      - name: Deploy via SSM (single instance mode)
        if: steps.config.outputs.enable_autoscaling != 'true'
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          echo "Deploying to single instance: $INSTANCE_ID"

          # Wait for cloud-init to complete
          for i in $(seq 1 30); do
            RESULT=$(aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$INSTANCE_ID" \
              --parameters 'commands=["cloud-init status --wait || cloud-init status"]' \
              --query "Command.CommandId" --output text 2>/dev/null) || true
            if [ -n "$RESULT" ]; then
              sleep 10
              STATUS=$(aws ssm get-command-invocation --command-id "$RESULT" --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" --output text 2>/dev/null) || true
              if echo "$STATUS" | grep -q "done"; then echo "Cloud-init complete"; break; fi
            fi
            echo "Attempt $i: Waiting for cloud-init..."; sleep 10
          done

          # Deploy script reads config from Parameter Store and restarts containers
          DEPLOY_SCRIPT=$(cat << 'EOFSCRIPT'
          set -euo pipefail
          AWS_REGION="us-east-2"
          PS_PREFIX="__PS_PREFIX__"

          get_param() { aws ssm get-parameter --name "$1" --query 'Parameter.Value' --output text --region "$AWS_REGION"; }

          IMAGE_TAG=$(get_param "$PS_PREFIX/image-tag")
          ECR_REGISTRY=$(get_param "$PS_PREFIX/ecr-registry")
          ECR_REPOSITORY=$(get_param "$PS_PREFIX/ecr-repository")
          DOMAIN_NAME=$(get_param "$PS_PREFIX/domain-name")
          S3_BUCKET=$(get_param "$PS_PREFIX/s3-bucket")
          DB_SECRET_ARN=$(get_param "$PS_PREFIX/db-secret-arn")
          APP_SECRET_ARN=$(get_param "$PS_PREFIX/app-secret-arn")
          COGNITO_SECRET_ARN=$(get_param "$PS_PREFIX/cognito-secret-arn")
          GUACAMOLE_SECRET_ARN=$(get_param "$PS_PREFIX/guacamole-secret-arn" || echo "")
          PULUMI_ECS_CLUSTER_ARN=$(get_param "$PS_PREFIX/pulumi-ecs-cluster-arn")
          PULUMI_TASK_DEFINITION_ARN=$(get_param "$PS_PREFIX/pulumi-task-definition-arn")
          PULUMI_ECS_SECURITY_GROUP_ID=$(get_param "$PS_PREFIX/pulumi-ecs-security-group-id")
          PULUMI_PRIVATE_SUBNET_IDS=$(get_param "$PS_PREFIX/pulumi-private-subnet-ids")
          SQS_CMS_URL=$(get_param "$PS_PREFIX/sqs-cms-url")
          SQS_ENGINE_URL=$(get_param "$PS_PREFIX/sqs-engine-url")
          SQS_MC_URL=$(get_param "$PS_PREFIX/sqs-mc-url")
          REDIS_ENDPOINT=$(get_param "$PS_PREFIX/redis-endpoint" || echo "")

          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Deploying image: $IMAGE"

          COMMON_ENV="-e AWS_REGION=$AWS_REGION -e AWS_S3_BUCKET_NAME=$S3_BUCKET -e DB_SECRET_ARN=$DB_SECRET_ARN"
          COMMON_ENV="$COMMON_ENV -e APP_SECRET_ARN=$APP_SECRET_ARN -e COGNITO_SECRET_ARN=$COGNITO_SECRET_ARN"
          [ -n "$GUACAMOLE_SECRET_ARN" ] && COMMON_ENV="$COMMON_ENV -e GUACAMOLE_SECRET_ARN=$GUACAMOLE_SECRET_ARN"
          COMMON_ENV="$COMMON_ENV -e DJANGO_ALLOWED_HOSTS=$DOMAIN_NAME -e DJANGO_CSRF_TRUSTED_ORIGINS=https://$DOMAIN_NAME"
          COMMON_ENV="$COMMON_ENV -e SITE_URL=https://$DOMAIN_NAME -e PULUMI_ECS_CLUSTER_ARN=$PULUMI_ECS_CLUSTER_ARN"
          COMMON_ENV="$COMMON_ENV -e PULUMI_TASK_DEFINITION_ARN=$PULUMI_TASK_DEFINITION_ARN"
          COMMON_ENV="$COMMON_ENV -e PULUMI_ECS_SECURITY_GROUP_ID=$PULUMI_ECS_SECURITY_GROUP_ID"
          COMMON_ENV="$COMMON_ENV -e PULUMI_PRIVATE_SUBNET_IDS=$PULUMI_PRIVATE_SUBNET_IDS"
          COMMON_ENV="$COMMON_ENV -e SQS_CMS_URL=$SQS_CMS_URL -e SQS_ENGINE_URL=$SQS_ENGINE_URL -e SQS_MC_URL=$SQS_MC_URL"
          [ -n "$REDIS_ENDPOINT" ] && COMMON_ENV="$COMMON_ENV -e REDIS_HOST=$REDIS_ENDPOINT"

          docker pull "$IMAGE"
          docker stop portal worker-cms worker-engine worker-mc 2>/dev/null || true
          docker rm portal worker-cms worker-engine worker-mc 2>/dev/null || true
          eval docker run -d --name portal --restart unless-stopped -p 8000:8000 $COMMON_ENV "$IMAGE"
          eval docker run -d --name worker-cms --restart unless-stopped $COMMON_ENV "$IMAGE" python manage.py run_worker --queue cms
          eval docker run -d --name worker-engine --restart unless-stopped $COMMON_ENV "$IMAGE" python manage.py run_worker --queue engine
          eval docker run -d --name worker-mc --restart unless-stopped $COMMON_ENV "$IMAGE" python manage.py run_worker --queue mc
          docker ps
          echo "Deployment complete!"
          EOFSCRIPT
          )

          # Substitute PS_PREFIX
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__PS_PREFIX__/${PS_PREFIX}}"

          # Run deploy via SSM
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters "commands=[\"$DEPLOY_SCRIPT\"]" \
            --timeout-seconds 600 \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text)
          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
            exit 1
          fi
          echo "Platform deployment successful!"

      - name: Trigger ASG instance refresh
        if: steps.config.outputs.enable_autoscaling == 'true'
        env:
          ASG_NAME: ${{ steps.asg.outputs.asg_name }}
        run: |
          echo "Triggering instance refresh for ASG: $ASG_NAME"

          # Check if there's already an instance refresh in progress
          ACTIVE_REFRESH=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --query "InstanceRefreshes[?Status=='InProgress' || Status=='Pending'].InstanceRefreshId | [0]" \
            --output text)

          if [ "$ACTIVE_REFRESH" != "None" ] && [ -n "$ACTIVE_REFRESH" ]; then
            echo "Instance refresh already in progress: $ACTIVE_REFRESH"
            echo "Waiting for it to complete..."
          else
            # Start instance refresh
            # New instances will read updated image tag from Parameter Store via user_data
            # Lifecycle hook ensures instance is ready before joining ALB
            REFRESH_ID=$(aws autoscaling start-instance-refresh \
              --auto-scaling-group-name "$ASG_NAME" \
              --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}' \
              --query "InstanceRefreshId" --output text)

            echo "Instance refresh started: $REFRESH_ID"
            ACTIVE_REFRESH=$REFRESH_ID
          fi

          # Wait for instance refresh to complete
          echo "Waiting for instance refresh to complete..."
          RETRIES=0
          MAX_RETRIES=60  # 30 minutes max wait
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$ACTIVE_REFRESH" \
              --query "InstanceRefreshes[0].Status" --output text)

            echo "Instance refresh status: $STATUS"

            if [ "$STATUS" = "Successful" ]; then
              echo "Instance refresh completed successfully!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Instance refresh failed or was cancelled!"
              aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name "$ASG_NAME" \
                --instance-refresh-ids "$ACTIVE_REFRESH" \
                --query "InstanceRefreshes[0].StatusReason" --output text
              exit 1
            fi

            RETRIES=$((RETRIES + 1))
            if [ $RETRIES -gt $MAX_RETRIES ]; then
              echo "Timeout waiting for instance refresh"
              exit 1
            fi

            sleep 30
          done

          echo "Platform ASG deployment successful!"
