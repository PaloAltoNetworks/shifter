<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
<h2>Range Provisioning Failures</h2>
<p>{{ failure_count }} participant range(s) failed to provision for <strong>{{ event.name }}</strong>.</p>
<table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
<tr style="background: #f5f5f5;">
<th style="text-align: left; padding: 8px; border-bottom: 1px solid #ddd;">Participant</th>
<th style="text-align: left; padding: 8px; border-bottom: 1px solid #ddd;">Error</th>
</tr>
{% for f in failures %}
<tr>
<td style="padding: 8px; border-bottom: 1px solid #eee;">{{ f.participant_id }}</td>
<td style="padding: 8px; border-bottom: 1px solid #eee;">{{ f.error }}</td>
</tr>
{% endfor %}
</table>
<p style="margin-top: 16px;">You can retry provisioning from the Range Management page.</p>
</body>
</html>
