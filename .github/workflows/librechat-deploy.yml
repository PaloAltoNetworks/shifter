name: Deploy LibreChat Application

on:
  push:
    branches:
      - main
    paths:
      - 'librechat/**'
      - '.github/workflows/librechat-deploy.yml'
  # Also run after infra workflow completes to ensure instance is ready
  workflow_run:
    workflows: ["Deploy LibreChat Infrastructure"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Prevent concurrent deployments
concurrency:
  group: librechat-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    name: Deploy LibreChat
    runs-on: ubuntu-latest
    # Skip if triggered by failed infra workflow
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-LibreChat-Deploy

      - name: Get Instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=prod-librechat-ec2" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text \
            --region "$AWS_REGION")

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find running LibreChat EC2 instance"
            echo "Run librechat-infra.yml workflow first to create the instance"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Found instance: $INSTANCE_ID"

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters 'commands=[
              "set -e",
              "cd /opt/librechat",
              "echo Pulling latest LibreChat image...",
              "docker compose pull",
              "echo Stopping any existing containers...",
              "docker compose down --remove-orphans || true",
              "echo Starting LibreChat...",
              "docker compose up -d",
              "echo Waiting for LibreChat to be healthy...",
              "sleep 10",
              "docker compose ps",
              "echo Deploy complete!"
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            || true

          # Get command status
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          echo "Command status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            # Get error output
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo "Deployment successful!"

      - name: Health Check
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.instance_id }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters 'commands=[
              "curl -sf http://localhost:3080/api/health || echo Health check pending..."
            ]' \
            --timeout-seconds 30 \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text)

          echo "Health check result: $RESULT"

