# ElasticMQ configuration for the built-image stack smoke (issue #922).
#
# ElasticMQ is a local, in-memory SQS-compatible server used as a test double so
# the SQS worker's `receive_messages()` succeeds (and therefore touches its
# heartbeat file) without any AWS credentials or a real queue. The portal's
# AWS queue consumer honours `AWS_ENDPOINT_URL`, so the worker container is
# pointed here instead of at real SQS. The `cms` queue is predefined so it
# exists the moment the worker starts polling.

include classpath("application.conf")

# Accept requests for any Host so the worker can reach the queue by the
# container-network name (`shifter-smoke-elasticmq`) while a host-side caller
# could reach it via localhost.
node-address {
    protocol = http
    host = "*"
    port = 9324
    context-path = ""
}

rest-sqs {
    enabled = true
    bind-port = 9324
    bind-hostname = "0.0.0.0"
    sqs-limits = strict
}

queues {
    cms {
        defaultVisibilityTimeout = 10 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
    }
}
