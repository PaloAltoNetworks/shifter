{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIFTER // Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'images/logo-icon.png' %}">
    <style>
        :root {
            --neon-pink: #FF1B6B;
            --cyan: #00FFFF;
            --purple: #7F00FF;
            --deep-blue: #0A0A1A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--deep-blue);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            cursor: crosshair;
        }

        /* Dark gradient with vignette */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at center, transparent 0%, var(--deep-blue) 70%),
                radial-gradient(ellipse at 30% 70%, rgba(127, 0, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(255, 27, 107, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle noise texture */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Scanline overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.015) 0px,
                rgba(0, 0, 0, 0.015) 1px,
                transparent 1px,
                transparent 3px
            );
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Logo icon with glow pulse */
        .logo-icon {
            width: 180px;
            height: auto;
            margin-bottom: 1.5rem;
            animation: logoPulse 4s ease-in-out infinite;
            filter: drop-shadow(0 0 25px rgba(255, 27, 107, 0.4));
        }

        @keyframes logoPulse {
            0%, 100% {
                filter: drop-shadow(0 0 25px rgba(255, 27, 107, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 27, 107, 0.6))
                        drop-shadow(0 0 60px rgba(127, 0, 255, 0.3));
            }
        }

        /* CSS Glitch text wordmark */
        .wordmark {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            color: #fff;
            position: relative;
            margin-bottom: 1.5rem;
            text-shadow:
                0 0 10px rgba(255, 27, 107, 0.5),
                0 0 30px rgba(127, 0, 255, 0.3);
        }

        .wordmark::before,
        .wordmark::after {
            content: 'SHIFTER';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.9;
        }

        .wordmark::before {
            color: var(--neon-pink);
            animation: glitch-1 4s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
            text-shadow: none;
        }

        .wordmark::after {
            color: var(--purple);
            animation: glitch-2 4s infinite linear alternate-reverse;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
            text-shadow: none;
        }

        @keyframes glitch-1 {
            0%, 88%, 100% { transform: translate(0); opacity: 0; }
            90% { transform: translate(-4px, -1px); opacity: 0.9; }
            92% { transform: translate(4px, 1px); opacity: 0.9; }
            94% { transform: translate(-3px, 0); opacity: 0.9; }
            96% { transform: translate(5px, -1px); opacity: 0.9; }
            98% { transform: translate(-2px, 1px); opacity: 0.9; }
        }

        @keyframes glitch-2 {
            0%, 88%, 100% { transform: translate(0); opacity: 0; }
            89% { transform: translate(4px, 1px); opacity: 0.9; }
            91% { transform: translate(-4px, -1px); opacity: 0.9; }
            93% { transform: translate(3px, 0); opacity: 0.9; }
            95% { transform: translate(-5px, 1px); opacity: 0.9; }
            97% { transform: translate(2px, -1px); opacity: 0.9; }
        }

        .wordmark:hover::before,
        .wordmark:hover::after {
            animation-duration: 0.3s;
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--cyan);
            opacity: 0.85;
            margin-bottom: 2rem;
            letter-spacing: 0.08em;
            line-height: 1.6;
            max-width: 480px;
        }

        .launch-date {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: var(--neon-pink);
            letter-spacing: 0.15em;
            opacity: 0.9;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.15em;
            z-index: 10;
        }

        /* Terminal blink cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background: var(--cyan);
            margin-left: 4px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .logo-icon {
                width: 140px;
            }

            .wordmark {
                font-size: 2.5rem;
                letter-spacing: 0.15em;
            }

            .tagline {
                font-size: 0.8rem;
                padding: 0 1rem;
            }

            .notify-form {
                padding: 0 1rem;
            }
        }

        @media (max-width: 400px) {
            .logo-icon {
                width: 110px;
            }

            .wordmark {
                font-size: 1.8rem;
                letter-spacing: 0.1em;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="noise"></div>
    <div class="scanlines"></div>

    <div class="container">
        <img src="{% static 'images/logo-icon.png' %}" alt="Shifter" class="logo-icon">

        <h1 class="wordmark">SHIFTER</h1>

        <p class="tagline">
            Autonomous AI adversaries. Real infrastructure. Controlled environments.<span class="cursor"></span>
        </p>

        <p class="launch-date">// December 18, 2025</p>
    </div>

    <footer class="footer">&copy; 2025 Brad Edwards</footer>
</body>
</html>
