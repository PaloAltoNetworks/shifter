sonar.projectKey=Brad-Edwards_shifter
sonar.organization=brad-edwards
sonar.projectName=Shifter
sonar.projectVersion=0.5.1

# Source paths (TypeScript + Python)
sonar.sources=mcp,portal
sonar.tests=mcp/aptl-mcp-common/tests,mcp/openwebui-mcp-wrapper,portal/tests

# Test inclusions
sonar.test.inclusions=**/tests/**/*.test.ts,**/tests/**/test_*.py,**/test_*.py

# Exclusions
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/__pycache__/**,**/migrations/**,**/.venv/**,**/staticfiles/**

# Coverage exclusions (test fixtures, dev-only code)
sonar.coverage.exclusions=**/tests/**,**/conftest.py,**/dev_auth.py

# Coverage report paths
sonar.javascript.lcov.reportPaths=mcp/aptl-mcp-common/coverage/lcov.info,mcp/mcp-red/coverage/lcov.info
sonar.python.coverage.reportPaths=portal/coverage.xml,mcp/openwebui-mcp-wrapper/coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
