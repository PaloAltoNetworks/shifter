apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-launcher
  namespace: {{ .Values.namespaces.jobs }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-launcher-portal
  namespace: {{ .Values.namespaces.jobs }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccounts.portal.name }}
    namespace: {{ .Values.namespaces.platform }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-launcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-launcher-workers
  namespace: {{ .Values.namespaces.jobs }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccounts.workers.name }}
    namespace: {{ .Values.namespaces.platform }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-launcher
