{% extends "ctf/base.html" %}
{% block ctf_title %}New Notification - {{ event.name }}{% endblock %}

{% block extra_css %}
<style>
.notification-form {
    max-width: 720px;
}

.form-alert {
    padding: 12px 16px;
    border: 1px solid #ff4d4f;
    border-radius: 4px;
    background: rgba(255, 77, 79, 0.08);
    color: #ff4d4f;
    font-size: 13px;
    margin-bottom: 16px;
}

.form-actions {
    display: flex;
    gap: 8px;
    align-items: center;
}

textarea.form-input {
    resize: vertical;
    min-height: 120px;
}

input[type="datetime-local"] {
    color-scheme: dark;
}
</style>
{% endblock %}

{% block ctf_content %}
<div class="notification-form">
    <div class="page-header">
        <h1 class="page-title">Compose Notification</h1>
    </div>

    {% if error %}
    <div class="form-alert">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="card">
            <div class="form-group">
                <label for="subject" class="form-label">Subject</label>
                <input type="text" class="form-input" id="subject" name="subject" required
                       maxlength="200" placeholder="Notification subject">
            </div>
            <div class="form-group">
                <label for="body" class="form-label">Body</label>
                <textarea class="form-input" id="body" name="body" rows="6" required
                          placeholder="Notification body (supports Markdown)"></textarea>
            </div>
            <div class="form-group" id="schedule-group" style="display:none;">
                <label for="scheduled_at" class="form-label">Schedule For</label>
                <input type="datetime-local" class="form-input" id="scheduled_at" name="scheduled_at">
            </div>
        </div>

        <div class="form-actions mt-lg">
            <button type="submit" name="action" value="send_now" class="btn btn-primary">Send Now</button>
            <button type="submit" name="action" value="draft" class="btn btn-secondary">Save Draft</button>
            <button type="button" class="btn btn-secondary" id="btn-toggle-schedule">Schedule</button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('btn-toggle-schedule').addEventListener('click', function() {
    var group = document.getElementById('schedule-group');
    if (group.style.display === 'none') {
        group.style.display = 'block';
        this.textContent = 'Cancel Schedule';
    } else {
        group.style.display = 'none';
        this.textContent = 'Schedule';
    }
});

document.querySelector('form').addEventListener('submit', function(e) {
    var scheduleGroup = document.getElementById('schedule-group');
    if (scheduleGroup.style.display !== 'none') {
        var actionInput = document.querySelector('button[name="action"][value="send_now"]');
        if (e.submitter === actionInput) return;
        var hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.name = 'action';
        hiddenInput.value = 'schedule';
        this.appendChild(hiddenInput);
    }
});
</script>
{% endblock %}
