repos:
  # Python - Ruff (linting + formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(portal|mcp/openwebui-mcp-wrapper)/
      - id: ruff-format
        files: ^(portal|mcp/openwebui-mcp-wrapper)/

  # Python - Security
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args: [-c, portal/pyproject.toml, -r]
        additional_dependencies: ["bandit[toml]"]
        files: ^(portal|mcp/openwebui-mcp-wrapper)/
        exclude: ^(portal/(tests|\.venv)/|mcp/openwebui-mcp-wrapper/__pycache__/)

  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe] # Allow custom YAML constructors (mkdocs plugins)
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  # CSS - Stylelint
  - repo: local
    hooks:
      - id: stylelint
        name: stylelint
        entry: npx stylelint --fix
        language: system
        files: ^portal/static/css/.*\.css$
        types: [css]

  # TypeScript/JavaScript - ESLint
  - repo: local
    hooks:
      - id: eslint-mcp-shifter
        name: eslint (mcp-shifter)
        entry: bash -c 'cd mcp/mcp-shifter && npm ci --silent && npm run lint'
        language: system
        files: ^mcp/mcp-shifter/.*\.(ts|js)$
        pass_filenames: false
      - id: eslint-aptl-mcp-common
        name: eslint (aptl-mcp-common)
        entry: bash -c 'cd mcp/aptl-mcp-common && npm ci --silent && npm run lint'
        language: system
        files: ^mcp/aptl-mcp-common/.*\.(ts|js)$
        pass_filenames: false

  # Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      - id: terraform_fmt
        files: ^terraform/
      - id: terraform_validate
        files: ^terraform/

  # IaC Security (Terraform, Dockerfile)
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.346
    hooks:
      - id: checkov
        files: ^terraform/
        args:
          [--quiet, --compact, --download-external-modules, "true", --soft-fail]

  # Shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/
