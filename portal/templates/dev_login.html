<!DOCTYPE html>
<html>
<head>
    <title>Dev Login</title>
    <style>
        body {
            font-family: monospace;
            background: #000;
            color: #39FF14;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #111;
            padding: 2rem;
            border: 1px solid #39FF14;
            max-width: 400px;
        }
        h1 {
            margin-top: 0;
            font-size: 1rem;
        }
        .warning {
            background: #FF4444;
            color: #000;
            padding: 0.5rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            background: #000;
            border: 1px solid #39FF14;
            color: #39FF14;
            font-family: monospace;
            box-sizing: border-box;
        }
        button {
            background: #39FF14;
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning">⚠ DEV MODE ONLY</div>
        <h1>Development Login</h1>
        <p>This bypasses OIDC for local testing.</p>
        <form method="post">
            {% csrf_token %}
            <input type="email" name="email" value="dev@example.com" placeholder="Email">
            <button type="submit">Login as Dev User</button>
        </form>
    </div>
</body>
</html>
