        "id": "ADR-017-R1",
        "description": "The public configuration surface for range egress is `settings.range_egress` in shifter.yaml; provider-specific Terraform variables (`victim_allowed_cidrs` on AWS, `range_egress_allowed_cidrs` on GCP) are internal bridges and must validate the same shape (well-formed CIDR, not 0.0.0.0/0 or ::/0) that shifter/installation/range_egress.py enforces.",
        "checks": []
      },
      {
        "id": "ADR-017-R2",
        "description": "Per-deployment range egress allowlist values must not be committed to the repository. Operators write the values into a gitignored `local.auto.tfvars` (or any `*.auto.tfvars.local`) alongside the env's `terraform.tfvars`; the committed Terraform baseline ships an empty allowlist. `.gitignore` blocks the prior committed forms (`victim_allowed_cidrs*.auto.tfvars`, `range_egress*.auto.tfvars`) from being re-introduced.",
        "checks": ["no-plaintext-secrets-in-tfvars"]
      },
      {
        "id": "ADR-017-R3",
