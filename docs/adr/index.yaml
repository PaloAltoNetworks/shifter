      "mcp/ngfw/script-execution.test.js",
      "scripts/adr_guard/adr_guard.py"
    ]
  },
  {
    "id": "ADR-009",
    "title": "AWS and GCP keep provider-specific identity stacks behind a shared auth seam",
    "status": "accepted",
    "scope": "repository",
    "decision": "AWS keeps the Cognito/OIDC flow. GCP uses Identity Platform with FirebaseUI/browser-side Google auth flows, domain allowlisting, required email verification, required TOTP MFA before app-session creation, and bootstrap-owned first-operator seeding. The Django app selects the provider through configuration without changing shared business workflows.",
    "rules": [
      {
        "id": "ADR-009-R1",
        "description": "AWS deployments continue to use the existing OIDC redirect flow and must not depend on GCP identity configuration.",
        "checks": []
      },
      {
        "id": "ADR-009-R2",
        "description": "GCP bootstrap must provision Identity Platform and seed the first corporate operator instead of relying on a manually managed OIDC runtime secret.",
        "checks": []
      },
      {
        "id": "ADR-009-R3",
        "description": "Bootstrap operator privilege elevation is runtime-configured and must not hardcode identities in committed source.",
        "checks": []
      },
      {
        "id": "ADR-009-R4",
        "description": "GCP portal auth must not move password handling into Django. The app may host a thin browser auth shell around provider UI components such as FirebaseUI, but credential collection stays in Identity Platform browser flows and Django only performs verified-token session exchange plus app-specific gate checks.",
        "checks": []
      }
    ],
    "exceptions": [],
    "enforcement": ["agent-policy", "pre-commit", "ci"],
    "evidence": [
      "shifter/shifter_platform/config/settings.py",
      "shifter/shifter_platform/config/urls.py",
      "shifter/shifter_platform/config/views.py",
      "shifter/shifter_platform/config/identity_platform.py",
      "shifter/shifter_platform/static/js/identity_platform_auth.js",
      "shifter/shifter_platform/static/js/identity_platform_logout.js",
