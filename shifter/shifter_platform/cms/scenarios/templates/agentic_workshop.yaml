id: agentic_workshop
name: Agentic Workshop
description: 6-box CTF range for vibe hacking workshop.
enabled: true
ngfw: false

instances:
  - name: kali
    role: attacker
    os_type: kali
    ai_agent: true

  - name: webdev01
    role: victim
    os_type: ubuntu
    ami_key: ctf-webshell

  - name: mx-internal
    role: victim
    os_type: ubuntu
    ami_key: ctf-mailroom

  - name: support-win
    role: victim
    os_type: windows
    ami_key: ctf-helpdesk

  - name: ci-runner
    role: victim
    os_type: ubuntu
    ami_key: ctf-devbox

  - name: backup-dc
    role: victim
    os_type: windows
    ami_key: ctf-vault

subnets:
  - name: range_network
    instances: [kali, webdev01, mx-internal, support-win, ci-runner, backup-dc]
