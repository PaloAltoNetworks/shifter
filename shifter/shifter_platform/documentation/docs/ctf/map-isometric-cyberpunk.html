<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ===========================================================================
//  CONSTANTS & COLORS
// ===========================================================================
const CYAN    = 0x00e5ff;
const MAGENTA = 0xff2d7b;
const AMBER   = 0xffb300;
const DEEP_BLUE  = 0x020a1a;
const DARK_METAL = 0x0a0e18;
const PANEL_DARK = 0x060b14;

// ===========================================================================
//  RENDERER
// ===========================================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.75;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ===========================================================================
//  SCENE
// ===========================================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020408);
scene.fog = new THREE.FogExp2(0x020a14, 0.0025);

// ===========================================================================
//  CAMERA -- Orthographic Isometric
// ===========================================================================
const frustum = 130;
const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.OrthographicCamera(
  -frustum * aspect, frustum * aspect,
  frustum, -frustum,
  -500, 1500
);
const isoDistance = 250;
const isoAngle = Math.PI / 4;
const isoTilt  = Math.atan(1 / Math.sqrt(2));
camera.position.set(
  isoDistance * Math.cos(isoTilt) * Math.sin(isoAngle),
  isoDistance * Math.sin(isoTilt),
  isoDistance * Math.cos(isoTilt) * Math.cos(isoAngle)
);
camera.lookAt(0, 0, 0);

// ===========================================================================
//  CONTROLS
// ===========================================================================
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableRotate = true;
controls.enablePan = true;
controls.enableZoom = true;
controls.minZoom = 0.25;
controls.maxZoom = 3.5;
controls.enableDamping = true;
controls.dampingFactor = 0.08;

});

  color: CYAN, emissive: CYAN, emissiveIntensity: 0.8,

});
const glassMatMagenta = new THREE.MeshStandardMaterial({

// ===========================================================================
//  GROUND -- Circuit Board Shader
// ===========================================================================
const groundSize = 400;
const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize, 1, 1);
groundGeo.rotateX(-Math.PI / 2);

const circuitShaderMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0.0 },
    uCyan: { value: new THREE.Color(CYAN) },
    uMagenta: { value: new THREE.Color(MAGENTA) },
    uAmber: { value: new THREE.Color(AMBER) },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uCyan;
    uniform vec3 uMagenta;
    uniform vec3 uAmber;
    varying vec2 vUv;
    varying vec3 vWorldPos;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
    }

    float gridLine(float coord, float width) {
      float d = abs(fract(coord) - 0.5);
      return smoothstep(width, width + 0.01, d);
    }

    float circuitTrace(vec2 p, float scale) {
      vec2 cell = floor(p * scale);
      float h = hash(cell);

      // Horizontal or vertical traces based on hash
      vec2 f = fract(p * scale);
      float trace = 0.0;

      if (h > 0.6) {
        // Horizontal trace
        float d = abs(f.y - 0.5);
        trace = 1.0 - smoothstep(0.0, 0.04, d);
        // Only draw part of the cell
        trace *= step(0.1, f.x) * step(f.x, 0.9);
      } else if (h > 0.3) {
        // Vertical trace
        float d = abs(f.x - 0.5);
        trace = 1.0 - smoothstep(0.0, 0.04, d);
        trace *= step(0.1, f.y) * step(f.y, 0.9);
      }

      // Junction nodes
      if (h > 0.85) {
        float d = length(f - 0.5);
        trace = max(trace, 1.0 - smoothstep(0.0, 0.08, d));
      }

      return trace;
    }

    void main() {
      vec2 worldXZ = vWorldPos.xz;
      vec3 base = vec3(0.01, 0.015, 0.03);

      // Major grid
      float majorGrid = 1.0 - gridLine(worldXZ.x / 20.0, 0.48) *
                               gridLine(worldXZ.y / 20.0, 0.48);
      majorGrid *= 0.08;

      // Minor grid
      float minorGrid = 1.0 - gridLine(worldXZ.x / 5.0, 0.47) *
                               gridLine(worldXZ.y / 5.0, 0.47);
      minorGrid *= 0.03;

      // Circuit traces at multiple scales
      float trace1 = circuitTrace(worldXZ, 0.08) * 0.35;
      float trace2 = circuitTrace(worldXZ + 37.0, 0.15) * 0.2;
      float trace3 = circuitTrace(worldXZ + 91.0, 0.04) * 0.5;

      // Animate: pulse along traces
      float pulse1 = 0.5 + 0.5 * sin(uTime * 2.0 + worldXZ.x * 0.3 + worldXZ.y * 0.2);
      float pulse2 = 0.5 + 0.5 * sin(uTime * 1.5 - worldXZ.x * 0.2 + worldXZ.y * 0.4);
      float pulse3 = 0.5 + 0.5 * sin(uTime * 3.0 + worldXZ.x * 0.1 - worldXZ.y * 0.3);

      vec3 traceColor = uCyan * trace1 * pulse1
                       + uMagenta * trace2 * pulse2
                       + uAmber * trace3 * pulse3;

      vec3 gridColor = uCyan * 0.3 * (majorGrid + minorGrid);

      // Distance-based fade from center
      float dist = length(worldXZ) / 200.0;
      float fade = 1.0 - smoothstep(0.0, 1.0, dist);

      // Hatch heat zone
      float hatchDist = length(worldXZ - vec2(0.0, 40.0));
      float hatchGlow = exp(-hatchDist * hatchDist / 800.0) * 0.15;
      vec3 hatchHeat = uMagenta * hatchGlow * (0.7 + 0.3 * sin(uTime * 2.0));

      vec3 finalColor = base + (traceColor + gridColor) * fade + hatchHeat;

      // Slight snow/frost overlay at edges
      float frost = smoothstep(0.6, 1.0, dist) * 0.04;
      finalColor += vec3(0.05, 0.08, 0.12) * frost;

      gl_FragColor = vec4(finalColor, 1.0);
    }
  `,
});
const ground = new THREE.Mesh(groundGeo, circuitShaderMat);
ground.receiveShadow = true;
scene.add(ground);

animatedObjects.push({
  mesh: ground,
  update(t) { circuitShaderMat.uniforms.uTime.value = t; }
});

// ===========================================================================

// Ambient -- very low, most light from emissives
const ambientLight = new THREE.AmbientLight(0x0a1525, 0.3);

// Dim directional "moonlight"

dirLight.shadow.camera.top = 200;
dirLight.shadow.camera.bottom = -200;

// Cyan rim light
const rimLight = new THREE.DirectionalLight(CYAN, 0.15);
rimLight.position.set(-100, 50, -80);
scene.add(rimLight);

// ===========================================================================
//  HELPER: Create a building with glowing seams
// ===========================================================================
function createCyberpunkBuilding(w, h, d, baseColor, accentColor, accentHex) {
  const group = new THREE.Group();

  // Main body
  const bodyGeo = new THREE.BoxGeometry(w, h, d);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: baseColor, roughness: 0.5, metalness: 0.7
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = h / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Glowing seam lines -- horizontal bands
  const seamMat = new THREE.MeshStandardMaterial({
    color: accentHex, emissive: accentHex, emissiveIntensity: 3.0,
    roughness: 0.1, metalness: 0.9
  });

  const seamCount = Math.floor(h / 6);
  for (let i = 1; i <= seamCount; i++) {
    const seamY = (h / (seamCount + 1)) * i;
    // Front seam
    const seamGeo = new THREE.BoxGeometry(w + 0.2, 0.3, 0.15);
    const seam = new THREE.Mesh(seamGeo, seamMat);
    seam.position.set(0, seamY, d / 2 + 0.08);
    group.add(seam);
    // Back seam
    const seamB = seam.clone();
    seamB.position.z = -d / 2 - 0.08;
    group.add(seamB);
    // Side seams
    const sideSGeo = new THREE.BoxGeometry(0.15, 0.3, d + 0.2);
    const sideL = new THREE.Mesh(sideSGeo, seamMat);
    sideL.position.set(-w / 2 - 0.08, seamY, 0);
    group.add(sideL);
    const sideR = sideL.clone();
    sideR.position.x = w / 2 + 0.08;
    group.add(sideR);
  }

  // Vertical corner accent lines
  const cornerGeo = new THREE.BoxGeometry(0.4, h + 0.5, 0.4);
  const corners = [
    [-w/2, h/2, -d/2], [w/2, h/2, -d/2],
    [-w/2, h/2, d/2],  [w/2, h/2, d/2]
  ];
  corners.forEach(([cx, cy, cz]) => {
    const c = new THREE.Mesh(cornerGeo, seamMat);
    c.position.set(cx, cy, cz);
    group.add(c);
  });

  // Roof edge glow
  const roofEdgeGeo = new THREE.BoxGeometry(w + 1, 0.3, d + 1);
  const roofEdge = new THREE.Mesh(roofEdgeGeo, seamMat);
  roofEdge.position.y = h + 0.15;
  group.add(roofEdge);

  // Roof antenna
  const antennaGeo = new THREE.CylinderGeometry(0.15, 0.15, 6, 6);
  const antenna = new THREE.Mesh(antennaGeo, metalMat);
  antenna.position.set(w * 0.3, h + 3, d * 0.2);
  group.add(antenna);
  const antTipGeo = new THREE.SphereGeometry(0.5, 8, 8);
  const antTip = new THREE.Mesh(antTipGeo, seamMat);
  antTip.position.set(w * 0.3, h + 6, d * 0.2);
  group.add(antTip);

  // Point light at base
  const baseLight = new THREE.PointLight(accentHex, 1.5, 40, 2);
  baseLight.position.set(0, 1, d / 2 + 2);
  group.add(baseLight);

  return group;
}

// ===========================================================================
//  HELPER: Holographic label floating above a position
// ===========================================================================
function createHoloLabel(text, color, width, height) {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');

  // Background with scan lines
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, 512, 128);
  for (let y = 0; y < 128; y += 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, y, 512, 1);
  }

  // Border
  const c = new THREE.Color(color);
  const cssColor = `rgb(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)})`;
  ctx.strokeStyle = cssColor;
  ctx.lineWidth = 2;
  ctx.strokeRect(4, 4, 504, 120);

  // Corner brackets
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(4, 24); ctx.lineTo(4, 4); ctx.lineTo(24, 4);
  ctx.moveTo(488, 4); ctx.lineTo(508, 4); ctx.lineTo(508, 24);
  ctx.moveTo(508, 104); ctx.lineTo(508, 124); ctx.lineTo(488, 124);
  ctx.moveTo(24, 124); ctx.lineTo(4, 124); ctx.lineTo(4, 104);
  ctx.stroke();

  // Text
  ctx.font = 'bold 36px Orbitron, monospace';
  ctx.fillStyle = cssColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = cssColor;
  ctx.shadowBlur = 12;
  ctx.fillText(text, 256, 50);

  // Status line
  ctx.font = '16px Share Tech Mono, monospace';
  ctx.shadowBlur = 6;
  ctx.fillText('STATUS: OPERATIONAL', 256, 95);

  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;

  const mat = new THREE.MeshBasicMaterial({
    map: texture, transparent: true, opacity: 0.85,
    side: THREE.DoubleSide, depthWrite: false
  });

  const geo = new THREE.PlaneGeometry(width || 20, height || 5);
  const mesh = new THREE.Mesh(geo, mat);

  // Make it face the camera (billboard-ish) -- we'll orient it manually
  // For isometric, angle it slightly toward viewer
  mesh.rotation.x = -0.3;
  mesh.rotation.y = -Math.PI / 4;

  return mesh;
}

// ===========================================================================
//  MAIN BUILDING -- Command Center
// ===========================================================================
const mainBuilding = createCyberpunkBuilding(40, 20, 30, 0x080c16, CYAN, CYAN);
mainBuilding.position.set(-45, 0, -35);

// Holographic label
const mainLabel = createHoloLabel('COMMAND CENTER', CYAN, 24, 6);

const scanBeamGeo = new THREE.ConeGeometry(15, 30, 4, 1, true);
const scanBeamMat = new THREE.MeshBasicMaterial({

const scanBeam = new THREE.Mesh(scanBeamGeo, scanBeamMat);

// ===========================================================================
//  RESEARCH BUILDING
// ===========================================================================
const researchBuilding = createCyberpunkBuilding(35, 16, 25, 0x0a0812, MAGENTA, MAGENTA);
researchBuilding.position.set(50, 0, -25);
scene.add(researchBuilding);

const researchLabel = createHoloLabel('RESEARCH LAB', MAGENTA, 22, 5.5);
researchLabel.position.set(50, 25, -25);
scene.add(researchLabel);
animatedObjects.push({

// Data visualization sphere above research building
const dataSphereGeo = new THREE.IcosahedronGeometry(3, 1);
const dataSphereMat = new THREE.MeshStandardMaterial({

dataSphere.position.set(50, 22, -25);

animatedObjects.push({

// ===========================================================================
//  THE HATCH -- Massive, dramatic centerpiece
// ===========================================================================
const hatchGroup = new THREE.Group();
hatchGroup.position.set(0, 0, 40);
scene.add(hatchGroup);

// Hatch base ring -- massive concrete/metal surround
const hatchOuterRadius = 30;
const hatchInnerRadius = 25;
const hatchRingGeo = new THREE.RingGeometry(hatchInnerRadius, hatchOuterRadius, 64);
hatchRingGeo.rotateX(-Math.PI / 2);
const hatchRingMat = new THREE.MeshStandardMaterial({
  color: 0x0c0e14, roughness: 0.4, metalness: 0.8
});
const hatchRing = new THREE.Mesh(hatchRingGeo, hatchRingMat);
hatchRing.position.y = 0.2;
hatchGroup.add(hatchRing);

// Hatch raised rim
const rimGeo = new THREE.TorusGeometry(hatchOuterRadius, 1.5, 8, 64);
rimGeo.rotateX(Math.PI / 2);
const rimMesh = new THREE.Mesh(rimGeo, metalMat);
rimMesh.position.y = 1.5;
rimMesh.castShadow = true;
hatchGroup.add(rimMesh);

// Hatch cover (the massive door)
const hatchCoverGeo = new THREE.CylinderGeometry(hatchInnerRadius - 0.5, hatchInnerRadius - 0.5, 2, 64);
const hatchCoverMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0.0 },
    uCyan: { value: new THREE.Color(CYAN) },
    uMagenta: { value: new THREE.Color(MAGENTA) },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vPos;
    void main() {
      vUv = uv;
      vPos = position;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uCyan;
    uniform vec3 uMagenta;
    varying vec2 vUv;
    varying vec3 vPos;

    void main() {
      vec2 centered = vPos.xz;
      float dist = length(centered);
      float maxR = 24.0;
      float t = dist / maxR;

      // Concentric rings
      float rings = sin(dist * 2.0 - uTime * 3.0) * 0.5 + 0.5;
      rings *= smoothstep(0.0, 0.1, rings);

      // Radial lines
      float angle = atan(centered.y, centered.x);
      float radial = sin(angle * 8.0 + uTime * 1.0) * 0.5 + 0.5;
      radial *= 0.3;

      // Core glow
      float core = exp(-t * 3.0) * 0.6;
      float corePulse = 0.7 + 0.3 * sin(uTime * 2.5);

      // Warning pulse
      float warning = step(0.7, sin(uTime * 4.0)) * 0.2;

      vec3 color = vec3(0.02, 0.01, 0.03);
      color += uMagenta * rings * 0.25 * (0.5 + 0.5 * sin(uTime * 1.5));
      color += uCyan * radial * (0.5 + 0.5 * cos(uTime * 0.8));
      color += uMagenta * core * corePulse;
      color += vec3(1.0, 0.2, 0.1) * warning * (1.0 - t);

      gl_FragColor = vec4(color, 1.0);
    }
  `,
});
const hatchCover = new THREE.Mesh(hatchCoverGeo, hatchCoverMat);
hatchCover.position.y = 0.5;
hatchGroup.add(hatchCover);
animatedObjects.push({
  mesh: hatchCover,
  update(t) { hatchCoverMat.uniforms.uTime.value = t; }
});

// Energy containment rings -- 3 glowing torus rings at different heights
for (let i = 0; i < 3; i++) {
  const ringRadius = hatchOuterRadius + 3 + i * 4;
  const ringY = 3 + i * 5;
  const rGeo = new THREE.TorusGeometry(ringRadius, 0.15, 8, 128);
  rGeo.rotateX(Math.PI / 2);
  const rColor = i === 0 ? CYAN : i === 1 ? MAGENTA : AMBER;
  const rMat = new THREE.MeshStandardMaterial({
    color: rColor, emissive: rColor, emissiveIntensity: 4.0,
    transparent: true, opacity: 0.7, roughness: 0.1, metalness: 0.9
  });

const fenceHalfW = 120;
const fenceHalfD = 100;
const fencePostHeight = 8;
const fencePostSpacing = 15;

function createFenceSegment(x1, z1, x2, z2) {
  const dx = x2 - x1;
  const dz = z2 - z1;
  const len = Math.sqrt(dx * dx + dz * dz);
  const postCount = Math.ceil(len / fencePostSpacing) + 1;

  for (let i = 0; i < postCount; i++) {
    const frac = i / (postCount - 1);
    const px = x1 + dx * frac;
    const pz = z1 + dz * frac;

    // Post
    const postGeo = new THREE.CylinderGeometry(0.4, 0.5, fencePostHeight, 6);
    const post = new THREE.Mesh(postGeo, metalMat);
    post.position.set(px, fencePostHeight / 2, pz);
    post.castShadow = true;
    scene.add(post);

    // Emitter tip
    const tipGeo = new THREE.SphereGeometry(0.6, 8, 8);
    const tip = new THREE.Mesh(tipGeo, cyanEmit);
    tip.position.set(px, fencePostHeight, pz);
    scene.add(tip);

    // Point light at top
    if (i % 3 === 0) {
      const pl = new THREE.PointLight(CYAN, 0.5, 15, 2);
      pl.position.set(px, fencePostHeight + 1, pz);
      scene.add(pl);
    }
  }

  // Energy barrier between posts
  const angle = Math.atan2(dx, dz);
  const midX = (x1 + x2) / 2;
  const midZ = (z1 + z2) / 2;

  const barrierGeo = new THREE.PlaneGeometry(len, fencePostHeight);
  const barrierMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0.0 },
      uColor: { value: new THREE.Color(CYAN) },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uColor;
      varying vec2 vUv;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453);
      }

      void main() {
        // Horizontal energy lines
        float lines = sin(vUv.y * 40.0 - uTime * 5.0) * 0.5 + 0.5;
        lines = smoothstep(0.7, 0.9, lines);

        // Vertical hex pattern
        float hex = sin(vUv.x * 60.0) * sin(vUv.y * 20.0 + uTime * 2.0);
        hex = smoothstep(0.4, 0.6, hex) * 0.3;

        // Edge fade
        float edgeFade = sin(vUv.x * 3.14159) * sin(vUv.y * 3.14159);

        // Noise flicker
        float noise = hash(vUv + uTime * 0.1) * 0.1;

        float alpha = (lines * 0.15 + hex + 0.03 + noise) * edgeFade;
        vec3 color = uColor * (1.0 + lines * 0.5);

        gl_FragColor = vec4(color, alpha * 0.6);
      }
    `,
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false,
  });

  const barrier = new THREE.Mesh(barrierGeo, barrierMat);
  barrier.position.set(midX, fencePostHeight / 2, midZ);
  barrier.rotation.y = angle;
  scene.add(barrier);

  animatedObjects.push({
    mesh: barrier,
    update(t) { barrierMat.uniforms.uTime.value = t; }
  });
}

const horizonGeo = new THREE.PlaneGeometry(800, 100);

  uniforms: {
    uTime: { value: 0.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec2 vUv;

    void main() {
      // Aurora-like gradient
      float y = vUv.y;

      // Base aurora colors
      vec3 col1 = vec3(0.0, 0.9, 1.0); // cyan
      vec3 col2 = vec3(1.0, 0.1, 0.5); // magenta
      vec3 col3 = vec3(0.0, 0.3, 0.8); // blue

      float wave1 = sin(vUv.x * 6.0 + uTime * 0.3) * 0.5 + 0.5;
      float wave2 = sin(vUv.x * 4.0 - uTime * 0.2 + 1.0) * 0.5 + 0.5;

      vec3 aurora = mix(col3, col1, wave1 * y) + col2 * wave2 * 0.3 * y;

      float fade = smoothstep(0.0, 0.5, y) * smoothstep(1.0, 0.6, y);
      float alpha = fade * 0.08 * (0.7 + 0.3 * sin(uTime * 0.5 + vUv.x * 3.0));

      // Distant city lights at bottom
      float cityLine = smoothstep(0.12, 0.08, y);
      float cityLights = sin(vUv.x * 80.0) * sin(vUv.x * 120.0 + 3.0);
      cityLights = max(0.0, cityLights) * cityLine * 0.3;
      vec3 cityColor = vec3(1.0, 0.7, 0.3);

      vec3 finalColor = aurora * alpha + cityColor * cityLights;
      float finalAlpha = max(alpha, cityLights);

      gl_FragColor = vec4(finalColor, finalAlpha);
    }
  `,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
});

  const r = Math.random();
  let c;
  if (r < 0.5) c = cyanColor;
  else if (r < 0.8) c = magentaColor;
  else c = amberColor;

  colors[i3]     = c.r;
  colors[i3 + 1] = c.g;
  colors[i3 + 2] = c.b;

  sizes[i] = Math.random() * 1.5 + 0.3;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0.0 },
    uPixelRatio: { value: renderer.getPixelRatio() },
  },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    uniform float uPixelRatio;
    void main() {
      vColor = color;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mvPos;
      gl_PointSize = size * uPixelRatio * 2.0;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if (d > 0.5) discard;
      float alpha = 1.0 - smoothstep(0.2, 0.5, d);
      gl_FragColor = vec4(vColor, alpha * 0.7);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

animatedObjects.push({
  mesh: particles,
  update(t, dt) {
    const pos = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      const i3 = i * 3;
      pos[i3]     += velocities[i3]     + Math.sin(t + i * 0.1) * 0.005;
      pos[i3 + 1] += velocities[i3 + 1];
      pos[i3 + 2] += velocities[i3 + 2] + Math.cos(t + i * 0.1) * 0.005;

      // Reset if below ground
      if (pos[i3 + 1] < 0) {
        pos[i3]     = (Math.random() - 0.5) * 300;
        pos[i3 + 1] = 60 + Math.random() * 20;
        pos[i3 + 2] = (Math.random() - 0.5) * 300;
      }
    }
    particleGeo.attributes.position.needsUpdate = true;
    particleMat.uniforms.uTime.value = t;
  }
});

// ===========================================================================
//  ADDITIONAL DETAIL: Ground-level accent lights
// ===========================================================================
// Cyan ground spots
const groundSpots = [
  { x: -20, z: -20, color: CYAN },
  { x: 20, z: -40, color: CYAN },
  { x: -60, z: 0, color: MAGENTA },
  { x: 60, z: 20, color: MAGENTA },
  { x: 0, z: -60, color: AMBER },
  { x: 30, z: 60, color: AMBER },
];
groundSpots.forEach(gs => {
  const gl = new THREE.PointLight(gs.color, 1.0, 20, 2);
  gl.position.set(gs.x, 0.5, gs.z);
  scene.add(gl);
});

// ===========================================================================
//  ADDITIONAL: Holographic perimeter warning triangles
// ===========================================================================
const warningTriGeo = new THREE.ConeGeometry(2, 3, 3);
const warningTriMat = new THREE.MeshStandardMaterial({
  color: MAGENTA, emissive: MAGENTA, emissiveIntensity: 2.0,
  transparent: true, opacity: 0.4, wireframe: true
});
const warningPositions = [
  { x: 0, z: -fenceHalfD - 5 },
  { x: fenceHalfW + 5, z: 0 },
  { x: 0, z: fenceHalfD + 5 },
  { x: -fenceHalfW - 5, z: 0 },
];
warningPositions.forEach((wp, idx) => {
  const tri = new THREE.Mesh(warningTriGeo, warningTriMat.clone());
  tri.position.set(wp.x, 5, wp.z);
  scene.add(tri);

  animatedObjects.push({
    mesh: tri,
    update(t) {
      tri.rotation.y = t * 1.5;
      tri.position.y = 5 + Math.sin(t * 2.0 + idx * 1.5) * 1.0;
      tri.material.opacity = 0.2 + 0.2 * Math.sin(t * 3.0 + idx);
    }
  });
});

// ===========================================================================
//  ADDITIONAL: Comms tower with data stream
// ===========================================================================
const commsTowerX = 40, commsTowerZ = 60;
const commsPoleGeo = new THREE.CylinderGeometry(0.5, 0.7, 20, 8);
const commsPole = new THREE.Mesh(commsPoleGeo, metalMat);
commsPole.position.set(commsTowerX, 10, commsTowerZ);
commsPole.castShadow = true;
scene.add(commsPole);

// Antenna struts
for (let i = 0; i < 4; i++) {
  const strutGeo = new THREE.BoxGeometry(8, 0.3, 0.3);
  const strut = new THREE.Mesh(strutGeo, metalMat);
  strut.position.set(commsTowerX, 15 + i * 1.5, commsTowerZ);
  strut.rotation.y = i * Math.PI / 4;
  scene.add(strut);
}

// Top beacon
const beaconGeo = new THREE.SphereGeometry(1.0, 8, 8);
const beaconMat = new THREE.MeshStandardMaterial({
  color: MAGENTA, emissive: MAGENTA, emissiveIntensity: 4.0
});
const beacon = new THREE.Mesh(beaconGeo, beaconMat);
beacon.position.set(commsTowerX, 21, commsTowerZ);
scene.add(beacon);

const beaconLight = new THREE.PointLight(MAGENTA, 3, 50, 2);
beaconLight.position.set(commsTowerX, 21, commsTowerZ);
scene.add(beaconLight);

animatedObjects.push({
  mesh: beacon,
  update(t) {
    beaconMat.emissiveIntensity = 2.0 + 3.0 * (Math.sin(t * 5.0) > 0.5 ? 1.0 : 0.0);
    beaconLight.intensity = beaconMat.emissiveIntensity * 0.6;
  }
});

// Data stream beam from comms tower (vertical)
const dataBeamGeo = new THREE.CylinderGeometry(0.3, 0.3, 40, 8, 1, true);
const dataBeamMat = new THREE.MeshBasicMaterial({
  color: CYAN, transparent: true, opacity: 0.08,
  side: THREE.DoubleSide, depthWrite: false
});
const dataBeam = new THREE.Mesh(dataBeamGeo, dataBeamMat);
dataBeam.position.set(commsTowerX, 40, commsTowerZ);
scene.add(dataBeam);

animatedObjects.push({
  mesh: dataBeam,
  update(t) {
    dataBeamMat.opacity = 0.04 + 0.06 * Math.sin(t * 2.0);
  }
});

// ===========================================================================
//  ADDITIONAL: Fuel/coolant tanks near generator
// ===========================================================================
for (let i = 0; i < 3; i++) {
  const tankGeo = new THREE.CylinderGeometry(2.5, 2.5, 7, 16);
  const tank = new THREE.Mesh(tankGeo, metalMat);
  tank.position.set(-100, 3.5, -45 + i * 8);
  tank.castShadow = true;
  scene.add(tank);

  // Tank glow ring
  const tRingGeo = new THREE.TorusGeometry(2.6, 0.12, 8, 32);
  tRingGeo.rotateX(Math.PI / 2);
  const tRingColor = i === 1 ? MAGENTA : CYAN;
  const tRingMat = new THREE.MeshStandardMaterial({
    color: tRingColor, emissive: tRingColor, emissiveIntensity: 2.0
  });
  const tRing = new THREE.Mesh(tRingGeo, tRingMat);
  tRing.position.set(-100, 5, -45 + i * 8);
  scene.add(tRing);
}

// Pipe connecting tanks to generator
const tankPipeGeo = new THREE.BoxGeometry(12, 0.8, 0.8);
const tankPipe = new THREE.Mesh(tankPipeGeo, metalMat);
tankPipe.position.set(-93, 5, -45);
scene.add(tankPipe);

const tankPipeGlow = new THREE.BoxGeometry(12, 0.2, 0.1);
const tankPipeGlowMesh = new THREE.Mesh(tankPipeGlow, cyanEmit);
tankPipeGlowMesh.position.set(-93, 5.5, -45);
scene.add(tankPipeGlowMesh);

// ===========================================================================
//  POST-PROCESSING
// ===========================================================================
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

// Strong bloom for cyberpunk aesthetic
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.4,    // strength -- high for cyberpunk
  0.5,    // radius
  0.15    // threshold -- low to catch emissives
);
composer.addPass(bloomPass);

// Chromatic aberration / vignette post-processing
const vignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    uTime: { value: 0.0 },
    uIntensity: { value: 0.4 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uIntensity;
    varying vec2 vUv;

    void main() {
      vec2 uv = vUv;

      // Slight chromatic aberration
      float aberration = 0.001;
      float r = texture2D(tDiffuse, uv + vec2(aberration, 0.0)).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - vec2(aberration, 0.0)).b;
      vec3 color = vec3(r, g, b);

      // Vignette
      vec2 center = uv - 0.5;
      float dist = length(center);
      float vignette = 1.0 - smoothstep(0.4, 0.9, dist) * uIntensity;
      color *= vignette;

      // Very subtle scanlines
      float scanline = 0.98 + 0.02 * sin(uv.y * 800.0 + uTime * 2.0);
      color *= scanline;

      gl_FragColor = vec4(color, 1.0);
    }
  `,
};
const vignettePass = new ShaderPass(vignetteShader);
composer.addPass(vignettePass);

animatedObjects.push({
  mesh: null,
  update(t) {
    vignetteShader.uniforms.uTime.value = t;
  }
});

// ===========================================================================
//  RESIZE HANDLER
// ===========================================================================
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const a = w / h;
  camera.left   = -frustum * a;
  camera.right  =  frustum * a;
  camera.top    =  frustum;
  camera.bottom = -frustum;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.setSize(w, h);
});

// ===========================================================================
//  ANIMATION LOOP
// ===========================================================================
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  controls.update();

  // Update all animated objects
  for (const obj of animatedObjects) {
    obj.update(t, dt);
  }

  composer.render();
}

// ===========================================================================
//  LOADING SCREEN DISMISS
// ===========================================================================
setTimeout(() => {
  document.getElementById('loading').classList.add('done');
}, 2800);

animate();
</script>
