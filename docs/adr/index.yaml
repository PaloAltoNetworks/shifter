    "scope": "gcp",
    "decision": "The GCP Shifter control plane is deployed through the Shifter Helm chart with layered values files and bootstrap-generated runtime values. Raw GCP manifests and staged workflows are supporting assets, not the authoritative deployment contract.",
    "rules": [
      {
        "id": "ADR-007-R1",
        "description": "GCP environment defaults live in chart values files, with bootstrap-generated runtime values layered last.",
        "checks": []
      },
      {
        "id": "ADR-007-R2",
        "description": "Branch-local GCP bring-up must flow through the bootstrap entrypoint rather than relying on ad hoc kubectl or legacy staged workflow logic.",
        "checks": []
      }
    ],
    "exceptions": [],
