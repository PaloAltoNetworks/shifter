options {
    directory "/var/bind";
    listen-on { any; };
    allow-query { any; };
    allow-transfer { any; };
    // Recursion + forwarders so POLARIS containers can resolve external
    // hostnames (kali apt archives, docker hub, etc.) through this server.
    // Without forwarders we are authoritative-only for boreas.local and
    // boreas-systems.ctf and every external lookup returns SERVFAIL,
    // which breaks `apt update` inside the Kali container.
    recursion yes;
    forwarders { 8.8.8.8; 1.1.1.1; };
    forward only;
    // Locking the recursive surface to the internal compose subnets keeps
    // this DNS from becoming an open resolver for anything outside the range.
    allow-recursion { 172.20.0.0/16; 127.0.0.1; };
};

zone "boreas-systems.ctf" {
    type master;
    file "/etc/bind/db.boreas-systems.ctf";
};

zone "boreas.local" {
    type master;
    file "/etc/bind/db.boreas.local";
};
